<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>NH AI - Upis i Pregled</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div>
                <span class="text-[10px] uppercase text-zinc-500 font-bold">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl italic">Učitavanje...</h2>
            </div>
            <div class="bg-black border border-zinc-800 px-4 py-2 rounded-xl text-center">
                <span class="text-[9px] text-zinc-500 uppercase font-bold">Zapisa u bazi:</span>
                <h2 id="brojac-zapisa" class="text-red-500 font-black text-lg">0</h2>
            </div>
            <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2.5 px-4 rounded-xl text-xs uppercase">Odjavi se</button>
        </div>

        <div class="bg-zinc-900 border border-red-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-red-600 font-black text-xl uppercase italic mb-4">Novi Upis</h2>
            <form id="alarm-forma" class="space-y-4">
                <input type="text" id="naslov" required placeholder="Naslov/Pitanje" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none">
                <input type="email" id="email" required placeholder="Email" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none">
                
                <button type="submit" id="btn-slanje" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl uppercase italic">POŠALJI I DOBIJ AI ODGOVOR</button>
            </form>
        </div>

        <h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter">SVI ZAPISI</h1>
        <div id="svi-izvjestaji" class="space-y-6"></div>
    </div>

    <script>
        const SHEETDB_API = 'https://sheetdb.io/api/v1/4u3goec782bvg'; 
        const GROQ_API_KEY = 'TVOJ_GROQ_API_KLJUC'; 
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        // LOGIKA SLANJA
        document.getElementById('alarm-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const poruka = document.getElementById('naslov').value;
            btn.innerText = "AI OBRAĐUJE..."; btn.disabled = true;

            try {
                // 1. Groq AI poziv
                const groqRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: poruka }] })
                });
                const groqData = await groqRes.json();
                const odgovorAI = groqData.choices[0].message.content;

                // 2. Slanje u tvoju novu tablicu VAPI_PORUKE
                await fetch(SHEETDB_API, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ data: [{ 
                        "Datum": new Date().toLocaleString(), 
                        "Korisnik": firmaId, 
                        "IDTekst": poruka, 
                        "izvještajaEmail": document.getElementById('email').value, 
                        "Odgovor": odgovorAI 
                    }]}) 
                });

                document.getElementById('alarm-forma').reset();
                ucitajSvePodatke();
            } catch(e) { alert("Greška pri slanju!"); } finally { btn.innerText = "POŠALJI I DOBIJ AI ODGOVOR"; btn.disabled = false; }
        });

        // TVOJA STARA FUNKCIJA ZA UČITAVANJE (POVRATAK BROJAČA)
        async function ucitajSvePodatke() {
            const res = await fetch(SHEETDB_API);
            const podaci = await res.json();
            document.getElementById("brojac-zapisa").innerText = Array.isArray(podaci) ? podaci.length : 0;
            document.getElementById("svi-izvjestaji").innerHTML = (Array.isArray(podaci) ? podaci.reverse() : []).map(z => `
                <div class="bg-zinc-950 border border-zinc-800 p-4 rounded-xl">
                    <h4 class="text-white font-bold">${z["IDTekst"] || '---'}</h4>
                    <p class="text-zinc-400 text-sm italic mt-2">${z["Odgovor"] || ''}</p>
                </div>
            `).join('');
        }

        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }
        ucitajSvePodatke();
    </script>
</body>
</html
