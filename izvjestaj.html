<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>AI Sistem</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6 font-sans">

<div class="max-w-4xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-blue-400 font-black text-xl">AI PANEL</h1>

    <div class="text-red-500 font-bold">
        Zapisa: <span id="brojac-zapisa">0</span>
    </div>
</div>

<!-- FORM -->
<div class="bg-zinc-900 border border-zinc-700 p-5 rounded-xl mb-10">

<form id="forma" class="space-y-4">

<input id="naslov"
class="w-full p-3 bg-black border border-zinc-700 rounded"
placeholder="Naslov">

<textarea id="pitanje"
class="w-full p-3 bg-black border border-zinc-700 rounded"
placeholder="Unesi pitanje"></textarea>

<input id="email"
class="w-full p-3 bg-black border border-zinc-700 rounded"
placeholder="Email">

<button id="btn"
class="w-full bg-red-600 p-3 font-bold rounded">
POŠALJI
</button>

</form>

</div>

<!-- LISTA -->
<div id="lista" class="space-y-4"></div>

</div>

<script>

// ===== CONFIG =====
const SUPABASE_URL =
"https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/groq-chat";

const SHEETDB_API =
"https://sheetdb.io/api/v1/4u3goec782bvg";

const firmaId = "KLIJENT-1";

// ===== SUBMIT =====
document.getElementById("forma").addEventListener("submit", async (e) => {
e.preventDefault();

const btn = document.getElementById("btn");
btn.innerText = "AI obrađuje...";
btn.disabled = true;

const naslov = document.getElementById("naslov").value;
const pitanje = document.getElementById("pitanje").value;
const email = document.getElementById("email").value;

try {

// 1. SUPABASE AI CALL
const aiRes = await fetch(SUPABASE_URL, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
poruka: naslov + " - " + pitanje
})
});

const aiData = await aiRes.json();
const odgovorAI = aiData.odgovor || "Nema odgovora";

// 2. SPREMANJE U SHEETDB
await fetch(SHEETDB_API, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
data: [{
Datum: new Date().toLocaleString(),
Korisnik: firmaId,
Naslov: naslov,
Pitanje: pitanje,
Email: email,
Odgovor: odgovorAI,
AdminOdgovor: ""
}]
})
});

document.getElementById("forma").reset();
await load();

} catch (err) {
alert("Greška: " + err.message);
}

btn.innerText = "POŠALJI";
btn.disabled = false;
});

// ===== LOAD DATA =====
async function load() {

try {

const res = await fetch(SHEETDB_API);
const data = await res.json();

if (!Array.isArray(data)) return;

document.getElementById("brojac-zapisa").innerText = data.length;

document.getElementById("lista").innerHTML =
data.reverse().map(x => `
<div class="bg-zinc-900 border border-zinc-700 p-4 rounded-xl">

<div class="text-blue-400 font-bold text-lg">
${x.Naslov || ""}
</div>

<div class="text-white mt-2">
${x.Pitanje || ""}
</div>

<div class="text-green-400 mt-3">
🤖 AI: ${x.Odgovor || ""}
</div>

<div class="text-yellow-400 mt-2">
👨‍💼 Admin: ${x.AdminOdgovor || "Čeka odgovor"}
</div>

<div class="text-xs text-gray-500 mt-2">
${x.Datum || ""}
</div>

</div>
`).join("");

} catch (e) {
console.error(e);
}

}

load();
setInterval(load, 60000);

</script>

</body>
</html>
