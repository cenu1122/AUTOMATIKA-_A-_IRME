<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Alarma - Live Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <h1 class="text-red-600 font-black text-2xl italic mb-4">SISTEM ALARMA V3 - DEBUG</h1>
    
    <div id="status-box" class="mb-6 p-4 bg-zinc-900 border border-zinc-700 rounded-lg">
        <p id="api-status" class="text-yellow-500 font-mono text-xs italic italic">Provjera API veze...</p>
    </div>

    <div id="raw-data" class="mb-10 hidden">
        <h3 class="text-[10px] text-zinc-500 uppercase mb-2">Sirovi podaci iz baze (JSON):</h3>
        <pre id="json-output" class="p-4 bg-zinc-950 border border-zinc-800 rounded text-green-500 text-[10px] overflow-auto max-h-40"></pre>
    </div>

    <div id="lista-konacna" class="space-y-4 text-left">
        <p class="text-zinc-600 animate-pulse uppercase text-xs">Učitavanje izvještaja...</p>
    </div>

    <script>
        async function provjeriSve() {
            const lista = document.getElementById('lista-konacna');
            const jsonOutput = document.getElementById('json-output');
            const apiStatus = document.getElementById('api-status');
            const rawBox = document.getElementById('raw-data');

            try {
                const response = await fetch('https://sheetdb.io/api/v1/rjhvmuxlef6zk?t=' + Date.now());
                const data = await response.json();

                if (data && data.length > 0) {
                    apiStatus.innerHTML = "✅ VEZA OK | PRONAĐENO REDOVA: " + data.length;
                    apiStatus.className = "text-green-500 font-mono text-xs";
                    
                    // Pokaži sirove podatke da budemo sigurni
                    rawBox.classList.remove('hidden');
                    jsonOutput.innerText = JSON.stringify(data, null, 2);

                    lista.innerHTML = '';
                    data.reverse().forEach((red, i) => {
                        // Uzimamo podatke bez obzira na ime kolone
                        const v = Object.values(red);
                        const kartica = document.createElement('div');
                        kartica.className = "bg-zinc-900 border border-zinc-800 p-5 rounded-2xl shadow-xl";
                        kartica.innerHTML = `
                            <div class="flex justify-between text-[10px] text-zinc-500 mb-2 font-mono">
                                <span>UNOS #${data.length - i}</span>
                                <span>${v[0] || ''}</span>
                            </div>
                            <div class="text-red-500 font-bold uppercase mb-2">${v[2] || 'Bez Naslova'}</div>
                            <div class="bg-black p-3 rounded-lg border border-zinc-800">
                                <p class="text-sm text-zinc-300 italic">${v[3] || 'Prazna analiza'}</p>
                            </div>
                        `;
                        lista.appendChild(kartica);
                    });
                } else {
                    apiStatus.innerHTML = "⚠️ API JE POVEZAN, ALI TABELA JE PRAZNA!";
                    lista.innerHTML = "Prazno.";
                }
            } catch (err) {
                apiStatus.innerHTML = "❌ GRESKA: " + err.message;
                apiStatus.className = "text-red-600 font-mono text-xs";
            }
        }

        provjeriSve();
        // Osvježavamo na svakih 5 sekundi radi testa
        setInterval(provjeriSve, 5000);
    </script>
</body>
</html>
