<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>NH AI SYSTEM</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6 font-sans">

<div class="max-w-4xl mx-auto">

<!-- HEADER (OSTAVLJENO KAO TVOJE) -->
<div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">

<div>
<span class="text-[10px] uppercase text-zinc-500 font-bold">Prijavljeni klijent:</span>
<h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl italic">Učitavanje...</h2>
</div>

<div class="bg-black border border-zinc-800 px-4 py-2 rounded-xl text-center">
<span class="text-[9px] text-zinc-500 uppercase font-bold">Zapisa u bazi:</span>
<h2 id="brojac-zapisa" class="text-red-500 font-black text-lg">0</h2>
</div>

<button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2 px-4 rounded-xl text-xs uppercase">
Odjavi se
</button>

</div>

<!-- FORM -->
<div class="bg-zinc-900 border border-red-600/30 p-6 rounded-2xl mb-10">

<form id="forma" class="space-y-4">

<input id="naslov"
class="w-full p-3 bg-black border border-zinc-700 rounded"
placeholder="Naslov">

<textarea id="pitanje"
class="w-full p-3 bg-black border border-zinc-700 rounded"
placeholder="Pitanje"></textarea>

<input id="email"
class="w-full p-3 bg-black border border-zinc-700 rounded"
placeholder="Email">

<!-- DROPDOWN (VRAĆEN) -->
<select id="kategorija"
class="w-full p-3 bg-black border border-zinc-700 rounded">

<option value="Hitno">Hitno</option>
<option value="Normalno">Normalno</option>
<option value="Info">Info</option>

</select>

<button id="btn"
class="w-full bg-red-600 p-3 font-bold rounded">
POŠALJI
</button>

</form>

</div>

<!-- LISTA -->
<div id="lista" class="space-y-4"></div>

</div>

<script>

// ===== CONFIG =====
const SUPABASE_URL =
"https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/groq-chat";

const SHEETDB_API =
"https://sheetdb.io/api/v1/4u3goec782bvg";

const firmaId =
localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";

document.getElementById("firma-naziv-prikaz").innerText = firmaId;

// ===== SUBMIT =====
document.getElementById("forma").addEventListener("submit", async (e) => {
e.preventDefault();

const btn = document.getElementById("btn");
btn.innerText = "AI obrađuje...";
btn.disabled = true;

const naslov = document.getElementById("naslov").value;
const pitanje = document.getElementById("pitanje").value;
const email = document.getElementById("email").value;
const kategorija = document.getElementById("kategorija").value;

try {

// ===== AI (SUPABASE) =====
const aiRes = await fetch(SUPABASE_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
poruka: `${naslov} | ${kategorija} | ${pitanje}`
})
});

const aiData = await aiRes.json();
const odgovorAI = aiData.odgovor || "Nema odgovora";

// ===== SAVE =====
await fetch(SHEETDB_API, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
data: [{
Datum: new Date().toLocaleString(),
Korisnik: firmaId,
Naslov: naslov,
Pitanje: pitanje,
Kategorija: kategorija,
Email: email,
Odgovor: odgovorAI,
AdminOdgovor: ""
}]
})
});

document.getElementById("forma").reset();
await load();

} catch (err) {
alert("Greška: " + err.message);
}

btn.innerText = "POŠALJI";
btn.disabled = false;
});

// ===== LOAD + BROJAC =====
async function load() {

const res = await fetch(SHEETDB_API);
const data = await res.json();

if (!Array.isArray(data)) return;

// 🔥 BROJAČ (POPRAVLJEN)
const moji = data.filter(x => x.Korisnik === firmaId);

document.getElementById("brojac-zapisa").innerText = moji.length;

// LISTA
document.getElementById("lista").innerHTML =
moji.reverse().map(x => `
<div class="bg-zinc-900 border border-zinc-700 p-4 rounded-xl">

<div class="text-blue-400 font-bold text-lg">
${x.Naslov}
</div>

<div class="text-xs text-zinc-500">
Kategorija: ${x.Kategorija}
</div>

<div class="text-white mt-2">
${x.Pitanje}
</div>

<div class="text-green-400 mt-3">
🤖 AI: ${x.Odgovor}
</div>

<div class="text-yellow-400 mt-2">
👨‍💼 Admin: ${x.AdminOdgovor || "Čeka odgovor"}
</div>

<div class="text-xs text-gray-500 mt-2">
${x.Datum}
</div>

</div>
`).join("");

}

load();
setInterval(load, 60000);

// ===== LOGOUT =====
function odjaviSe() {
localStorage.removeItem("prijavljenaFirma");
window.location.href = "index.html";
}

</script>

</body>
</html>
