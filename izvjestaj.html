<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Izvještaj</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4 font-sans min-h-screen">

    <a href="index.html" class="block w-full bg-zinc-900 border border-zinc-700 text-center py-4 rounded-xl mb-8 font-bold uppercase tracking-widest hover:bg-zinc-800 transition">
        ← NAZAD NA UNOS (POČETNA)
    </a>

    <header class="mb-10 border-b border-zinc-800 pb-4">
        <h1 class="text-2xl font-black text-red-600 tracking-tighter uppercase italic">SISTEM ALARMA V3</h1>
        <p class="text-[10px] text-zinc-500 uppercase italic">AKTIVNI IZVJEŠTAJ IZ BAZE PODATAKA</p>
    </header>

    <div id="lista-konacna" class="space-y-6">
        <p class="text-zinc-700 text-center py-20 animate-pulse text-xs uppercase">Učitavanje podataka...</p>
    </div>

    <script>
        async function osvjeziPodatke() {
            try {
                // Pozivamo API sa timestampom protiv keširanja
                const r = await fetch('https://sheetdb.io/api/v1/rjhvmuxlef6zk?t=' + Date.now());
                const data = await r.json();
                const lista = document.getElementById('lista-konacna');

                if (!data || data.length === 0) {
                    lista.innerHTML = '<p class="text-center text-zinc-600 uppercase text-xs">Baza je trenutno prazna.</p>';
                    return;
                }

                // Okrećemo podatke da najnoviji bude prvi
                const prikaz = data.reverse();
                lista.innerHTML = '';

                prikaz.forEach((red, i) => {
                    // KORISTIMO TAČNE NAZIVE KOJE JE SKENER IZBACIO
                    const datum = red["Datum"] || "N/A";
                    const korisnik = red["Korisnik"] || "SISTEM";
                    const naslov = red["Tekst"] || "BEZ NASLOVA";
                    const analiza = red["AI analiza"] || "Nema detalja";

                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-950 border border-zinc-800 rounded-2xl p-6 shadow-2xl mb-4";

                    kartica.innerHTML = `
                        <div class="flex justify-between items-center mb-6">
                            <div class="bg-zinc-800 px-3 py-1 rounded text-[9px] font-black text-zinc-400 uppercase tracking-widest">
                                USER: ${korisnik}
                            </div>
                            <div class="text-[10px] text-zinc-600 font-mono italic">
                                ${datum}
                            </div>
                        </div>

                        <h2 class="text-xl font-bold text-zinc-100 uppercase mb-4 tracking-tight">
                            ${naslov}
                        </h2>

                        <div class="bg-black/50 border border-zinc-900 rounded-xl p-4 relative">
                            <div class="absolute -top-2 left-4 bg-black px-2 text-[8px] text-zinc-600 font-bold uppercase tracking-widest">
                                Detalji kvara i analiza:
                            </div>
                            <p class="text-sm text-zinc-400 leading-relaxed italic">
                                ${analiza}
                            </p>
                        </div>
                    `;
                    lista.appendChild(kartica);
                });
            } catch (e) {
                console.error(e);
            }
        }

        // Pokreni odmah i postavi automatsko osvježavanje svakih 10 sekundi
        osvjeziPodatke();
        setInterval(osvjeziPodatke, 10000);
    </script>
</body>
</html>
