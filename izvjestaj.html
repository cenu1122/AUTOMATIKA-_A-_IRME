<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Live Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-red-edge { border-left: 4px solid #dc2626; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .live-dot { animation: blink 1.5s infinite; }
    </style>
</head>
<body class="bg-black text-gray-200 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto p-4">
        
        <a href="index.html" class="block w-full text-center bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-white py-4 rounded-xl mb-8 font-bold uppercase tracking-widest transition-all">
            ← NAZAD NA UNOS (POČETNA)
        </a>

        <header class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-red-600 tracking-tighter uppercase">Sistem Alarma v3</h1>
                <p id="update-time" class="text-[10px] text-zinc-500 font-mono uppercase">Učitavanje...</p>
            </div>
            <div class="flex items-center gap-2 bg-red-900/20 px-3 py-1 rounded-full border border-red-900/50">
                <span class="w-2 h-2 bg-red-600 rounded-full live-dot"></span>
                <span class="text-[10px] font-bold text-red-500 uppercase">Live Monitoring</span>
            </div>
        </header>

        <div id="alarm-list" class="space-y-6">
            <div class="text-center py-20 text-zinc-700 font-mono animate-pulse uppercase text-xs tracking-widest">
                Povezivanje sa bazom podataka...
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        async function fetchAlarms() {
            try {
                // Dodajemo timestamp na URL da spriječimo keširanje starih podataka
                const response = await fetch(`${API_URL}?_=${new Date().getTime()}`);
                const data = await response.json();
                const list = document.getElementById('alarm-list');
                
                if (!data || data.length === 0) {
                    list.innerHTML = `<div class="text-center p-12 border border-dashed border-zinc-800 text-zinc-600 uppercase text-xs">Baza podataka je prazna</div>`;
                    return;
                }

                // Uzmi zadnjih 20 zapisa i stavi najnoviji na vrh
                const recentData = data.slice(-20).reverse();
                
                list.innerHTML = '';
                recentData.forEach(item => {
                    // Izvlačenje podataka iz kolona B, C, D, E
                    const id = item.B || Object.values(item)[1] || "N/A";
                    const razlog = item.C || Object.values(item)[2] || "Nema opisa sastanka";
                    const detalji = item.D || Object.values(item)[3] || "";
                    const status = item.E || Object.values(item)[4] || "ALARM";

                    const card = document.createElement('div');
                    card.className = "bg-zinc-950 border border-zinc-900 rounded-lg p-5 card-red-edge shadow-2xl transition-transform active:scale-[0.98]";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] bg-red-600 text-white px-2 py-1 rounded font-black uppercase tracking-widest">ID: ${id}</span>
                            <span class="text-[10px] text-zinc-600 font-mono">STATUS: ${status}</span>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-[10px] text-red-500 uppercase font-bold mb-1">Razlog sastanka:</p>
                            <p class="text-sm text-zinc-100 font-semibold leading-snug">${razlog}</p>
                        </div>

                        <div class="bg-black/50 border border-zinc-900 rounded p-3">
                            <p class="text-[9px] text-zinc-600 uppercase font-bold mb-2">Vrijeme i detalji kvara:</p>
                            <p class="text-[11px] text-zinc-400 font-mono whitespace-pre-line leading-relaxed">${detalji}</p>
                        </div>
                    `;
                    list.appendChild(card);
                });

                document.getElementById('update-time').innerText = "Zadnje ažuriranje: " + new Date().toLocaleTimeString();

            } catch (error) {
                document.getElementById('alarm-list').innerHTML = `<div class="text-red-600 text-center text-xs p-10 uppercase">Greška pri spajanju na Google Sheets</div>`;
            }
        }

        // Pokreni odmah i svakih 30 sekundi
        fetchAlarms();
        setInterval(fetchAlarms, 30000);
    </script>
</body>
</html>
