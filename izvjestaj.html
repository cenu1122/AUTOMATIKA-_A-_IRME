<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Dijagnostika</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4 font-sans min-h-screen">

    <a href="index.html" class="block w-full bg-zinc-900 border border-zinc-700 text-center py-4 rounded-xl mb-8 font-bold uppercase tracking-widest">
        ← NAZAD NA UNOS
    </a>

    <header class="mb-10 border-b border-zinc-800 pb-4">
        <h1 class="text-2xl font-black text-red-600 tracking-tighter uppercase italic">DIJAGNOSTIKA BAZE</h1>
        <p id="status-veze" class="text-[10px] text-zinc-500 uppercase italic">Provjera konekcije...</p>
    </header>

    <div id="lista-alarma" class="space-y-6 text-left">
        </div>

    <script>
        async function ucitajSaProvjerom() {
            const lista = document.getElementById('lista-alarma');
            const statusVeze = document.getElementById('status-veze');

            try {
                const r = await fetch('https://sheetdb.io/api/v1/rjhvmuxlef6zk?t=' + Date.now());
                
                if (!r.ok) {
                    throw new Error("API ne odgovara (Status: " + r.status + ")");
                }

                const data = await r.json();
                statusVeze.innerText = "VEZA USPJEŠNA. PRONAĐENO REDOVA: " + data.length;

                if (!data || data.length === 0) {
                    lista.innerHTML = `
                        <div class="bg-red-900/20 border border-red-600 p-6 rounded-xl text-center">
                            <p class="text-red-600 font-black uppercase text-sm">GRESKA: Tabela je potpuno prazna!</p>
                        </div>`;
                    return;
                }

                lista.innerHTML = ''; // Čistimo ekran
                const prikaz = data.reverse();

                prikaz.forEach((red, i) => {
                    // DIJAGNOSTIKA: Uzimamo sve ključeve i vrijednosti
                    const kljucevi = Object.keys(red);
                    const vrijednosti = Object.values(red);

                    // Pokušaj pronalaska analize (tražimo bilo šta što liči na AI analiza)
                    let aiPodatak = "NEMA PODATKA U OVOJ KOLONI";
                    let pronadjeno = false;

                    // Provjera po imenu (case-insensitive)
                    kljucevi.forEach((k, index) => {
                        if (k.toLowerCase().includes('ai') || k.toLowerCase().includes('analiza')) {
                            if (vrijednosti[index] && vrijednosti[index].trim() !== "") {
                                aiPodatak = vrijednosti[index];
                                pronadjeno = true;
                            }
                        }
                    });

                    // Ako i dalje nemamo ništa, ispiši šta kod vidi u bazi
                    const debugInfo = pronadjeno ? "" : `<p class="text-[9px] text-yellow-600 mt-2 italic uppercase">Debug info: Dostupne kolone u bazi: ${kljucevi.join(', ')}</p>`;

                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-950 border border-zinc-800 rounded-2xl p-5 shadow-2xl mb-4";
                    
                    kartica.innerHTML = `
                        <div class="flex justify-between items-center mb-4 text-[10px] text-zinc-600">
                            <span class="font-bold uppercase text-red-600">ZAPIS #${prikaz.length - i}</span>
                            <span>PROVJERA KOLONE: AI ANALIZA</span>
                        </div>
                        
                        <div class="bg-black border ${pronadjeno ? 'border-zinc-800' : 'border-red-900/50'} p-4 rounded-xl">
                            <p class="text-sm ${pronadjeno ? 'text-zinc-300' : 'text-red-500 font-bold'} leading-relaxed whitespace-pre-wrap">
                                ${aiPodatak}
                            </p>
                        </div>
                        ${debugInfo}
                    `;
                    lista.appendChild(kartica);
                });

            } catch (error) {
                statusVeze.innerText = "GRESKA U KONEKCIJI";
                lista.innerHTML = `
                    <div class="bg-red-900/20 border border-red-600 p-6 rounded-xl">
                        <p class="text-red-600 font-black uppercase text-sm mb-2 text-center text-left">Problem sa internetom ili API-jem</p>
                        <p class="text-[10px] text-zinc-400 text-center text-left">${error.message}</p>
                    </div>`;
            }
        }

        ucitajSaProvjerom();
        setInterval(ucitajSaProvjerom, 10000);
    </script>
</body>
</html>
