<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation | Izvještaj</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a202c; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #2d3748; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #4a5568; text-align: center; }
        h2 { color: #63b3ed; margin-bottom: 10px; }
        #status-user { font-size: 0.9rem; color: #a0aec0; margin-bottom: 20px; }
        
        /* Alarm stil */
        #alarm-container { display: none; background: #742a2a; border: 1px solid #f56565; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 101, 101, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0); } }
        
        textarea { width: 100%; height: 150px; padding: 12px; border-radius: 6px; border: 1px solid #4a5568; background: #1a202c; color: white; box-sizing: border-box; resize: none; margin-bottom: 20px; font-size: 1rem; }
        .btn-send { width: 100%; padding: 15px; background-color: #48bb78; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn-send:hover { background-color: #38a169; }
        .btn-send:disabled { background-color: #4a5568; cursor: not-allowed; }
        .success-msg { color: #48bb78; margin-top: 15px; display: none; font-weight: bold; }
        .alarm-link { color: white; display: block; margin-top: 8px; text-decoration: underline; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>NH AI-Automation</h2>
        <div id="status-user">Prijavljeni ste kao: <span id="user-display">Učitavanje...</span></div>

        <!-- Alarm sekcija -->
        <div id="alarm-container">
            <span id="alarm-tekst" style="font-weight: bold; color: #feb2b2;"></span>
            <a class="alarm-link" onclick="prikaziDetaljeRoka()">Klikni za detalje o sastanku</a>
        </div>
        
        <textarea id="output" placeholder="Vaš izvještaj će se ovdje pojaviti nakon govora ili ga možete sami upisati..."></textarea>
        
        <button id="sendBtn" class="btn-send" onclick="posaljiIzvjestaj()">POŠALJI NA ANALIZU</button>
        
        <div id="successLabel" class="success-msg">✅ Izvještaj uspješno spremljen u Vaš list!</div>
    </div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyYvAft7j0Gl4z5gap1BgdyVN4HsJ0TX5MOHn0DOQ9yrDFQP7maKYt3kskqxDAU2Dp3nQ/exec";
    const trenutniKorisnik = "101"; 
    document.getElementById('user-display').innerText = trenutniKorisnik;

    window.onload = function() {
        ucitajSastankeBezKesa();
    };

    // --- FUNKCIJA ZA DOHVAĆANJE PODATAKA ---
    async function ucitajSastankeBezKesa() {
        const urlSaZastitom = scriptURL + "?user_id=" + trenutniKorisnik + "&nocache=" + new Date().getTime();
        try {
            const response = await fetch(urlSaZastitom);
            const sastanci = await response.json();

            const container = document.getElementById('alarm-container');
            container.innerHTML = ''; 
            container.style.display = 'none';

            if (sastanci && sastanci.length > 0) {
                sastanci.forEach(sastanak => {
                    prikaziViseAlarma(sastanak.samo_datum, sastanak.ai_analiza);
                });
            }
        } catch (e) {
            console.error("Greška pri učitavanju alarma:", e);
        }
    }

    // --- LOGIKA ZA PRIKAZ VIŠE ALARMA ---
    function prikaziViseAlarma(datumString, kompletanTekst) {
    // Čistimo datum od zvjezdica i oznaka ako postoje
    let cistiDatum = datumString.replace(/\*/g, "").replace("1. DATUM:", "").trim();
    const rok = new Date(cistiDatum);
    const sad = new Date();
    const razlikaSati = (rok - sad) / (1000 * 60 * 60);

    // Provjera termina u idućih 24h
    if (razlikaSati > 0 && razlikaSati <= 24) {
        const container = document.getElementById('alarm-container');
        container.style.display = 'block';

        let razlog = "Sastanak/Obaveza";
        
        // POPRAVKA: Provjeravamo i obični i bold format (sa zvjezdicama)
        if (kompletanTekst) {
            if (kompletanTekst.includes("2. **DETALJ**:")) {
                razlog = kompletanTekst.split("2. **DETALJ**:")[1].split("\n")[0].trim();
            } else if (kompletanTekst.includes("2. DETALJ:")) {
                razlog = kompletanTekst.split("2. DETALJ:")[1].split("\n")[0].trim();
            }
        }

        const noviAlarm = document.createElement('div');
        noviAlarm.style.borderBottom = "1px solid #f56565";
        noviAlarm.style.padding = "10px 0";
        noviAlarm.style.textAlign = "left";
        
        const vrijemeMatch = cistiDatum.match(/\d{2}:\d{2}/);
        const vrijemePrikaz = vrijemeMatch ? vrijemeMatch[0] : "";

        noviAlarm.innerHTML = `
            <div style="font-weight: bold; color: #feb2b2;">
                ${razlikaSati <= 1 ? "🚨 HITNO" : "⚠️ PODSJETNIK"}: ${razlog} (u ${vrijemePrikaz})
            </div>
            <a class="alarm-link" style="color: white; cursor: pointer; text-decoration: underline; font-size: 0.85rem; display: block; margin-top: 5px;" 
               onclick="alert('Detalji termina:\\n${kompletanTekst.replace(/'/g, "\\'").replace(/\n/g, "\\n")}');">
               Klikni za detalje izvještaja
            </a>
        `;
        container.appendChild(noviAlarm);
    }
}

    // --- FUNKCIJA ZA SLANJE IZVJEŠTAJA (KOJA JE FALILA) ---
    async function posaljiIzvjestaj() {
        const tekst = document.getElementById('output').value.trim();
        const btn = document.getElementById('sendBtn');
        const label = document.getElementById('successLabel');

        if(!tekst) { alert("Prvo unesite tekst!"); return; }

        btn.disabled = true;
        btn.innerText = "Spremanje...";

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({ user_id: trenutniKorisnik, tekst: tekst })
            });

            label.style.display = "block";
            btn.innerText = "POSLANO";
            
            setTimeout(() => {
                label.style.display = "none";
                btn.disabled = false;
                btn.innerText = "POŠALJI NA ANALIZU";
                document.getElementById('output').value = "";
                ucitajSastankeBezKesa(); // Osvježi listu alarma odmah
            }, 3000);
        } catch (e) {
            alert("Greška pri slanju!");
            btn.disabled = false;
        }
    }
</script>
</html>
