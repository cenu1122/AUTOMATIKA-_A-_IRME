<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Upis i Pregled</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            <div class="bg-black border border-zinc-800 px-4 py-2 rounded-xl text-center">
                <span class="text-[9px] text-zinc-500 uppercase font-bold block">Zapisa u bazi:</span>
                <h2 id="brojac-zapisa" class="text-red-500 font-black text-lg">0</h2>
            </div>
            <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2.5 px-4 rounded-xl text-xs uppercase">Odjavi se</button>
        </div>

        <!-- Forma -->
        <div class="bg-zinc-900 border border-red-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-red-600 font-black text-xl uppercase italic mb-4">Novi Upis u "korisnici"</h2>
            <form id="alarm-forma" class="space-y-4">
                <input type="text" id="naslov" required placeholder="Naslov izvještaja" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white">
                <div class="grid grid-cols-2 gap-4">
                    <input type="email" id="email" required placeholder="Email" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white">
                    <input type="text" id="telefon" required placeholder="Telefon" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white">
                </div>
                <textarea id="detalji" rows="3" required placeholder="Detaljna analiza..." class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white"></textarea>
                <button type="submit" id="btn-slanje" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl uppercase italic">POŠALJI U GOOGLE TABELU</button>
            </form>
        </div>

        <h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter">SVI ZAPISI IZ BAZE</h1>
        <div id="svi-izvjestaji" class="space-y-6"></div>
    </div>

    <script>
        // KONFIGURACIJA
        const CONFIG = {
            SHEET_NAME: "korisnici", 
            API_BASE: 'https://sheetdb.io/api/v1/rjhvmuxlef6zk'
        };
        const API_URL = `${CONFIG.API_BASE}?sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;
        
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        // SLANJE PODATAKA
        document.getElementById('alarm-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const data = {
                "Datum": new Date().toLocaleString('hr-BA'),
                "Korisnik ID": firmaId,
                "Tekst izvještaja": document.getElementById('naslov').value,
                "Email": document.getElementById('email').value,
                "Telefon": document.getElementById('telefon').value,
                "AI Analiza": document.getElementById('detalji').value
            };
            btn.innerText = "SLANJE..."; btn.disabled = true;
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ data: [data] }) 
                });
                if(res.ok) { 
                    alert("Uspješno poslano!"); 
                    document.getElementById('alarm-forma').reset(); 
                    await ucitajSvePodatke(); 
                }
            } catch (err) { alert("Greška pri slanju!"); } finally { btn.innerText = "POŠALJI U GOOGLE TABELU"; btn.disabled = false; }
        });

        // UČITAVANJE PODATAKA
        async function ucitajSvePodatke() {
    try {
        // Dodajemo limit=1000 kako bismo bili sigurni da SheetDB ne "reže" listu
        const res = await fetch(API_URL + "&limit=1000"); 
        const podaci = await res.json();
        
        console.log("Dohvaćeni podaci:", podaci); // Ovo će vam u konzoli (F12) pokazati što točno stiže

        // Provjera ako podaci nisu niz (array)
        if (!Array.isArray(podaci)) {
            console.error("Podaci nisu u ispravnom formatu:", podaci);
            return;
        }

        document.getElementById("brojac-zapisa").innerText = podaci.length;
        
        // Prikaz svih redova
        document.getElementById("svi-izvjestaji").innerHTML = podaci.map(z => `
            <div class="bg-zinc-950 border border-zinc-800 p-4 rounded-xl">
                <h4 class="text-white font-bold text-sm">${z["Tekst izvještaja"] || 'Bez naslova'}</h4>
                <p class="text-zinc-400 text-xs">${z["AI Analiza"] || 'Nema detalja'}</p>
                <span class="text-[9px] text-zinc-600">Kontakt: ${z.Email || 'Nema maila'} | ${z.Telefon || 'Nema telefona'}</span>
            </div>
        `).join('');
    } catch(e) { 
        console.error("Greška pri učitavanju:", e); 
    }
}</body>
</html>
