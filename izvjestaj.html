<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Izvještaj</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-200 min-h-screen font-sans">

    <div class="max-w-2xl mx-auto p-4">
        
        <a href="index.html" class="block w-full text-center bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 text-white py-4 rounded-xl mb-8 font-bold uppercase tracking-widest transition-all">
            ← NAZAD NA UNOS (POČETNA)
        </a>

        <header class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-red-600 tracking-tighter uppercase">SISTEM ALARMA V3</h1>
                <p class="text-[10px] text-zinc-500 uppercase">PRIKAZ ZADNJIH ZAPISA IZ BAZE</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-red-500 uppercase">Live</span>
            </div>
        </header>

        <div id="alarm-list" class="space-y-6">
            <div class="text-center py-20 text-zinc-700 font-mono animate-pulse uppercase text-xs">
                Učitavanje podataka...
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        async function fetchAlarms() {
            try {
                // Uzimamo podatke direktno
                const response = await fetch(API_URL);
                const data = await response.json();
                const list = document.getElementById('alarm-list');
                
                if (!data || data.length === 0) {
                    list.innerHTML = `<div class="text-center p-12 text-zinc-600 uppercase text-xs">Tabela je prazna</div>`;
                    return;
                }

                // Uzmi zadnjih 15 redova bez ikakvog filtriranja datuma
                const recentData = data.slice(-15).reverse();
                
                list.innerHTML = '';
                recentData.forEach(item => {
                    // Mapiranje kolona: B=ID, C=Razlog, D=Detalji/Datum
                    const id = item.B || "N/A";
                    const razlog = item.C || "Bez naslova";
                    const detalji = item.D || "Nema detalja";

                    const card = document.createElement('div');
                    card.className = "bg-zinc-950 border-l-4 border-red-600 border-y border-r border-zinc-900 rounded-r-lg p-5 shadow-2xl";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] bg-red-600 text-white px-2 py-0.5 rounded font-black uppercase">ID: ${id}</span>
                        </div>
                        
                        <div class="mb-3">
                            <h2 class="text-lg text-zinc-100 font-bold leading-tight uppercase">${razlog}</h2>
                        </div>

                        <div class="bg-black/40 border border-zinc-900 rounded p-3 text-left">
                            <p class="text-[11px] text-zinc-400 font-mono whitespace-pre-line">${detalji}</p>
                        </div>
                    `;
                    list.appendChild(card);
                });

            } catch (error) {
                document.getElementById('alarm-list').innerHTML = `<div class="text-red-600 text-center text-xs">Greška u konekciji</div>`;
            }
        }

        // Pokreni odmah
        fetchAlarms();
        // Osvježavaj svakih 20 sekundi
        setInterval(fetchAlarms, 20000);
    </script>
</body>
</html>
