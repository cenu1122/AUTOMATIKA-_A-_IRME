<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>CRM AI SYSTEM</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6 font-sans">

<div class="max-w-5xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6">

<h2 id="firma" class="text-blue-400 font-bold text-xl">Loading...</h2>

<div>
📊 <span id="brojac" class="text-red-500 font-bold">0</span>
</div>

</div>

<!-- FORM -->
<div class="bg-zinc-900 p-5 rounded-xl border border-red-600/30 mb-8">

<form id="form" class="space-y-3">

<input id="naslov" class="w-full p-3 bg-black border rounded" placeholder="NASLOV">

<textarea id="pitanje" class="w-full p-3 bg-black border rounded" placeholder="PITANJE"></textarea>

<input id="email" class="w-full p-3 bg-black border rounded" placeholder="EMAIL">

<input id="telefon" class="w-full p-3 bg-black border rounded" placeholder="TELEFON">

<button type="submit" class="w-full bg-red-600 p-3 font-bold rounded">
POŠALJI
</button>

</form>

</div>

<!-- LISTA -->
<div id="lista" class="space-y-4"></div>

</div>

<script>

// ================= CONFIG =================
const API = "https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/groq-chat";
const SHEETDB = "https://sheetdb.io/api/v1/4u3goec782bvg";

const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
document.getElementById("firma").innerText = firmaId;

// ================= AI =================
async function callAI(text){
try {
const res = await fetch(API, {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({ poruka: text })
});

const data = await res.json();
return data.odgovor || "Nema AI odgovora";

} catch {
return "AI greška";
}
}

// ================= SUBMIT =================
document.getElementById("form").addEventListener("submit", async (e) => {
e.preventDefault();

try {

const naslov = document.getElementById("naslov").value;
const pitanje = document.getElementById("pitanje").value;
const email = document.getElementById("email").value;
const telefon = document.getElementById("telefon").value;

// AI
const ai = await callAI(naslov + " | " + pitanje);

// SAVE
await fetch(SHEETDB, {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
data:[{
"Datum": new Date().toLocaleString(),
"Korisnik ID": firmaId,
"NASLOV": naslov,
"PITANJE": pitanje,
"Email": email,
"Telefon": telefon,
"AI Analiza": ai,
"ODGOVOR GAZDE": "",
"ODGOVOR DIREKTORA": "",
"STATUS": "NOVO"
}]
})
});

document.getElementById("form").reset();
load();

} catch(err){
alert("Greška: " + err.message);
}

});

// ================= LOAD =================
async function load(){

try {

const res = await fetch(SHEETDB);
const json = await res.json();

const data = json.data || json;

// FILTER (samo tvoje firme)
const moji = data.filter(x => x["Korisnik ID"] === firmaId);

// BROJAČ
document.getElementById("brojac").innerText = moji.length;

// LISTA
document.getElementById("lista").innerHTML =
moji.reverse().map(x => `

<div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700">

<div class="text-blue-400 font-bold text-lg">
${x.NASLOV || "Bez naslova"}
</div>

<div class="text-white mt-2">
❓ ${x.PITANJE || "Nema pitanja"}
</div>

<div class="text-green-400 mt-2">
🤖 AI: ${x["AI Analiza"] || "Nema AI"}
</div>

<div class="text-yellow-400 mt-2">
👨‍💼 Gazda: ${x["ODGOVOR GAZDE"] || "Čeka"}
</div>

<div class="text-red-400 mt-2">
🏢 Direktor: ${x["ODGOVOR DIREKTORA"] || "Čeka"}
</div>

<div class="text-gray-400 mt-2 text-sm">
📊 ${x.STATUS || "NOVO"}
</div>

<div class="text-gray-500 text-xs mt-2">
${x.Datum || ""}
</div>

</div>

`).join("");

} catch(err){
console.log(err);
}

}

load();
setInterval(load, 5000);

// ================= LOGOUT =================
function odjaviSe(){
localStorage.removeItem("prijavljenaFirma");
location.reload();
}

</script>

</body>
</html>
