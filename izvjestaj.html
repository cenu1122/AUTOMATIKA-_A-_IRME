<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Alarm Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans">

    <div class="max-w-2xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6 border-b border-red-900 pb-4">
            <div>
                <h1 class="text-xl font-bold text-red-500 uppercase tracking-tighter">Sistem Alarma v3</h1>
                <p class="text-xs text-gray-500" id="current-date-display"></p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-red-600 rounded-full pulse"></span>
                <span class="text-[10px] font-bold text-red-600 uppercase">Live</span>
            </div>
        </header>

        <div id="alarm-container" class="space-y-4">
            <div class="text-center py-20 text-gray-600">Povezivanje sa bazom podataka...</div>
        </div>
    </div>

    <script>
        // TVOJ LINK SA SLIKE
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        async function osvjeziAlarme() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const container = document.getElementById('alarm-container');
                
                // 1. Dobijanje datuma za filtriranje (format: May 7, 2026)
                // Na tvojoj slici datum u koloni D je u formatu "Month Day, Year"
                const opcije = { month: 'short', day: 'numeric', year: 'numeric' };
                let danas = new Date().toLocaleDateString('en-US', opcije).replace(',', '');
                // Napomena: pošto JS daje 'May 7 2026', a u tabeli može biti 'May 7, 2026', 
                // koristićemo samo mesec i dan za sigurnost
                const mesecDan = danas.split(' ').slice(0, 2).join(' '); 

                // 2. Filtriranje - tražimo datum unutar kolone D
                const filtrirano = data.filter(red => {
                    const kolonaD = red.D || Object.values(red)[3] || "";
                    return kolonaD.includes(mesecDan);
                });

                if (filtrirano.length === 0) {
                    container.innerHTML = `<div class="text-center p-10 border border-gray-800 rounded text-gray-600 italic">
                        Nema aktivnih alarma za danas (${mesecDan}).
                    </div>`;
                    return;
                }

                // 3. Prikaz
                container.innerHTML = '';
                filtrirano.reverse().forEach(alarm => {
                    const tekstD = alarm.D || Object.values(alarm)[3] || "";
                    const status = alarm.C || Object.values(alarm)[2] || "Nepoznato";
                    const id = alarm.B || Object.values(alarm)[1] || "---";

                    const card = document.createElement('div');
                    card.className = "bg-gray-900 border border-gray-800 p-4 rounded-lg shadow-2xl relative overflow-hidden";
                    card.innerHTML = `
                        <div class="absolute top-0 left-0 w-1 h-full bg-red-600"></div>
                        <div class="flex justify-between text-[10px] mb-2">
                            <span class="text-red-500 font-bold">ID: ${id}</span>
                            <span class="text-gray-600 uppercase tracking-widest font-mono">Incident Report</span>
                        </div>
                        <h2 class="text-white font-bold mb-3 uppercase tracking-tight">${status}</h2>
                        <div class="text-xs text-gray-400 font-mono leading-relaxed bg-black/50 p-3 rounded border border-gray-800/50">
                            ${tekstD.replace(/\n/g, '<br>')}
                        </div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('current-date-display').innerText = "Zadnje ažuriranje: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error(err);
                document.getElementById('alarm-container').innerHTML = "Greška u konekciji.";
            }
        }

        // Pokreni odmah i postavi refresh na 30 sekundi
        osvjeziAlarme();
        setInterval(osvjeziAlarme, 30000);
    </script>
</body>
</html>
