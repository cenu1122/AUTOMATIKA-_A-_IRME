<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-4 font-sans min-h-screen">

    <a href="index.html" class="block w-full bg-zinc-900 border border-zinc-700 text-center py-4 rounded-xl mb-8 font-bold uppercase">
        ← NAZAD NA UNOS
    </a>

    <header class="mb-10 border-b border-zinc-800 pb-4">
        <h1 class="text-2xl font-black text-red-600 tracking-tighter uppercase italic">SISTEM ALARMA V3 - FIX</h1>
    </header>

    <div id="lista-alarma" class="space-y-6 text-left">
        <p class="text-zinc-700 text-center py-20 animate-pulse text-xs uppercase">Provjera baze...</p>
    </div>

    <script>
        async function ucitajPodatke() {
            try {
                // Dodajemo timestamp da izbjegnemo staru sliku stranice (cache)
                const r = await fetch('https://sheetdb.io/api/v1/rjhvmuxlef6zk?t=' + Date.now());
                const data = await r.json();
                const lista = document.getElementById('lista-alarma');

                if (!data || data.length === 0) {
                    lista.innerHTML = "Baza je prazna na SheetDB-u.";
                    return;
                }

                const prikaz = data.reverse();
                lista.innerHTML = '';

                prikaz.forEach((red, index) => {
                    // PROBLEM FIX: Uzimamo sve vrijednosti iz reda kao listu
                    const kolone = Object.values(red);
                    
                    // Bez obzira na naziv, uzimamo podatke po redoslijedu u tabeli:
                    const datum = kolone[0] || "Nema datuma";
                    const korisnik = kolone[1] || "Sistem";
                    const naslov = kolone[2] || "Bez naslova";
                    const analiza = kolone[3] || "Nema analize"; // Ovo je tvoja 4. kolona (D)

                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-950 border border-zinc-800 rounded-2xl p-5 mb-4 shadow-2xl";

                    kartica.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] text-red-600 font-black uppercase">USER: ${korisnik}</span>
                            <span class="text-[10px] text-zinc-600 font-mono">${datum}</span>
                        </div>
                        <h2 class="text-lg font-bold text-zinc-100 uppercase mb-3">${naslov}</h2>
                        <div class="bg-black p-4 rounded-xl border border-zinc-900 shadow-inner">
                            <p class="text-sm text-zinc-400 leading-relaxed whitespace-pre-wrap">${analiza}</p>
                        </div>
                    `;
                    lista.appendChild(kartica);
                });
            } catch (e) {
                document.getElementById('lista-alarma').innerHTML = "Greška: Ne mogu povući podatke.";
            }
        }

        ucitajPodatke();
        setInterval(ucitajPodatke, 10000); // Osvježavaj svakih 10 sekundi
    </script>
</body>
</html>
