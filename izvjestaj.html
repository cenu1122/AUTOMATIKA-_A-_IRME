<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Upis i Pregled</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer focus:border-blue-500">
                    <option value="izvjestaj.html" selected>📋 Pregled Izvještaja</option>
                    <option value="ugovori.html">🤖 AI Generator Ugovora</option>
                    <option value="fakture.html">💰 AI Generator Faktura</option>
                    <option value="cv-generator.html">📄 AI CV / Biografija Generator</option>
                    <option value="email-generator.html">✉️ AI Email / Pismo Generator</option>
                    <option value="ponuda-generator.html">📊 AI Generator Ponuda / Predračuna</option>
                    <option value="zapisnik-generator.html">📝 AI Zapisnik sa Sastanka</option>
                </select>

                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white font-bold py-2.5 px-4 rounded-xl text-xs uppercase transition">
                    Odjavi se
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <button onclick="generisiUgovorKlijentu()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-emerald-600/20 text-center text-sm">
                📄 Preuzmi ugovor o saradnji
            </button>

            <button onclick="generisiFakturu()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-blue-600/20 text-center text-sm">
    💰 Generiši Fakturu
</button>
            
            <button onclick="pokreniAlarm()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-amber-500/20 text-center text-sm">
                🚨 Aktiviraj hitan AI alarm
            </button>
        </div>

        <div class="bg-zinc-900 border border-red-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-red-600 font-black text-xl uppercase italic mb-4">Novi Upis u Tabelu</h2>
            <form id="alarm-forma" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Naslov izvještaja:</label>
                    <input type="text" id="naslov" required placeholder="npr. Servis reduktora" 
                           class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none transition text-white">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Detaljna Analiza:</label>
                    <textarea id="detalji" rows="3" required placeholder="Opiši kvar ili status..." 
                              class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none transition text-white"></textarea>
                </div>
                <button type="submit" id="btn-slanje" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-red-600/20">
                    POŠALJI U GOOGLE TABELU
                </button>
            </form>
        </div>

        <hr class="border-zinc-800 mb-12">

        <h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter">SVI ZAPISI IZ BAZE</h1>
        <div id="svi-izvjestaji" class="space-y-6">
            <p class="text-zinc-500 animate-pulse uppercase text-xs text-center">Učitavam podatke...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        // 1. SLANJE PODATAKA
        document.getElementById('alarm-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const naslov = document.getElementById('naslov').value;
            const detalji = document.getElementById('detalji').value;

            btn.innerText = "SLANJE U TOKU...";
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [{"Datum": new Date().toLocaleString('hr-BA'), "Korisnik ID": firmaId, "Tekst izvještaja": naslov, "AI Analiza": detalji}] })
                });
                if(res.ok) {
                    alert("Podaci uspješno upisani!");
                    document.getElementById('alarm-forma').reset();
                    await ucitajSvePodatke(); 
                }
            } catch (err) { alert("Greška: " + err.message); } finally { btn.innerText = "POŠALJI U GOOGLE TABELU"; btn.disabled = false; }
        });

        // Kada generišeš fakturu, umjesto običnog teksta, kreiraj ovakvu strukturu:
// --- OVAKO TREBA DA IZGLEDA FUNKCIJA ---
function generisiFakturu() {
    const prozorFakture = window.open('', '_blank');
    prozorFakture.document.write(`
    <html>
    <head>
        <style>
            body { font-family: Arial, sans-serif; padding: 20px; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid #000; padding: 8px; text-align: left; }
            th { background-color: #f2f2f2; }
            .totals { margin-top: 20px; font-weight: bold; }
        </style>
    </head>
    <body>
        <h2>FAKTURA</h2>
        <table>
            <thead>
                <tr>
                    <th>R. br.</th>
                    <th>Opis usluge</th>
                    <th>Količina</th>
                    <th>Cijena po jed.</th>
                    <th>Ukupno</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Ekseri (10kg)</td>
                    <td>10 kg</td>
                    <td>5,00 KM</td>
                    <td>50,00 KM</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Daske</td>
                    <td>2 kubika</td>
                    <td>600,00 KM</td>
                    <td>1.200,00 KM</td>
                </tr>
            </tbody>
        </table>
        <div class="totals">
            <p>Ukupno bez PDV-a: 1.250,00 KM</p>
            <p>PDV (17%): 212,50 KM</p>
            <p>UKUPNO SA PDV-om: 1.462,50 KM</p>
        </div>
    </body>
    </html>
`);
    prozorFakture.document.close();
}

        // 3. POMOĆNE FUNKCIJE
        function generisiUgovorKlijentu() { /* ... tvoj kod za ugovor ... */ alert("Generisanje ugovora..."); }
        function pokreniAlarm() { alert("🚨 ALARM ZA: " + firmaId); }
        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }
        function zapamtiKlijenta(ime) { localStorage.setItem('zadnjiKlijent', ime); }
        function provjeriCijenuNaNetu(predmet) { window.open(`https://www.google.com/search?q=cijena+za+${encodeURIComponent(predmet)}`, '_blank'); }

        ucitajSvePodatke();
        setInterval(ucitajSvePodatke, 30000);
    </script>
</body>
</html>
