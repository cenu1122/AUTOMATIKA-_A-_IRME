<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Alarma - Svi Izvještaji</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter">SVI ZAPISI IZ BAZE</h1>
        
        <div id="svi-izvjestaji" class="space-y-6">
            <p class="text-zinc-500 animate-pulse uppercase text-xs">Povezivanje sa bazom...</p>
        </div>
    </div>

    <script>
        async function ucitajSvePodatke() {
            const kontejner = document.getElementById('svi-izvjestaji');
            try {
                // Pozivamo tvoj SheetDB API
                const odgovor = await fetch('https://sheetdb.io/api/v1/rjhvmuxlef6zk?t=' + Date.now());
                const podaci = await odgovor.json();

                if (!podaci || podaci.length === 0) {
                    kontejner.innerHTML = "Tabela je prazna.";
                    return;
                }

                // Okrećemo redoslijed tako da najnoviji unosi (kao taj "Reduktor") budu na vrhu
                const poredaniPodaci = podaci.reverse();
                
                kontejner.innerHTML = '';

                poredaniPodaci.forEach((red, index) => {
                    // Uzimamo podatke po ključevima koje smo vidjeli u JSON-u
                    const datum = red["Datum"] || "Nepoznato";
                    const korisnik = red["Korisnik"] || "101";
                    const tekst = red["Tekst"] || "Bez naslova";
                    const analiza = red["AI analiza"] || "Nema detalja";

                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl hover:border-red-600/50 transition duration-300";
                    
                    kartica.innerHTML = `
                        <div class="flex justify-between items-start mb-4 border-b border-zinc-800 pb-2">
                            <span class="text-red-500 font-black text-xs uppercase italic">ZAPIS #${podaci.length - index}</span>
                            <span class="text-zinc-500 font-mono text-[10px]">${datum}</span>
                        </div>
                        
                        <div class="mb-4">
                            <h2 class="text-zinc-400 text-[10px] uppercase font-bold tracking-widest mb-1">Status Sastanka:</h2>
                            <p class="text-xl font-bold text-white uppercase italic">${tekst}</p>
                        </div>

                        <div class="bg-black/40 p-4 rounded-xl border border-zinc-800/50">
                            <h3 class="text-red-600/70 text-[9px] uppercase font-black mb-2 tracking-widest italic">Detalji iz tabele:</h3>
                            <p class="text-sm text-zinc-300 leading-relaxed font-mono whitespace-pre-line">${analiza}</p>
                        </div>

                        <div class="mt-4 text-right">
                            <span class="text-[9px] text-zinc-700 font-bold uppercase tracking-widest">ID Korisnika: ${korisnik}</span>
                        </div>
                    `;
                    kontejner.appendChild(kartica);
                });

            } catch (greska) {
                kontejner.innerHTML = "<p class='text-red-600 uppercase font-black'>Greška pri učitavanju: " + greska.message + "</p>";
            }
        }

        ucitajSvePodatke();
        // Osvježava automatski svakih 30 sekundi da vidiš nove unose iz tabele
        setInterval(ucitajSvePodatke, 30000);
    </script>
</body>
</html>
