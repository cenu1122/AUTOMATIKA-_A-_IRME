<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Izvještaj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans min-h-screen">

    <div class="max-w-2xl mx-auto p-4 pb-20">
        
        <div class="mb-6">
            <a href="index.html" class="flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl transition-all shadow-lg font-bold uppercase tracking-widest">
                ← NAZAD NA GLAVNU STRANICU
            </a>
        </div>

        <header class="flex justify-between items-center mb-6 border-b border-red-900/50 pb-4">
            <div>
                <h1 class="text-xl font-bold text-red-500 uppercase tracking-tighter">Sistem Alarma v3</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Pregled zadnjih zapisa</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full pulse"></span>
                <span class="text-[10px] font-bold text-red-600 uppercase">Live</span>
            </div>
        </header>

        <div id="alarm-container" class="space-y-4">
            <div class="text-center py-20 text-gray-600 animate-pulse text-sm">Učitavanje podataka...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        async function osvjeziAlarme() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('alarm-container');

                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="text-center p-10 text-gray-600 italic">Nema podataka u tabeli.</div>`;
                    return;
                }

                // Uzimamo zadnjih 50 unosa da bi bili sigurni da će se pojaviti na ekranu
                const prikazaniAlarmi = data.slice(-50).reverse();

                container.innerHTML = '';
                prikazaniAlarmi.forEach(alarm => {
                    const tekstD = alarm.D || Object.values(alarm)[3] || "Nema opisa";
                    const statusE = alarm.E || Object.values(alarm)[4] || "ALARM";
                    const razlogC = alarm.C || Object.values(alarm)[2] || "Nema razloga";
                    const id = alarm.B || Object.values(alarm)[1] || "---";

                    const card = document.createElement('div');
                    card.className = "bg-zinc-950 border border-zinc-900 p-4 rounded-lg relative mb-4 shadow-xl cursor-pointer hover:border-red-600 transition-all";
                    
                    // Klik na karticu izbacuje razlog iz kolone C
                    card.onclick = () => alert("DETALJI IZ KOLONE C:\n\n" + razlogC);

                    card.innerHTML = `
                        <div class="absolute top-0 left-0 w-1 h-full bg-red-600"></div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] bg-red-950 text-red-500 px-2 py-0.5 rounded font-bold uppercase">ID: ${id}</span>
                        </div>
                        <h2 class="text-white font-bold text-sm uppercase tracking-tight">${statusE}</h2>
                        <div class="text-[11px] text-zinc-400 font-mono mt-3 bg-black p-3 rounded border border-zinc-900/50 leading-relaxed">
                            ${tekstD}
                        </div>
                        <p class="text-[8px] text-zinc-700 mt-2 text-right">Klikni za razlog sastanka</p>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                document.getElementById('alarm-container').innerHTML = `<div class="text-red-600 text-center">Greška pri učitavanju.</div>`;
            }
        }

        osvjeziAlarme();
        setInterval(osvjeziAlarme, 30000);
    </script>
</body>
</html>
