<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Alarma - Live Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .pulse { animation: pulse-red 2s infinite; }
        .alarm-card { cursor: pointer; transition: all 0.2s; }
        .alarm-card:hover { transform: translateY(-2px); border-color: #dc2626; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans min-h-screen">

    <div class="max-w-2xl mx-auto p-4 pb-20">
        
        <div class="mb-6">
            <a href="index.html" class="flex items-center justify-center gap-2 bg-zinc-900 border border-zinc-700 hover:bg-red-900 text-white py-4 rounded-xl transition-all shadow-lg">
                <span class="text-sm font-bold uppercase tracking-widest">← NAZAD NA UNOS (POČETNA)</span>
            </a>
        </div>

        <header class="flex justify-between items-center mb-6 border-b border-red-900/50 pb-4">
            <div>
                <h1 class="text-xl font-bold text-red-500 uppercase tracking-tighter">Sistem Alarma v3</h1>
                <p class="text-[10px] text-gray-500">KLIKNI NA ALARM ZA DETALJE SASTANKA</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full pulse"></span>
                <span class="text-[10px] font-bold text-red-600 uppercase">Live</span>
            </div>
        </header>

        <div id="alarm-container" class="space-y-4">
            <div class="text-center py-20 text-gray-600 animate-pulse text-sm">Učitavanje podataka...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        async function osvjeziAlarme() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('alarm-container');

                const sad = new Date().getTime();
                const prije24h = sad - (24 * 60 * 60 * 1000);

                // Filtriranje i čišćenje datuma
                const filtrirano = data.filter(red => {
                    let tekstD = red.D || Object.values(red)[3] || "";
                    // Izvlačenje datuma iz formata "1. **DATUM**: May 8, 2026 11:00"
                    let cistiDatum = tekstD.replace(/1\.\s\*\*DATUM\*\*:\s*/i, "").split('\n')[0].trim();
                    let datumAlarma = new Date(cistiDatum).getTime();
                    
                    return !isNaN(datumAlarma) && datumAlarma > prije24h;
                });

                if (filtrirano.length === 0) {
                    container.innerHTML = `<div class="text-center p-10 border border-gray-800 text-gray-600 italic text-sm">Nema novih alarma u zadnjih 24h.</div>`;
                    return;
                }

                // Sortiranje (najnoviji prvi)
                filtrirano.sort((a, b) => {
                    let d1 = new Date((a.D || "").replace(/1\.\s\*\*DATUM\*\*:\s*/i, "").split('\n')[0]).getTime();
                    let d2 = new Date((b.D || "").replace(/1\.\s\*\*DATUM\*\*:\s*/i, "").split('\n')[0]).getTime();
                    return d2 - d1;
                });

                container.innerHTML = '';
                filtrirano.forEach(alarm => {
                    const tekstD = alarm.D || Object.values(alarm)[3] || "";
                    const razlogC = alarm.C || Object.values(alarm)[2] || "Nema razloga";
                    const statusE = alarm.E || Object.values(alarm)[4] || "STATUS";
                    const id = alarm.B || Object.values(alarm)[1] || "---";

                    const card = document.createElement('div');
                    card.className = "alarm-card bg-zinc-950 border border-zinc-900 p-4 rounded-lg relative shadow-md";
                    
                    // Funkcija na klik koja izbacuje razlog iz kolone C
                    card.onclick = () => {
                        alert("RAZLOG SASTANKA:\n\n" + razlogC);
                    };

                    card.innerHTML = `
                        <div class="absolute top-0 left-0 w-1 h-full bg-red-600"></div>
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] font-bold text-red-500">ID: ${id}</span>
                            <span class="text-[9px] text-zinc-500 uppercase font-mono">Zadnjih 24h</span>
                        </div>
                        <h2 class="text-white font-bold text-sm mb-2 uppercase">${statusE}</h2>
                        <div class="text-[11px] text-zinc-400 font-mono bg-black/40 p-3 rounded border border-zinc-800 whitespace-pre-line">
                            ${tekstD}
                        </div>
                        <p class="text-[9px] text-red-900 mt-2 text-right">Klikni za više detalja...</p>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                container.innerHTML = `<div class="text-red-500 text-center">Greška pri učitavanju.</div>`;
            }
        }

        osvjeziAlarme();
        setInterval(osvjeziAlarme, 30000);
    </script>
</body>
</html>
