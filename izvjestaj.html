<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Alarma - Scan Kolona</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-8 font-sans">

    <h1 class="text-red-600 font-black text-2xl italic mb-6 uppercase">Scanner Strukture Tabele</h1>
    
    <div id="debug-panel" class="space-y-6">
        <p class="text-zinc-500 animate-pulse text-xs uppercase">Skeniranje baze u toku...</p>
    </div>

    <script>
        async function skenirajKolone() {
            const panel = document.getElementById('debug-panel');
            try {
                // Pozivamo tvoj SheetDB API
                const r = await fetch('https://sheetdb.io/api/v1/rjhvmuxlef6zk?t=' + Date.now());
                const data = await r.json();

                if (!data || data.length === 0) {
                    panel.innerHTML = "<p class='text-yellow-500 font-bold'>TABELA JE PRAZNA - Dodaj barem jedan red u Excel!</p>";
                    return;
                }

                // Uzimamo nazive kolona iz prvog reda podataka
                const naziviKolona = Object.keys(data[0]);
                const vrijednosti = Object.values(data[0]);

                let html = `
                    <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl shadow-2xl">
                        <h2 class="text-green-500 font-bold mb-4 uppercase text-sm italic">Pronađeno u bazi:</h2>
                        <ul class="space-y-4">
                `;

                naziviKolona.forEach((naziv, index) => {
                    html += `
                        <li class="border-b border-zinc-800 pb-2">
                            <span class="text-zinc-500 text-[10px] block uppercase font-black">Kolona #${index + 1}</span>
                            <span class="text-red-500 font-mono font-bold text-lg italic">"${naziv}"</span>
                            <span class="text-zinc-400 text-xs block mt-1">Trenutni sadržaj: <span class="text-white font-bold">${vrijednosti[index] || '(Prazno)'}</span></span>
                        </li>
                    `;
                });

                html += `
                        </ul>
                        <div class="mt-8 p-4 bg-black rounded-lg border border-red-900/30 text-[10px] text-zinc-500 font-mono">
                            Ovo su tačni nazivi koje moraš koristiti u kodu za prikaz podataka.
                        </div>
                    </div>
                `;

                panel.innerHTML = html;

            } catch (err) {
                panel.innerHTML = "<p class='text-red-600 font-bold uppercase'>GRESKA: " + err.message + "</p>";
            }
        }

        skenirajKolone();
    </script>
</body>
</html>
