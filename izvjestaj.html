<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>CRM AI SYSTEM - Izvještaj</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6 font-sans">

<div class="max-w-5xl mx-auto">

<!-- HEADER -->
<div class="flex justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-4">
  <h2 id="firma" class="text-blue-400 font-bold text-xl">Loading...</h2>
  <div>
    📊 <span id="brojac" class="text-red-500 font-bold">0</span>
  </div>
</div>

<!-- NAVIGACIJA (Linkovi prema tvojim uslugama sa slike) -->
<div class="flex flex-wrap gap-2 mb-8">
  <a href="VOICE_ASISTENT.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">🎙️ Voice Asistent</a>
  <a href="cv-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">📄 CV Generator</a>
  <a href="email-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">✉️ Email Generator</a>
  <a href="fakture.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">💰 Fakture</a>
  <a href="izvjestaj.html" class="bg-red-900/40 text-red-400 border-red-500/50 text-sm px-3 py-1.5 rounded border transition">📊 Izvještaj</a>
  <a href="ponuda-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">🤝 Ponuda Generator</a>
  <a href="ugovori.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">📝 Ugovori</a>
  <a href="zapisnik-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">📋 Zapisnik Generator</a>
</div>

<!-- FORM -->
<div class="bg-zinc-900 p-5 rounded-xl border border-red-600/30 mb-8">
  <form id="form" class="space-y-3">
    
    <input id="naslov" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="NASLOV" required>
    
    <!-- PADAJUĆA LISTA - TVOJE USLUGE -->
    <select id="usluga" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none text-gray-300" required>
      <option value="" disabled selected>--- IZABERI USLUGU ---</option>
      <option value="Voice Asistent">🎙️ Voice Asistent</option>
      <option value="CV Generator">📄 CV Generator</option>
      <option value="Email Generator">✉️ Email Generator</option>
      <option value="Fakture">💰 Fakture</option>
      <option value="Izvještaj">📊 Izvještaj</option>
      <option value="Ponuda Generator">🤝 Ponuda Generator</option>
      <option value="Ugovori">📝 Ugovori</option>
      <option value="Zapisnik Generator">📋 Zapisnik Generator</option>
    </select>

    <textarea id="pitanje" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="PITANJE" required></textarea>
    
    <input id="email" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="EMAIL">
    
    <input id="telefon" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="TELEFON">
    
    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 transition p-3 font-bold rounded">
      POŠALJI
    </button>
  </form>
</div>

<!-- LISTA -->
<div id="lista" class="space-y-4"></div>

</div>

<script>
// ================= CONFIG =================
const API = "https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/groq-chat";
const SHEETDB = "https://sheetdb.io/api/v1/4u3goec782bvg";

const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
document.getElementById("firma").innerText = firmaId;

// ================= AI =================
async function callAI(text){
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ poruka: text })
    });
    const data = await res.json();
    return data.odgovor || "Nema AI odgovora";
  } catch {
    return "AI greška";
  }
}

// ================= SUBMIT =================
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const naslov = document.getElementById("naslov").value;
    const usluga = document.getElementById("usluga").value; 
    const pitanje = document.getElementById("pitanje").value;
    const email = document.getElementById("email").value;
    const telefon = document.getElementById("telefon").value;

    // AI Analiza
    const ai = await callAI(`[Upit za uslugu: ${usluga}] ${naslov} | ${pitanje}`);

    // SAVE
    await fetch(SHEETDB, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        data:[{
          "Datum": new Date().toLocaleString(),
          "Korisnik ID": firmaId,
          "USLUGA": usluga,
          "NASLOV": naslov,
          "PITANJE": pitanje,
          "Email": email,
          "Telefon": telefon,
          "AI Analiza": ai,
          "ODGOVOR GAZDE": "",
          "ODGOVOR DIREKTORA": "",
          "STATUS": "NOVO"
        }]
      })
    });

    document.getElementById("form").reset();
    load();

  } catch(err){
    alert("Greška: " + err.message);
  }
});

// ================= LOAD =================
async function load(){
  try {
    const res = await fetch(SHEETDB);
    const json = await res.json();
    const data = json.data || json;

    const moji = data.filter(x => x["Korisnik ID"] === firmaId);

    document.getElementById("brojac").innerText = moji.length;

    document.getElementById("lista").innerHTML = moji.reverse().map(x => `
      <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700">
        <div class="flex justify-between items-start">
          <div class="text-blue-400 font-bold text-lg">${x.NASLOV || "Bez naslova"}</div>
          <span class="bg-zinc-800 text-xs px-2 py-1 rounded text-red-400 border border-zinc-600">${x.USLUGA || "Nije odabrano"}</span>
        </div>
        
        <div class="text-white mt-2">
          ❓ ${x.PITANJE || "Nema pitanja"}
        </div>
        
        <div class="text-green-400 mt-2">
          🤖 AI: ${x["AI Analiza"] || "Nema AI"}
        </div>
        
        <div class="text-yellow-400 mt-2">
          👨‍💼 Gazda: ${x["ODGOVOR GAZDE"] || "Čeka"}
        </div>
        
        <div class="text-red-400 mt-2">
          🏢 Direktor: ${x["ODGOVOR DIREKTORA"] || "Čeka"}
        </div>
        
        <div class="flex justify-between items-center mt-3 pt-3 border-t border-zinc-800">
          <div class="text-gray-400 text-sm">📊 Status: ${x.STATUS || "NOVO"}</div>
          <div class="text-gray-500 text-xs">${x.Datum || ""}</div>
        </div>
      </div>
    `).join("");

  } catch(err){
    console.log(err);
  }
}

load();
setInterval(load, 5000);

// ================= LOGOUT =================
function odjaviSe(){
  localStorage.removeItem("prijavljenaFirma");
  location.reload();
}
</script>

</body>
</html>
