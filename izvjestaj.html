<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4 relative">
            <div class="absolute top-2 right-4 text-[10px] text-zinc-500 font-bold uppercase">
                <span data-lang="en">Records:</span><span data-lang="de">Einträge:</span> <span id="brojac-zapisa" class="text-blue-400">0</span>
            </div>

            <div class="absolute top-2 left-4">
                <select id="lang-select" onchange="promijeniJezik(this.value)" class="bg-black text-[10px] text-zinc-400 outline-none cursor-pointer">
                    <option value="en">EN</option>
                    <option value="de">DE</option>
                </select>
            </div>

            <div class="text-center md:text-left mt-4">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block" data-lang="en">Client:</span><span class="text-[10px] uppercase text-zinc-500 font-bold block" data-lang="de">Kunde:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl uppercase italic">Loading...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white font-bold py-2.5 px-4 rounded-xl text-xs uppercase transition">
                    <span data-lang="en">Logout</span><span data-lang="de">Abmelden</span>
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-red-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-red-600 font-black text-xl uppercase italic mb-4" data-lang="en">New Entry</h2><h2 class="text-red-600 font-black text-xl uppercase italic mb-4" data-lang="de">Neuer Eintrag</h2>
            <form id="alarm-forma" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1" data-lang="en">Report Title:</label><label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1" data-lang="de">Berichtstitel:</label>
                    <input type="text" id="naslov" required class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Email:</label>
                        <input type="email" id="email" required class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1" data-lang="en">Phone:</label><label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1" data-lang="de">Telefon:</label>
                        <input type="text" id="telefon" required class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1" data-lang="en">Detailed Analysis (Message):</label><label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1" data-lang="de">Detaillierte Analyse (Nachricht):</label>
                    <textarea id="detalji" rows="3" required class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none text-white"></textarea>
                </div>
                <button type="submit" id="btn-slanje" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300">
                    <span data-lang="en">SEND TO GOOGLE SHEET</span><span data-lang="de">AN GOOGLE TABELLE SENDEN</span>
                </button>
            </form>
        </div>

        <h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter" data-lang="en">ALL RECORDS</h1><h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter" data-lang="de">ALLE EINTRÄGE</h1>
        <div id="svi-izvjestaji" class="space-y-6"></div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';
        const firmaId = localStorage.getItem("prijavljenaFirma") || "User";

        // Funkcija za promjenu jezika
        function promijeniJezik(lang) {
            document.querySelectorAll('[data-lang]').forEach(el => {
                el.style.display = (el.getAttribute('data-lang') === lang) ? '' : 'none';
            });
        }
        promijeniJezik('en'); // Default jezik

        document.getElementById('alarm-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const payload = {
                "Datum": new Date().toLocaleString(),
                "Korisnik ID": firmaId,
                "Tekst izvještaja": document.getElementById('naslov').value,
                "Email": document.getElementById('email').value,
                "Telefon": document.getElementById('telefon').value,
                "AI Analiza": document.getElementById('detalji').value
            };

            try {
                await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ data: [payload] }) });
                alert("Success!");
                document.getElementById('alarm-forma').reset();
                await ucitajSvePodatke();
            } catch (err) { alert("Error!"); }
        });

        async function ucitajSvePodatke() {
            const res = await fetch(API_URL);
            const podaci = await res.json();
            document.getElementById("brojac-zapisa").innerText = podaci.length;
            const kontejner = document.getElementById("svi-izvjestaji");
            kontejner.innerHTML = podaci.map(z => `
                <div class="bg-zinc-950 border border-zinc-800 p-4 rounded-xl">
                    <h4 class="text-white font-bold text-sm">${z["Tekst izvještaja"]}</h4>
                    <p class="text-zinc-400 text-xs">${z["AI Analiza"]}</p>
                    <div class="text-[9px] text-zinc-600 mt-2">Contact: ${z.Email || '-'} | ${z.Telefon || '-'}</div>
                </div>
            `).join('');
        }

        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }
        ucitajSvePodatke();
    </script>
</body>
</html>
