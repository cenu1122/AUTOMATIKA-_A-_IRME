<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRM AI SYSTEM - Report</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6 font-sans">

<div class="max-w-5xl mx-auto">

<div class="flex justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-4">
  <h2 id="firma" class="text-blue-400 font-bold text-xl">Loading...</h2>
  <div>
    📊 <span id="brojac" class="text-red-500 font-bold">0</span>
  </div>
</div>

<div class="flex flex-wrap gap-2 mb-8">
  <a href="VOICE_ASISTENT.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">🎙️ Voice Assistant</a>
  <a href="cv-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">📄 CV Generator</a>
  <a href="email-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">✉️ Email Generator</a>
  <a href="fakture.html" onclick="localStorage.setItem('nazivFirme', firmaId)" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">💰 Invoices</a>
  <a href="izvjestaj.html" class="bg-red-900/40 text-red-400 border-red-500/50 text-sm px-3 py-1.5 rounded border transition">📊 Report</a>
  <a href="ponuda-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">🤝 Proposal Generator</a>
  <a href="ugovori.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">📝 Contracts</a>
  <a href="zapisnik-generator.html" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-3 py-1.5 rounded border border-zinc-700 transition">📋 Meeting Minutes</a>
</div>

<div class="bg-zinc-900 p-5 rounded-xl border border-red-600/30 mb-8">
  <form id="form" class="space-y-3">
    <input id="naslov" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="TITLE" required>
    
    <select id="usluga" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none text-gray-300" required>
      <option value="" disabled selected>--- SELECT SERVICE ---</option>
      <option value="Voice Assistant">🎙️ Voice Assistant</option>
      <option value="CV Generator">📄 CV Generator</option>
      <option value="Email Generator">✉️ Email Generator</option>
      <option value="Invoices">💰 Invoices</option>
      <option value="Report">📊 Report</option>
      <option value="Proposal Generator">🤝 Proposal Generator</option>
      <option value="Contracts">📝 Contracts</option>
      <option value="Meeting Minutes">📋 Meeting Minutes</option>
    </select>

    <textarea id="pitanje" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="QUESTION" required></textarea>
    
    <input id="email" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="EMAIL">
    
    <input id="telefon" class="w-full p-3 bg-black border border-zinc-700 rounded focus:border-red-500 outline-none" placeholder="PHONE">
    
    <button type="submit" class="w-full bg-red-600 hover:bg-red-700 transition p-3 font-bold rounded">
      SEND
    </button>
  </form>
</div>

<div id="lista" class="space-y-4"></div>

</div>

<script>
// ================= CONFIG =================
const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
const SUPABASE_KEY = "VAŠ_ANON_KLJUČ"; // <--- UNESITE VAŠ KLJUČ OVDJE
const API = "https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/groq-chat";

const firmaId = localStorage.getItem("prijavljenaFirma") || "Unknown Company";
document.getElementById("firma").innerText = firmaId;

// ================= AI =================
async function callAI(text){
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ poruka: text })
    });
    const data = await res.json();
    return data.odgovor || "No AI response";
  } catch {
    return "AI Error";
  }
}

// ================= SUBMIT =================
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const naslov = document.getElementById("naslov").value;
    const usluga = document.getElementById("usluga").value; 
    const pitanje = document.getElementById("pitanje").value;
    const email = document.getElementById("email").value;
    const telefon = document.getElementById("telefon").value;

    const ai = await callAI(`[Service inquiry: ${usluga}] ${naslov} | ${pitanje}`);

    // SAVE TO SUPABASE (Tabela: AUTOVOXA_KLIJENTI)
    await fetch(`${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "return=representation"
      },
      body: JSON.stringify({
        FIRMA: firmaId,
        EMAIL: email,
        TELLEFON: telefon,
        NAPOMENA: `Usluga: ${usluga} | Naslov: ${naslov} | Pitanje: ${pitanje} | AI: ${ai}`,
        STATUS: "NEW"
      })
    });

    document.getElementById("form").reset();
    load();

  } catch(err){
    alert("Error: " + err.message);
  }
});

// ================= LOAD =================
async function load(){
  try {
    // FETCH FROM SUPABASE
    const res = await fetch(`${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI?FIRMA=eq.${encodeURIComponent(firmaId)}`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();

    document.getElementById("brojac").innerText = data.length;

    document.getElementById("lista").innerHTML = data.reverse().map(x => `
      <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-700">
        <div class="flex justify-between items-start">
          <div class="text-blue-400 font-bold text-lg">${x.NAPOMENA.split('|')[1] || "No title"}</div>
          <span class="bg-zinc-800 text-xs px-2 py-1 rounded text-red-400 border border-zinc-600">${x.STATUS}</span>
        </div>
        <div class="text-white mt-2">❓ ${x.NAPOMENA.split('|')[2] || "No question"}</div>
        <div class="text-green-400 mt-2">🤖 ${x.NAPOMENA.split('|')[3] || "No AI response"}</div>
        <div class="text-gray-500 text-xs mt-3">${x.created_at || ""}</div>
      </div>
    `).join("");

  } catch(err){
    console.log(err);
  }
}

load();

// ================= LOGOUT =================
function odjaviSe(){
  localStorage.removeItem("prijavljenaFirma");
  location.reload();
}
</script>

</body>
</html>
