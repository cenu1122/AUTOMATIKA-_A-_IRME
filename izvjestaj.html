<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Upis i Pregled</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
               <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer focus:border-blue-500">
    <option value="izvjestaj.html" selected>📋 Pregled Izvještaja</option>
    <option value="ugovori.html">🤖 AI Generator Ugovora</option>
    <option value="fakture.html">💰 AI Generator Faktura</option>
    <option value="cv-generator.html">📄 AI CV / Biografija Generator</option>
    <option value="email-generator.html">✉️ AI Email / Pismo Generator</option>
    <option value="ponuda-generator.html">📊 AI Generator Ponuda / Predračuna</option>
    <option value="zapisnik-generator.html">📝 AI Zapisnik sa Sastanka</option>
</select>

                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white font-bold py-2.5 px-4 rounded-xl text-xs uppercase transition">
                    Odjavi se
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <button onclick="generisiUgovorKlijentu()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-emerald-600/20 text-center text-sm">
                📄 Preuzmi ugovor o saradnji
            </button>
            
            <button onclick="pokreniAlarm()" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-amber-500/20 text-center text-sm">
                🚨 Aktiviraj hitan AI alarm
            </button>
        </div>

        <div class="bg-zinc-900 border border-red-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-red-600 font-black text-xl uppercase italic mb-4">Novi Upis u Tabelu</h2>
            <form id="alarm-forma" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Naslov izvještaja:</label>
                    <input type="text" id="naslov" required placeholder="npr. Servis reduktora" 
                           class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none transition text-white">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Detaljna Analiza:</label>
                    <textarea id="detalji" rows="3" required placeholder="Opiši kvar ili status..." 
                              class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-red-600 outline-none transition text-white"></textarea>
                </div>
                <button type="submit" id="btn-slanje" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-red-600/20">
                    POŠALJI U GOOGLE TABELU
                </button>
            </form>
        </div>

        <hr class="border-zinc-800 mb-12">

        <h1 class="text-red-600 font-black text-3xl italic mb-8 uppercase tracking-tighter">SVI ZAPISI IZ BAZE</h1>
        <div id="svi-izvjestaji" class="space-y-6">
            <p class="text-zinc-500 animate-pulse uppercase text-xs text-center">Učitavam podatke...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        // Izvlačenje imena firme iz memorije (koju je index.html postavio)
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        // 1. SLANJE PODATAKA U TABELU
        document.getElementById('alarm-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const naslov = document.getElementById('naslov').value;
            const detalji = document.getElementById('detalji').value;

            btn.innerText = "SLANJE U TOKU...";
            btn.disabled = true;

            const noviRed = {
                "Datum": new Date().toLocaleString('hr-BA'),
                "Korisnik ID": firmaId, 
                "Tekst izvještaja": naslov,
                "AI Analiza": detalji
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [noviRed] })
                });

                if(res.ok) {
                    alert("Podaci uspješno upisani!");
                    document.getElementById('alarm-forma').reset();
                    await ucitajSvePodatke(); 
                }
            } catch (err) {
                alert("Greška pri slanju: " + err.message);
            } finally {
                btn.innerText = "POŠALJI U GOOGLE TABELU";
                btn.disabled = false;
            }
        });

        // 2. UCITAVANJE PODATAKA
        async function ucitajSvePodatke() {
            const kontejner = document.getElementById('svi-izvjestaji');
            try {
                const odgovor = await fetch(API_URL + '?t=' + Date.now());
                const podaci = await odgovor.json();

                const listaPodataka = Array.isArray(podaci) ? podaci : [];

                if (listaPodataka.length === 0) {
                    kontejner.innerHTML = "<p class='text-zinc-600 text-center uppercase text-xs'>Tabela je trenutno prazna.</p>";
                    return;
                }

                const poredani = [...listaPodataka].reverse();
                
                kontejner.innerHTML = '';
                poredani.forEach((red, index) => {
                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl hover:border-red-600/30 transition duration-500";
                    
                    kartica.innerHTML = `
                        <div class="flex justify-between items-start mb-4 border-b border-zinc-800 pb-2">
                            <span class="text-red-500 font-black text-[10px] uppercase italic">ZAPIS #${listaPodataka.length - index} — ${red["Korisnik ID"] || 'Opšti'}</span>
                            <span class="text-zinc-600 font-mono text-[10px]">${red["Datum"] || 'Bez datuma'}</span>
                        </div>
                        <h3 class="text-white font-black uppercase italic text-xl mb-3">${red["Tekst izvještaja"] || 'Bez naslova'}</h3>
                        <div class="bg-black/60 p-4 rounded-xl border border-zinc-800/50">
                            <p class="text-zinc-400 text-sm font-mono whitespace-pre-line">${red["AI Analiza"] || 'Nema detalja'}</p>
                        </div>
                    `;
                    kontejner.appendChild(kartica);
                });
            } catch (err) {
                kontejner.innerHTML = `<p class="text-red-600 font-bold text-center">GREŠKA: ${err.message}</p>`;
            }
        }

        // --- FUNKCIJA ZA AUTOMATSKI UGOVOR ---
        function generisiUgovorKlijentu() {
            const datum = new Date().toLocaleDateString('hr-BA');
            const printProzor = window.open('', '_blank');
            
            printProzor.document.write(`
                <html>
                <head>
                    <title>Ugovor o saradnji - ${firmaId}</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; padding: 40px; color: #000; line-height: 1.6; }
                        .header { text-align: center; margin-bottom: 50px; }
                        .title { font-size: 22px; font-weight: bold; text-transform: uppercase; margin-bottom: 30px; }
                        .section { margin-bottom: 20px; text-align: justify; }
                        .signatures { margin-top: 80px; display: flex; justify-content: space-between; }
                        .sig-box { width: 200px; border-top: 1px solid #000; text-align: center; padding-top: 5px; }
                        @media print { .no-print { display: none; } }
                        .btn-print { background: #4299e1; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 20px; }
                    </style>
                </head>
                <body>
                    <button class="btn-print no-print" onclick="window.print()">🖨️ Isprintaj / Spasi kao PDF</button>
                    
                    <div class="header">
                        <div class="title">UGOVOR O POSLOVNO-TEHNIČKOJ SARADNJI</div>
                        <p>Zaključen na dan <strong>${datum}</strong> godine.</p>
                    </div>

                    <div class="section">
                        <strong>UGOVORNE STRANE:</strong><br>
                        1. <strong>NH AI-Automation</strong>, kao pružalac usluga automatizacije i AI sistema (u daljem tekstu: Izvršilac), i<br>
                        2. <strong>${firmaId}</strong>, kao korisnik usluga (u daljem tekstu: Naručilac).
                    </div>

                    <div class="section">
                        <strong>Član 1. (Predmet ugovora)</strong><br>
                        Predmet ovog ugovora je regulisanje prava i obaveza u vezi sa implementacijom vještačke inteligencije, glasovnih asistenata te sistema automatizacije poslovnih izvještaja za potrebe Naručioca.
                    </div>

                    <div class="section">
                        <strong>Član 2. (Obaveze Izvršioca)</strong><br>
                        Izvršilac se obavezuje da će dodijeljeni sistem ("NH AI-Voice / Obrada izvještaja") održavati funkcionalnim, osigurati stabilnu vezu sa AI modelima, te garantovati privatnost podataka unutar baze.
                    </div>

                    <div class="section">
                        <strong>Član 3. (Obaveze Naručioca)</strong><br>
                        Naručilac se obavezuje da će dodijeljeni korisnički nalog koristiti u skladu sa tehničkim uputstvima i redovno izmirivati ugovorene obaveze za održavanje sistema.
                    </div>

                    <div class="signatures">
                        <div class="sig-box">NH AI-Automation<br>(Izvršilac)</div>
                        <div class="sig-box">${firmaId}<br>(Naručilac)</div>
                    </div>
                </body>
                </html>
            `);
            printProzor.document.close();
        }

        // --- FUNKCIJA ZA ALARM ---
        function pokreniAlarm() {
            alert("🚨 ALARM AKTIVIRAN!\nSistem za klijenta '" + firmaId + "' je upravo pokrenuo hitnu AI analizu i poslao upozorenje!");
            console.log("Hitan alarm aktiviran za: " + firmaId);
        }

        function odjaviSe() {
            localStorage.removeItem("prijavljenaFirma");
            window.location.href = "index.html";
        }

        // Pokretanje skripte
        ucitajSvePodatke();
        setInterval(ucitajSvePodatke, 30000);
    </script>
</body>
</html>
