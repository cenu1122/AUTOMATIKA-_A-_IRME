<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Alarm Report - 24h</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .pulse { animation: pulse-red 2s infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans min-h-screen">

    <div class="max-w-2xl mx-auto p-4 pb-24">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 border-b border-red-900 pb-4">
            <div>
                <h1 class="text-xl font-bold text-red-500 uppercase tracking-tighter">Sistem Alarma v3</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Izvještaj zadnjih 24h</p>
                <p class="text-[10px] text-gray-600" id="current-date-display"></p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full pulse"></span>
                <span class="text-[10px] font-bold text-red-600 uppercase">Live Monitoring</span>
            </div>
        </header>

        <!-- Alarm Container -->
        <div id="alarm-container" class="space-y-4">
            <div class="text-center py-20 text-gray-600 animate-pulse text-sm">
                Skeniranje baze podataka...
            </div>
        </div>
    </div>

    <!-- Fixed Bottom Navigation (Dugme za povratak) -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black via-black to-transparent">
        <div class="max-w-2xl mx-auto">
            <a href="index.html" class="flex items-center justify-center gap-2 w-full bg-gray-900 hover:bg-red-950 border border-gray-800 hover:border-red-600 text-white py-3 rounded-lg transition-all duration-300 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span class="text-sm font-bold uppercase tracking-widest">Povratak na početnu</span>
            </a>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';

        async function osvjeziAlarme() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const container = document.getElementById('alarm-container');
                const sad = new Date();
                const prije24h = sad.getTime() - (24 * 60 * 60 * 1000);

                // Filtriranje za zadnjih 24h
                const filtrirano = data.filter(red => {
                    const tekstD = red.D || Object.values(red)[3] || "";
                    // Pretpostavljamo da tekstD sadrži datum u formatu koji JS može prepoznati (npr. "May 7, 2026 20:00:00")
                    const datumAlarma = new Date(tekstD).getTime();
                    
                    // Ako datum nije validan u koloni D, pokušavamo izvući samo dio datuma
                    return datumAlarma > prije24h;
                });

                if (filtrirano.length === 0) {
                    container.innerHTML = `
                        <div class="text-center p-12 border border-dashed border-gray-800 rounded-lg text-gray-600 italic text-sm">
                            Nema zabilježenih alarma u protekla 24 sata.
                        </div>`;
                    return;
                }

                // Sortiranje da najnoviji bude prvi
                filtrirano.sort((a, b) => {
                    const datumA = new Date(a.D || Object.values(a)[3]).getTime();
                    const datumB = new Date(b.D || Object.values(b)[3]).getTime();
                    return datumB - datumA;
                });

                container.innerHTML = '';
                filtrirano.forEach(alarm => {
                    const tekstD = alarm.D || Object.values(alarm)[3] || "";
                    const status = alarm.C || Object.values(alarm)[2] || "STATUS_UNKNOWN";
                    const id = alarm.B || Object.values(alarm)[1] || "---";

                    const card = document.createElement('div');
                    card.className = "bg-zinc-950 border border-zinc-900 p-4 rounded shadow-lg relative transition-all duration-500 hover:border-red-900/50";
                    card.innerHTML = `
                        <div class="absolute top-0 left-0 w-[2px] h-full bg-red-800"></div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] bg-red-950/50 text-red-500 px-2 py-0.5 rounded border border-red-900/30 font-bold uppercase">ID: ${id}</span>
                            <span class="text-[9px] text-zinc-600 font-mono">${tekstD.split(',')[0]}</span>
                        </div>
                        <h2 class="text-zinc-100 font-bold text-sm mb-3 uppercase tracking-tight">${status}</h2>
                        <div class="text-[11px] text-zinc-400 font-mono leading-relaxed bg-black p-3 rounded border border-zinc-900">
                            ${tekstD}
                        </div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('current-date-display').innerText = "Zadnja provjera: " + new Date().toLocaleTimeString();

            } catch (err) {
                console.error("Greška:", err);
                document.getElementById('alarm-container').innerHTML = `
                    <div class="text-center p-6 border border-red-900/50 rounded bg-red-950/10 text-red-500 text-xs">
                        Greška pri povezivanju sa serverom. Provjerite API limit.
                    </div>`;
            }
        }

        // Inicijalno pokretanje
        osvjeziAlarme();
        
        // Automatsko osvježavanje svakih 30 sekundi
        setInterval(osvjeziAlarme, 30000);
    </script>
</body>
</html>
