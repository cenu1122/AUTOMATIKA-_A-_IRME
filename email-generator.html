<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Email Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-orange-500 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer focus:border-orange-500">
                    <option value="izvjestaj.html">📋 Pregled Izvještaja</option>
                    <option value="ugovori.html">🤖 AI Generator Ugovora</option>
                    <option value="email-generator.html" selected>✉️ AI Email / Pismo Generator</option>
                </select>

                <button onclick="pokreniAlarm()" class="bg-red-600 hover:bg-red-700 text-white font-black py-2.5 px-4 rounded-xl text-xs uppercase italic transition shadow-lg shadow-red-600/20">
                    🚨 Hitan Alarm
                </button>

                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2.5 px-3 rounded-xl text-xs uppercase transition">
                    Odjava
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-orange-600/30 p-6 rounded-2xl mb-8 shadow-2xl">
            <h2 class="text-orange-500 font-black text-xl uppercase italic mb-4">✉️ NH AI — Generator Poslovnih Emailova</h2>
            
            <div class="mb-5">
                <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-2">Odaberi ton emaila:</label>
                <div class="grid grid-cols-3 gap-3">
                    <button type="button" id="ton-profesionalan" onclick="postaviTon('profesionalan')" class="bg-orange-600 text-white py-2.5 px-4 rounded-xl font-bold text-xs uppercase border border-orange-600 shadow-lg shadow-orange-600/10">
                        💼 Profesionalan
                    </button>
                    <button type="button" id="ton-opusten" onclick="postaviTon('opusten')" class="bg-zinc-950 text-zinc-400 py-2.5 px-4 rounded-xl font-bold text-xs uppercase border border-zinc-800">
                        🤝 Prijateljski
                    </button>
                    <button type="button" id="ton-hitan" onclick="postaviTon('hitan')" class="bg-zinc-950 text-zinc-400 py-2.5 px-4 rounded-xl font-bold text-xs uppercase border border-zinc-800">
                        🚨 Hitan / Ozbiljan
                    </button>
                </div>
            </div>

            <form id="email-forma" onsubmit="posaljiZahtjevZaEmail(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Tema / Svrha emaila:</label>
                    <input type="text" id="email-tema" required placeholder="e.g. Kasnjenje materijala..." 
                           class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none transition text-white">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Kratke natuknice (Šta AI mora pomenuti):</label>
                    <textarea id="email-detalji" rows="4" required placeholder="Napiši šta želiš da piše u mailu..." 
                              class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none transition text-white"></textarea>
                </div>

                <button type="button" id="mikrofon-dugme" onclick="pokreniMikrofon()" class="w-full bg-zinc-950 hover:bg-zinc-800 text-red-500 font-black py-3 rounded-xl text-xs uppercase italic border border-zinc-800 transition shadow-md">
                    🎤 DIKTIRAJ NATUKNICE U MIKROFON
                </button>

                <button type="submit" id="btn-slanje" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-orange-600/20">
                    ⚡ GENERIŠI EMAIL ODMAH
                </button>
            </form>
        </div>

        <div id="ai-rezultat-kontejner" class="hidden bg-zinc-900 border-2 border-emerald-500/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-3">
                <h3 class="text-emerald-400 font-black uppercase italic text-lg">
                    ✨ VAŠ GENERISANI EMAIL:
                </h3>
                <button onclick="kopirajDirektanTekst()" id="btn-kopiraj-direktno" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-5 rounded-xl text-xs uppercase transition shadow-lg">
                    📋 KOPIRAJ EMAIL
                </button>
            </div>
            <div id="ai-gotov-mail" class="bg-black border border-zinc-800 p-5 rounded-xl text-zinc-200 text-sm font-mono leading-relaxed whitespace-pre-wrap"></div>
        </div>

    </div>

    <script>
        // URL tvoje pametne Edge funkcije
        const AI_EDGE_URL = 'https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent'; 
        
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        let trenutniTon = "profesionalan";

        function postaviTon(ton) {
            trenutniTon = ton;
            const gumbi = ['ton-profesionalan', 'ton-opusten', 'ton-hitan'];
            gumbi.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.className = "bg-zinc-950 text-zinc-400 py-2.5 px-4 rounded-xl font-bold text-xs uppercase border border-zinc-800";
            });
            const aktivni = document.getElementById('ton-' + ton);
            if(aktivni) aktivni.className = "bg-orange-600 text-white py-2.5 px-4 rounded-xl font-bold text-xs uppercase border border-orange-600 shadow-lg shadow-orange-600/10";
        }

        function pokreniMikrofon() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Tvoj browser ne podržava mikrofon!"); return; }

            const recognition = new SpeechRecognition();
            recognition.lang = "hr-HR";
            recognition.start();

            const mikrofonDugme = document.getElementById("mikrofon-dugme");
            mikrofonDugme.innerText = "🎤 SLUŠAM TE, PRIČAJ...";
            mikrofonDugme.className = "w-full bg-yellow-500 text-black font-black py-3 rounded-xl text-xs uppercase italic border border-transparent transition shadow-md";

            recognition.onresult = function(event) {
                document.getElementById("email-detalji").value += " " + event.results[0][0].transcript;
            };

            recognition.onend = function() {
                mikrofonDugme.innerText = "🎤 DIKTIRAJ NATUKNICE U MIKROFON";
                mikrofonDugme.className = "w-full bg-zinc-950 hover:bg-zinc-800 text-red-500 font-black py-3 rounded-xl text-xs uppercase italic border border-zinc-800 transition shadow-md";
            };
        }

        // TAČNO SLANJE PODATAKA KOJE TVOJA EDGE FUNKCIJA OČEKUJE ZA EMAIL
        async function posaljiZahtjevZaEmail(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-slanje');
            const tema = document.getElementById('email-tema').value;
            const detalji = document.getElementById('email-detalji').value;
            const rezultatKontejner = document.getElementById('ai-rezultat-kontejner');
            const ispisTeksta = document.getElementById('ai-gotov-mail');

            btn.innerText = "AI PIŠE EMAIL...";
            btn.disabled = true;
            rezultatKontejner.classList.add('hidden');

            try {
                // Šaljemo tačne parametre: tip, tema, detalji, ton
                const aiResponse = await fetch(AI_EDGE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "tip": "EMAIL", 
                        "tema": tema,
                        "detalji": detalji,
                        "ton": trenutniTon.toUpperCase()
                    })
                });

                if(!aiResponse.ok) throw new Error("AI server nije odgovorio.");

                const aiData = await aiResponse.json();
                let generisaniEmail = aiData.tekst || aiData.content || "";

                if (!generisaniEmail) {
                    throw new Error("AI je vratio prazan odgovor.");
                }

                // Upisujemo čist tekst u zeleni boks
                ispisTeksta.innerText = generisaniEmail.trim();
                rezultatKontejner.classList.remove('hidden');

                document.getElementById('email-forma').reset();

            } catch (err) {
                alert("Greška sa AI generatorom: " + err.message);
            } file {
                btn.innerText = "⚡ GENERIŠI EMAIL ODMAH";
                btn.disabled = false;
            }
        }

        function kopirajDirektanTekst() {
            const tekst = document.getElementById('ai-gotov-mail').innerText;
            const dugme = document.getElementById('btn-kopiraj-direktno');
            
            navigator.clipboard.writeText(tekst).then(() => {
                dugme.innerText = "✔️ KOPIRANO!";
                setTimeout(() => {
                    dugme.innerText = "📋 KOPIRAJ EMAIL";
                }, 2000);
            });
        }

        function pokreniAlarm() { alert("🚨 ALARM AKTIVIRAN"); }
        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }
    </script>
</body>
</html>
