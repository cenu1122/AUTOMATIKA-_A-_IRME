<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Email Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-6 font-sans">

<div class="max-w-4xl mx-auto">

    <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl mb-8">

        <h2 class="text-orange-500 font-black text-xl uppercase italic mb-4">
            ✉️ NH AI Generator
        </h2>

        <form id="email-forma" class="space-y-4">

            <div>
                <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">
                    Tema:
                </label>

                <input
                    type="text"
                    id="email-tema"
                    required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-orange-500"
                />
            </div>

            <div>
                <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">
                    Natuknice (upiši i email primaoca):
                </label>

                <textarea
                    id="email-detalji"
                    rows="5"
                    required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-orange-500"
                ></textarea>
            </div>

            <button
                type="submit"
                id="btn-slanje"
                class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-xl uppercase transition"
            >
                🚀 GENERIŠI I POŠALJI
            </button>

        </form>

    </div>

    <div
        id="ai-rezultat-kontejner"
        class="hidden bg-zinc-900 border-2 border-emerald-500/30 p-6 rounded-2xl"
    >

        <h3 class="text-emerald-400 font-black uppercase italic mb-2">
            ✅ Uspješno!
        </h3>

        <div
            id="ai-gotov-mail"
            class="bg-black border border-zinc-800 p-4 rounded-xl text-sm font-mono whitespace-pre-wrap"
        ></div>

    </div>

</div>

<script>

const AI_EDGE_URL =
'https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/POSALJI_MAIL';

/*
=================================================
OVDJE UBACI SVOJ SUPABASE ANON KEY
=================================================
*/

const SUPABASE_ANON_KEY =
'sb_publishable_PIRKTE7AzJKSBwLjPB04yg_laTBEEb6';

document
.getElementById('email-forma')
.addEventListener('submit', posaljiZahtjevZaEmail);

async function posaljiZahtjevZaEmail(e) {

    e.preventDefault();

    const btn =
        document.getElementById('btn-slanje');

    const tema =
        document
            .getElementById('email-tema')
            .value
            .trim();

    const detalji =
        document
            .getElementById('email-detalji')
            .value
            .trim();

    const emailRegex =
        /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b/;

    const match =
        detalji.match(emailRegex);

    const primaoc =
        match ? match[0] : null;

    if (!primaoc) {

        alert(
            'Nije pronađena email adresa u tekstu.'
        );

        return;
    }

    btn.disabled = true;
    btn.innerText = '🤖 AI RADI...';

    try {

        const response =
            await fetch(AI_EDGE_URL, {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json',
                    'Authorization':
                        `Bearer ${SUPABASE_ANON_KEY}`,
                    'apikey':
                        SUPABASE_ANON_KEY
                },

                body: JSON.stringify({
                    tema,
                    detalji,
                    ton: 'PROFESIONALAN',
                    primaoc
                })
            });

        const responseText =
            await response.text();

        console.log(
            'Server odgovor:',
            responseText
        );

        let data = {};

        try {

            data =
                JSON.parse(responseText);

        } catch {

            throw new Error(
                responseText ||
                'Neispravan odgovor servera'
            );
        }

        if (!response.ok) {

            throw new Error(
                data.error ||
                data.message ||
                'Greška servera'
            );
        }

        document
            .getElementById('ai-gotov-mail')
            .innerText =
                data.tekst ||
                data.message ||
                'Email uspješno poslan.';

        document
            .getElementById(
                'ai-rezultat-kontejner'
            )
            .classList
            .remove('hidden');

    } catch (err) {

        console.error(err);

        alert(
            'Greška:\n\n' +
            err.message
        );

    } finally {

        btn.disabled = false;

        btn.innerText =
            '🚀 GENERIŠI I POŠALJI';
    }
}

</script>

</body>
</html>
