<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - AI Faktura Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Stilovi za štampu - sakrivaju formu i dugmad kada se generiše PDF */
        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; padding: 0; }
            .print-faktura { border: none !important; background: white !important; color: black !important; padding: 0 !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="no-print flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-orange-500 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer focus:border-orange-500">
                    <option value="izvjestaj.html">📋 Pregled Izvještaja</option>
                    <option value="ugovori.html">🤖 AI Generator Ugovora</option>
                    <option value="fakture.html" selected>🧾 AI Faktura Generator</option>
                </select>
                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2.5 px-3 rounded-xl text-xs uppercase transition">Odjava</button>
            </div>
        </div>

        <div class="no-print bg-zinc-900 border border-orange-600/30 p-6 rounded-2xl mb-8 shadow-2xl">
            <h2 class="text-orange-500 font-black text-xl uppercase italic mb-4">🧾 NH AI — AI Generator Faktura</h2>
            
            <form id="faktura-forma" onsubmit="generisiFakturuIPdf(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Naziv stavke / Opis posla:</label>
                    <input type="text" id="faktura-tema" required placeholder="npr. KASNJENJ MATERIJAL, Izrada hidraulike..." 
                           class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none transition text-white">
                </div>
                
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Kratke natuknice / Instrukcije za AI:</label>
                    <textarea id="faktura-detalji" rows="4" required placeholder="npr. Napravi mi stavke za kašnjenje materijala, dodaj eksere, daske i šarafe..." 
                              class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-orange-500 outline-none transition text-white"></textarea>
                </div>

                <button type="button" id="mikrofon-dugme" onclick="pokreniMikrofon()" class="w-full bg-zinc-950 hover:bg-zinc-800 text-red-500 font-black py-3 rounded-xl text-xs uppercase italic border border-zinc-800 transition shadow-md">
                    🎤 DIKTIRAJ U MIKROFON
                </button>

                <button type="submit" id="btn-slanje" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-orange-600/20">
                    ⚡ GENERIŠI I ŠTAMPAJ FAKTURU
                </button>
            </form>
        </div>

        <div id="faktura-print-oblast" class="print-faktura hidden bg-white text-black p-8 rounded-2xl shadow-2xl border border-zinc-200">
            </div>

    </div>

    <script>
        // Tvoja Supabase funkcija koja je zadužena za obradu i kreiranje fakture
        const AI_EDGE_URL = 'https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent'; 
        const firmaId = localStorage.getItem("prijavljenaFirma") || "MOJA FIRMA D.O.O.";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        function pokreniMikrofon() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Mikrofon nije podržan!"); return; }
            const recognition = new SpeechRecognition();
            recognition.lang = "hr-HR";
            recognition.start();

            const btn = document.getElementById("mikrofon-dugme");
            btn.innerText = "🎤 SLUŠAM TE...";
            btn.className = "w-full bg-yellow-500 text-black font-black py-3 rounded-xl text-xs uppercase italic transition shadow-md";

            recognition.onresult = function(event) {
                document.getElementById("faktura-detalji").value += " " + event.results[0][0].transcript;
            };
            recognition.onend = function() {
                btn.innerText = "🎤 DIKTIRAJ U MIKROFON";
                btn.className = "w-full bg-zinc-950 hover:bg-zinc-800 text-red-500 font-black py-3 rounded-xl text-xs uppercase italic border border-zinc-800 transition shadow-md";
            };
        }

        // GLAVNA FUNKCIJA KOJA GENERIŠE HTML I ODMAH POKREĆE PRINT PROZOR
        async function generisiFakturuIPdf(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-slanje');
            const tema = document.getElementById('faktura-tema').value;
            const detalji = document.getElementById('faktura-detalji').value;
            const printOblast = document.getElementById('faktura-print-oblast');

            btn.innerText = "AI KREIRA FAKTURU...";
            btn.disabled = true;
            printOblast.classList.add('hidden');

            try {
                // Šaljemo zahtjev direktno na Supabase Edge funkciju
                const odgovor = await fetch(AI_EDGE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userText: `Kreiraj vizuelnu fakturu u čistom HTML formatu (koristi isključivo standardne HTML tabele i inline stilove prilagođene za štampu na bijeloj pozadini). Naziv firme: ${firmaId}. Tema/Razlog: ${tema}. Na osnovu sljedećih natuknica izgeneriši realne stavke (r.br, opis, kol, cijena, ukupno), izračunaj subtotal, PDV 17% i ukupan iznos: ${detalji}. Vrati isključivo čist HTML kod fakture, bez ikakvih uvodnih ili završnih rečenica.`
                    })
                });

                if(!odgovor.ok) throw new Error("Server nije odgovorio.");

                const podaci = await odgovor.json();
                // Izvlačimo HTML kod koji je AI poslao nazad
                let htmlFakture = podaci.tekst || podaci.content || podaci.response || podaci.html || "";

                if (!htmlFakture) throw new Error("AI nije vratio ispravan kod fakture.");

                // 1. Ubacujemo dobijeni HTML direktno u naš skriveni boks na ekranu
                printOblast.innerHTML = htmlFakture;
                printOblast.classList.remove('hidden');

                // 2. KLJUČNI KORAK: Odmah automatski pokrećemo prozor za printanje/čuvanje u PDF!
                setTimeout(() => {
                    window.print();
                }, 500);

                document.getElementById('faktura-forma').reset();

            } catch (err) {
                alert("Greška pri kreiranju fakture: " + err.message);
            } finally {
                btn.innerText = "⚡ GENERIŠI I ŠTAMPAJ FAKTURU";
                btn.disabled = false;
            }
        }

        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }
    </script>
</body>
</html>
