<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava | AutoVox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-xl font-bold mb-6 text-center">Prijava</h2>
        <input type="email" id="email" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white" placeholder="Email">
        <input type="password" id="password" class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white" placeholder="Lozinka">
        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded transition" onclick="handleLogin()">Prijavi se</button>
    </div>

<script>
const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
// Koristimo tvoj JWT anon ključ za REST pozive
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

async function handleLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");

    if (!email || !password) {
        alert("Unesite email i lozinku!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Prijava...";

    try {
        // Provjera direktno u tvojoj tabeli
        const url = `${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI?EMAIL=eq.${encodeURIComponent(email)}&PASSWWOTF=eq.${encodeURIComponent(password)}&select=*`;
        
        const response = await fetch(url, {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            }
        });

        const data = await response.json();

        if (data && data.length > 0) {
            alert("Uspješna prijava!");
            // window.location.href = "dashboard.html"; // Ovdje stavi svoj link
        } else {
            alert("Pogrešan email ili lozinka!");
        }
    } catch (error) {
        alert("Greška: " + error.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "Prijavi se";
    }
}
</script>
</body>
</html>
