<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | NH AI-Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-2xl font-bold mb-6 text-center">Login</h2>

        <input type="email" id="login-email" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white" placeholder="Email">
        <input type="password" id="login-sifra" class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white" placeholder="Password">
        
        <button id="loginBtn" onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700">
            Login
        </button>
    </div>

<script>
const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

async function handleLogin() {
    const btn = document.getElementById("loginBtn");
    btn.innerText = "Checking...";
    
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-sifra").value.trim();

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI?EMAIL=eq.${email}&PASSWWOTF=eq.${password}&select=*`, {
            headers: {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        });

        const data = await response.json();

        if (data && data.length > 0) {
            alert("Uspješan login!");
        } else {
            alert("Pogrešan email ili lozinka!");
        }
    } catch (err) {
        alert("Greška pri komunikaciji sa bazom.");
        console.error(err);
    } finally {
        btn.innerText = "Login";
    }
}
</script>
</body>
</html>
