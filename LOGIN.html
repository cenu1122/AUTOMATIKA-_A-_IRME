<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava | AutoVox</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="box">
    <h2>Prijava</h2>
    <input type="email" id="email" placeholder="Email adresa">
    <input type="password" id="password" placeholder="Lozinka">
    <button type="button" onclick="login()">Prijavi se</button>
</div>

<script> const supabaseUrl = 'https://mpgbpgmsorunfbdskbwn.supabase.co'; const supabaseKey = 'sb_publishable_PIRKTE7AzJKSBwLJpB04yg_laTBEEb6';; const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey); async function login() { const email = document.getElementById('email').value.trim(); const password = document.getElementById('password').value; if (!email) { alert("Unesite email adresu."); return; } if (!password) { alert("Unesite lozinku."); return; } const { data: korisnik } = await supabaseClient .from('AUTOVOXA_KLIJENTI') .select('EMAIL') .eq('EMAIL', email) .maybeSingle(); if (!korisnik) { alert("Email adresa nije pronađena."); return; } const { error: authError } = await supabaseClient.auth.signInWithPassword({ email, password }); if (authError) { alert("Lozinka nije ispravna."); return; } const { data: klijent, error: dbError } = await supabaseClient .from('AUTOVOXA_KLIJENTI') .select('*') .eq('EMAIL', email) .single(); if (dbError) { alert("Prijava uspješna, ali podaci klijenta nisu pronađeni."); return; } localStorage.setItem( 'klijent_podaci', JSON.stringify(klijent) ); window.location.href = "izvjestajhj.html"; } </script>
</body>
</html>
