<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NH AI-Automation | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="login-section" class="card bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-xl font-bold mb-6 text-center">Prijava korisnika</h2>
        
        <label class="block text-slate-300 text-sm mb-1">Email:</label>
        <input type="email" id="email" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white focus:border-blue-500 outline-none" placeholder="Enter Email">
        
        <label class="block text-slate-300 text-sm mb-1">Lozinka:</label>
        <input type="password" id="password" class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white focus:border-blue-500 outline-none" placeholder="Enter Password">
        
        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded transition" onclick="login()">
            Prijavi se
        </button>
    </div>

    <script>
        const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_PIRKTE7AzJKSBwLJpB04yg_laTBEEb6"; // Tvoj ispravan ključ
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Unesite email i lozinku!");
                return;
            }

            btn.innerText = "Prijavljivanje...";
            btn.disabled = true;

            // 1. Auth prijava
            const { error: authError } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (authError) {
                alert("Greška: " + authError.message);
                btn.innerText = "Prijavi se";
                btn.disabled = false;
                return;
            }

            // 2. Povlačenje podataka iz tabele AUTOVOXA_KLIJENTI
            const { data: klijent, error: dbError } = await supabase
                .from('AUTOVOXA_KLIJENTI')
                .select('*')
                .eq('EMAIL', email)
                .single();

            if (dbError) {
                alert("Uspješna prijava, ali podaci klijenta nisu pronađeni.");
                console.error(dbError);
                btn.innerText = "Prijavi se";
                btn.disabled = false;
                return;
            }

            // 3. Spremanje u memoriju
            localStorage.setItem('klijent_podaci', JSON.stringify(klijent));
            
            // 4. Preusmjeravanje
            window.location.href = "izvjestajhj.html";
        }
    </script>
</body>
</html>
