<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Prijava</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Lozinka">
<button id="loginBtn">Prijavi se</button>

<script>
    const client = supabase.createClient(
        "https://mpgbpgmsorunfbdskbwn.supabase.co",
        "sb_publishable_PIRKTE7AzJKSBwLjPB04yg_laTBEEb6"
    );

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        console.log("Pokušavam pronaći:", email, password);

        const { data, error } = await client
            .from('AUTOVOXA_KLIJENTI')
            .select('*')
            .eq('EMAIL', email)
            .eq('PASSWWOTF', password);

        if (error) {
            console.error("DETALJNA GREŠKA:", error);
            alert("Baza kaže: " + error.message);
        } else {
            console.log("Podaci iz baze:", data);
            if (data && data.length > 0) {
                window.location.href = "izvjestaji.html";
            } else {
                alert("Nije pronađeno podudaranje. Provjeri tačnost unosa!");
            }
        }
    });
</script>
</body>
</html>
