<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Prijava</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Lozinka">
<button id="loginBtn">Prijavi se</button>

<script>
    const client = supabase.createClient(
        "https://mpgbpgmsorunfbdskbwn.supabase.co",
        "sb_publishable_PIRKTE7AzJKSBwLjPB04yg_laTBEEb6"
    );

    document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // Direktno pretraživanje tvoje tabele
    const { data, error } = await client
        .from('AUTOVOXA_KLIJENTI')
        .select('*')
        .eq('EMAIL', email) // Provjeri da li se kolona u bazi zove EMAIL
        .eq('PASSWWOTF', password); // Provjeri da li se kolona u bazi zove PASSWWOTF

    if (error) {
        console.error("Greška:", error);
        alert("Greška u bazi: " + error.message);
    } else if (data && data.length > 0) {
        alert("Uspješna prijava!");
        // Ovdje možeš dodati preusmjeravanje, npr:
        // window.location.href = "izvjestaji.html";
    } else {
        alert("Pogrešan email ili lozinka.");
    }
});
</body>
</html>
