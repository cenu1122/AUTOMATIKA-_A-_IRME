<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava | AutoVox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-xl font-bold mb-6 text-center">Prijava</h2>

        <input type="email" id="email"
            class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white"
            placeholder="Email">

        <input type="password" id="password"
            class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white"
            placeholder="Lozinka">

        <button id="loginBtn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded transition"
            onclick="login()">
            Prijavi se
        </button>
    </div>

<script>

const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

async function login() {

    const btn = document.getElementById("loginBtn");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Unesi email i lozinku!");
        return;
    }

    btn.innerText = "Prijava...";
    btn.disabled = true;

    try {

        const response = await fetch(
            `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        console.log("LOGIN RESPONSE:", data);

        if (!response.ok) {
            throw new Error(data.error_description || data.message);
        }

        // SAVE SESSION
        localStorage.setItem("supabase_token", data.access_token);
        localStorage.setItem("user", JSON.stringify(data.user));

        alert("Uspješna prijava!");

        window.location.href = "dashboard.html";

    } catch (err) {
        console.error(err);
        alert("Login error: " + err.message);
    } finally {
        btn.innerText = "Prijavi se";
        btn.disabled = false;
    }
}

</script>

</body>
</html>
