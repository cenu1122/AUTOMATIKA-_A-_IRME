<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava | AutoVox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-xl font-bold mb-6 text-center">Prijava</h2>
        <input type="email" id="email" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white" placeholder="Email">
        <input type="password" id="password" class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white" placeholder="Lozinka">
        <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded transition" onclick="login()">Prijavi se</button>
    </div>

<script>
    // Inicijalizacija klijenta
    const supabase = supabase.createClient(
        'https://mpgbpgmsorunfbdskbwn.supabase.co', 
        'sb_publishable_PIRKTE7AzJKSBwLJpB04yg_laTBEEb6'
    );

    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        btn.disabled = true;
        btn.innerText = "Prijava...";

        // Zvanična Supabase metoda za login
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            alert("Greška: " + error.message);
            btn.disabled = false;
            btn.innerText = "Prijavi se";
        } else {
            alert("Uspješno!");
            window.location.href = "dashboard.html";
        }
    }
</script>
</body>
</html>
