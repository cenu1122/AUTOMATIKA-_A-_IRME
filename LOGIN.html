<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Prijava</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Lozinka">
<button id="loginBtn">Prijavi se</button>

<script>
    const client = supabase.createClient(
        "https://mpgbpgmsorunfbdskbwn.supabase.co",
        "sb_publishable_PIRKTE7AzJKSBwLjPB04yg_laTBEEb6"
    );

    document.getElementById('loginBtn').addEventListener('click', async () => {
        // 1. Provjera da li kod uopšte radi
        console.log("Dugme je kliknuto!");

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        // 2. Provjera šta kucamo
        console.log("Pokušavam prijavu sa:", email, password);

        const { data, error } = await client
            .from('AUTOVOXA_KLIJENTI')
            .select('*')
            .eq('EMAIL', email)
            .eq('PASSWWOTF', password);

        if (error) {
            console.error("Greška iz baze:", error);
        } else {
            console.log("Rezultat iz baze:", data);
            
            if (data && data.length > 0) {
                console.log("Uspjeh! Prebacujem na izvještaje.");
                window.location.href = "izvjestaji.html";
            } else {
                console.log("Nema korisnika sa ovim podacima.");
            }
        }
    });
</script>
 </body>
</html>
