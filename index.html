<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | AutoVox Portal</title>
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --accent: #6b7280; --bg: #f9fafb; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: #1f2937; }
        .warning-banner { background: #fffbeb; color: #92400e; padding: 12px; text-align: center; border-bottom: 1px solid #fef3c7; }
        .language-selector { position: fixed; top: 70px; right: 20px; padding: 8px; z-index: 100; }
        .container { min-height: 80vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 30px; text-align: center; }
        .btn { text-decoration: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; color: white; display: inline-block; }
        .btn-login { background: var(--primary); }
        .btn-register { background: var(--secondary); }
        .btn-demo { background: var(--accent); }
        .section { margin-bottom: 80px; text-align: center; padding: 0 20px; }
        .section h2 { color: var(--primary); margin-bottom: 20px; }
        .features { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .feature-card { background: white; width: 300px; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <div class="warning-banner" id="warning-text">NOTICE: Site under reconstruction.</div>

    <select class="language-selector" id="lang-switch" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="bs">Bosanski</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
    </select>

    <div class="container">
        <h2 id="welcome-title">Welcome</h2>
        <div class="button-group">
            <a href="LOGIN.html" class="btn btn-login" id="btn-login">Login</a>
            <a href="izvjestajhj.html" class="btn btn-demo" id="btn-demo">Try Demo</a>
            <a href="REGISTER.html" class="btn btn-register" id="btn-register">Register</a>
        </div>
    </div>

    <section class="section">
        <h2 id="title-about">O nama</h2>
        <p>AutoVox je moderna platforma za upravljanje vozilima i izvještajima.</p>
    </section>

    <section class="section">
        <h2 id="title-whyUs">Zašto odabrati nas?</h2>
        <div class="features">
            <div class="feature-card"><h3>Brzina</h3><p>Optimizovan sistem.</p></div>
        </div>
    </section>

    <section class="section">
        <h2 id="title-services">Naše usluge</h2>
    </section>

    <section class="section">
        <h2 id="title-reviews">Recenzije korisnika</h2>
    </section>

    <section class="section">
        <h2 id="title-contact">Kontaktirajte nas</h2>
    </section>

    <script>
        const translations = {
            en: { warning: "NOTICE: Site under reconstruction.", welcome: "Welcome", login: "Login", register: "Register", demo: "Try Demo", about: "About Us", whyUs: "Why Choose Us?", services: "Our Services", reviews: "User Reviews", contact: "Contact Us" },
            bs: { warning: "OBAVJEŠTENJE: Stranica u rekonstrukciji.", welcome: "Dobrodošli", login: "Prijava", register: "Registracija", demo: "Probaj Demo", about: "O nama", whyUs: "Zašto odabrati nas?", services: "Naše usluge", reviews: "Recenzije korisnika", contact: "Kontaktirajte nas" },
            de: { warning: "HINWEIS: Seite im Umbau.", welcome: "Willkommen", login: "Anmelden", register: "Registrieren", demo: "Demo testen", about: "Über uns", whyUs: "Warum uns wählen?", services: "Unsere Leistungen", reviews: "Kundenbewertungen", contact: "Kontaktieren Sie uns" },
            fr: { warning: "AVIS: Site en reconstruction.", welcome: "Bienvenue", login: "Connexion", register: "S'inscrire", demo: "Essayer", about: "À propos", whyUs: "Pourquoi nous choisir ?", services: "Nos services", reviews: "Avis des utilisateurs", contact: "Contactez-nous" }
        };

        function changeLanguage() {
            const lang = document.getElementById('lang-switch').value;
            const t = translations[lang];

            document.getElementById('warning-text').innerText = t.warning;
            document.getElementById('welcome-title').innerText = t.welcome;
            document.getElementById('btn-login').innerText = t.login;
            document.getElementById('btn-register').innerText = t.register;
            document.getElementById('btn-demo').innerText = t.demo;
            
            document.getElementById('title-about').innerText = t.about;
            document.getElementById('title-whyUs').innerText = t.whyUs;
            document.getElementById('title-services').innerText = t.services;
            document.getElementById('title-reviews').innerText = t.reviews;
            document.getElementById('title-contact').innerText = t.contact;

            document.documentElement.lang = lang;
        }

        window.onload = changeLanguage;
    </script>
</body>
</html>
