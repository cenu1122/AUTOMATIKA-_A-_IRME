<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoVoxa</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-btn {
            background: #252525;
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .lang-btn.active {
            background: #007acc;
            border-color: #005999;
        }

        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-bottom: 10px;
            color: #007acc;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background-color: #007acc;
            color: white;
        }

        .btn-primary:hover {
            background-color: #005999;
        }

        .btn-secondary {
            background-color: #28a745;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <!-- Biranje jezika (Gore desno) -->
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
    </div>

    <!-- Glavni Panel -->
    <div class="container">
        <h1 id="main-title">Welcome to AutoVoxa</h1>
        <p id="main-desc">AI Automation and Voice Assistants Control Panel.</p>

        <div class="btn-group">
            <!-- 1. Dugme za Registraciju -->
            <a href="#register" id="btn-register" class="btn btn-primary">Create Account / Register</a>
            
            <!-- 2. Dugme za direktan prolaz (Proba/Demo) -->
            <a href="main.html" id="btn-demo" class="btn btn-secondary">Try Demo / Direct Access</a>
        </div>
    </div>

    <script>
        // Prevodi (Jedan fajl za oba jezika)
        const translations = {
            en: {
                title: "Welcome to AutoVoxa",
                desc: "AI Automation and Voice Assistants Control Panel.",
                register: "Create Account / Register",
                demo: "Try Demo / Direct Access"
            },
            de: {
                title: "Willkommen bei AutoVoxa",
                desc: "KI-Automatisierung und Sprachassistenten-Kontrollfeld.",
                register: "Konto erstellen / Registrieren",
                demo: "Demo testen / Direkter Zugang"
            }
        };

        function setLanguage(lang) {
            // Prevođenje teksta na klik
            document.getElementById('main-title').innerText = translations[lang].title;
            document.getElementById('main-desc').innerText = translations[lang].desc;
            document.getElementById('btn-register').innerText = translations[lang].register;
            document.getElementById('btn-demo').innerText = translations[lang].demo;

            // Promjena aktivnog dugmeta
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if(lang === 'en') {
                buttons[0].classList.add('active');
            } else {
                buttons[1].classList.add('active');
            }
        }
    </script>

</body>
</html>
