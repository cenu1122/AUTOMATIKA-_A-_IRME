<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation | Poslovni Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a202c; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #2d3748; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #4a5568; }
        h1 { color: #63b3ed; text-align: center; cursor: pointer; } 
        input, textarea { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 6px; border: 1px solid #4a5568; background: #1a202c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4299e1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #3182ce; }
        #dashboard, #admin-panel { display: none; margin-top: 20px; }
        .admin-header { color: #f6ad55; border-top: 1px solid #4a5568; padding-top: 20px; margin-top: 20px; }
        #mic-btn { background-color: #e53e3e; }
        #mic-btn:hover { background-color: #c53030; }
        #statusMsg { font-size: 0.9rem; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 onclick="openAdmin()">NH AI-Automation</h1>

        <!-- LOGIN SEKCIJA -->
        <div id="login-section">
            <p style="text-align: center;">Prijava za klijente</p>
            <input type="text" id="companyId" placeholder="Korisnički ID (user_id)">
            <input type="password" id="password" placeholder="Lozinka (password)">
            <button id="loginBtn" onclick="handleLogin()">Prijavi se</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <h3>Dobrodošli, <span id="displayFirma" style="color: #63b3ed;"></span></h3>
            
            <label>Glasovni izvještaj:</label>
            <button id="mic-btn" onclick="startDictation()">🎤 Klikni i pričaj</button>

            <textarea id="userInput" rows="4" placeholder="Vaš govor će se ovdje pojaviti..."></textarea>
            <button id="sendBtn" onclick="sendToAI()">Pošalji na Analizu</button>
            <p id="statusMsg" style="color: #68d391; text-align: center;"></p>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin-panel">
            <h2 class="admin-header">Admin Panel</h2>
            <p>Dodajte novog korisnika:</p>
            <input type="text" id="newFirmaID" placeholder="Novi user_id">
            <input type="text" id="newFirmaPass" placeholder="Nova lozinka">
            <input type="text" id="newFirmaStatus" placeholder="Status (aktivan)">
            <button onclick="saveNewCompany()" style="background-color: #f6ad55;">Spremi u Google Sheet</button>
        </div>
    </div>

    <script>
        // TVOJ NOVI URL KOJI SI DOBIO NAKON DEPLOYMENTA
        const scriptURL = "https://script.google.com/macros/s/AKfycbzy3PnLobMFqIVCeH5ZtPXs6QDNjEJqz3xaN_htgyrp8zY3r12QG7deORyp-ysZFXdB/exec";

        let loggedInUserId = ""; // Ovdje čuvamo ID za kasnije slanje izvještaja

        let clicks = 0;
        function openAdmin() {
            clicks++;
            if(clicks === 5) {
                document.getElementById('admin-panel').style.display = 'block';
                alert("Admin mod aktiviran!");
            }
        }

        // FUNKCIJA ZA PREPOZNAVANJE GOVORA
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('SpeechRecognition')) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                const micBtn = document.getElementById('mic-btn');

                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = "hr-HR"; 
                
                recognition.start();
                micBtn.innerText = "🔴 Slušam vas...";

                recognition.onresult = function(e) {
                    document.getElementById('userInput').value = e.results[0][0].transcript;
                    recognition.stop();
                    micBtn.innerText = "🎤 Klikni i pričaj";
                };

                recognition.onerror = function(e) {
                    recognition.stop();
                    micBtn.innerText = "🎤 Greška, probaj opet";
                };
            } else {
                alert("Vaš browser ne podržava glasovni unos. Koristite Chrome.");
            }
        }

        async function handleLogin() {
            const uneseniId = document.getElementById('companyId').value;
            const unesenaSifra = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if(!uneseniId || !unesenaSifra) return alert("Popunite sva polja!");

            btn.innerText = "Provjera...";
            btn.disabled = true;

            try {
                const response = await fetch(scriptURL);
                const korisnici = await response.json();

                const pronadjenKorisnik = korisnici.find(k => 
                    String(k.user_id) === uneseniId && String(k.password) === unesenaSifra
                );

                if (pronadjenKorisnik) {
                    if(pronadjenKorisnik.status === "aktivan") {
                        loggedInUserId = uneseniId; // Spasimo ID za slanje izvještaja
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('dashboard').style.display = 'block';
                        document.getElementById('displayFirma').innerText = uneseniId;
                    } else {
                        alert("Nalog nije aktivan.");
                        btn.disabled = false;
                        btn.innerText = "Prijavi se";
                    }
                } else {
                    alert("Pogrešan ID ili Lozinka!");
                    btn.disabled = false;
                    btn.innerText = "Prijavi se";
                }
            } catch (error) {
                console.error(error);
                alert("Greška pri povezivanju sa bazom.");
                btn.disabled = false;
                btn.innerText = "Prijavi se";
            }
        }

        // SLANJE IZVJEŠTAJA U NOVU BAZU
        async function sendToAI() {
            const tekst = document.getElementById('userInput').value;
            const statusMsg = document.getElementById('statusMsg');
            const sendBtn = document.getElementById('sendBtn');

            if(!tekst) return alert("Prvo unesite ili izdiktirajte tekst.");

            const data = {
                tip: "izvjestaj",
                user_id: loggedInUserId,
                tekst: tekst
            };

            statusMsg.innerText = "Slanje u bazu...";
            statusMsg.style.color = "#f6ad55";
            sendBtn.disabled = true;

            try {
                // Koristimo mode: 'no-cors' za Google Apps Script POST zahtjeve
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                statusMsg.innerText = "✅ Izvještaj uspješno spremljen!";
                statusMsg.style.color = "#68d391";
                document.getElementById('userInput').value = ""; // Očisti polje
                
            } catch (error) {
                console.error(error);
                statusMsg.innerText = "❌ Greška pri slanju!";
                statusMsg.style.color = "#e53e3e";
            } finally {
                sendBtn.disabled = false;
            }
        }

        async function saveNewCompany() {
            const data = {
                tip: "novi_korisnik",
                user_id: document.getElementById('newFirmaID').value,
                password: document.getElementById('newFirmaPass').value,
                status: document.getElementById('newFirmaStatus').value
            };

            if(!data.user_id || !data.password) return alert("Popunite ID i Lozinku!");

            try {
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(data) 
                });
                alert("Korisnik poslan u bazu!");
                document.getElementById('newFirmaID').value = "";
                document.getElementById('newFirmaPass').value = "";
            } catch (e) {
                alert("Greška!");
            }
        }
    </script>
</body>
</html>
