<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation | Poslovni Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a202c; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #2d3748; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #4a5568; }
        h1 { color: #63b3ed; text-align: center; cursor: pointer; } 
        input, textarea { width: 100%; padding: 12px; margin-bottom: 1rem; border-radius: 6px; border: 1px solid #4a5568; background: #1a202c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4299e1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #3182ce; }
        #dashboard, #admin-panel { display: none; margin-top: 20px; }
        .admin-header { color: #f6ad55; border-top: 1px solid #4a5568; padding-top: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 onclick="openAdmin()">NH AI-Automation</h1>

        <!-- LOGIN SEKCIJA -->
        <div id="login-section">
            <p style="text-align: center;">Prijava za klijente</p>
            <input type="text" id="companyId" placeholder="Korisnički ID (user_id)">
            <input type="password" id="password" placeholder="Lozinka (password)">
            <button onclick="handleLogin()">Prijavi se</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <h3>Dobrodošli, <span id="displayFirma" style="color: #63b3ed;"></span></h3>
            <label>Izvještaj za sistem:</label>
            <textarea id="userInput" rows="4" placeholder="Unesite podatke za automatsko zapisivanje..."></textarea>
            <button onclick="sendToAI()">Pošalji na Analizu</button>
            <p id="statusMsg" style="color: #68d391; text-align: center;"></p>
        </div>

        <!-- ADMIN PANEL -->
        <div id="admin-panel">
            <h2 class="admin-header">Admin Panel</h2>
            <p>Dodajte novog korisnika u Google Sheet:</p>
            <input type="text" id="newFirmaID" placeholder="Novi user_id">
            <input type="text" id="newFirmaPass" placeholder="Nova lozinka (password)">
            <input type="text" id="newFirmaStatus" placeholder="Status (npr. aktivan)">
            <button onclick="saveNewCompany()" style="background-color: #f6ad55;">Spremi u Google Sheet</button>
        </div>
    </div>

    <script>
        // URL tvog Google Apps Scripta
        const scriptURL = "https://script.google.com/macros/s/AKfycbyG9TXfwNfUnIK2D3yEJCupmsrDqqyXIHYs2aBQxWUbZ3zHR0VQeZyabdvArDxjEEM/exec";

        let clicks = 0;
        function openAdmin() {
            clicks++;
            if(clicks === 5) {
                document.getElementById('admin-panel').style.display = 'block';
                alert("Admin mod aktiviran!");
            }
        }

        // Slanje podataka sa novim nazivima kolona
        function saveNewCompany() {
            const data = {
                user_id: document.getElementById('newFirmaID').value,
                password: document.getElementById('newFirmaPass').value,
                status: document.getElementById('newFirmaStatus').value
            };

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data) 
            })
            .then(() => {
                alert("Podaci poslani! Provjerite Google Sheet.");
                document.getElementById('newFirmaID').value = "";
                document.getElementById('newFirmaPass').value = "";
                document.getElementById('newFirmaStatus').value = "";
            })
            .catch(error => alert("Greška: " + error));
        }

        async function handleLogin() {
    const uneseniId = document.getElementById('companyId').value;
    const unesenaSifra = document.getElementById('password').value;
    const statusMsg = document.getElementById('statusMsg');

    try {
        // 1. Prvo dobavljamo sve korisnike iz Google Sheeta preko tvog URL-a
        // Napomena: Tvoj Apps Script mora podržavati GET metodu
        const response = await fetch(scriptURL);
        const korisnici = await response.json();

        // 2. Tražimo da li postoji korisnik sa tim ID-om i Šifrom
        const pronadjenKorisnik = korisnici.find(k => 
            String(k.user_id) === uneseniId && String(k.password) === unesenaSifra
        );

        if (pronadjenKorisnik) {
            // Ako je pronađen, provjeravamo status
            if(pronadjenKorisnik.status === "aktivan") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('displayFirma').innerText = uneseniId;
            } else {
                alert("Vaš nalog nije aktivan. Kontaktirajte admina.");
            }
        } else {
            alert("Pogrešan ID ili Lozinka! Provjerite tabelu.");
        }
    } catch (error) {
        console.error("Greška pri prijavi:", error);
        alert("Sistem trenutno ne može provjeriti bazu. Provjerite Google Apps Script.");
    }
}

        function sendToAI() {
            alert("Sistem spreman za automatsko zapisivanje govora!");
        }
    </script>
</body>
</html>
