<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation | Control Panel</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a202c; 
            color: #e2e8f0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            flex-direction: column;
        }
        
        /* Biranje jezika u gornjem desnom uglu */
        .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-btn {
            background: #2d3748;
            color: white;
            border: 1px solid #4a5568;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            margin-left: 5px;
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            background: #4299e1;
            border-color: #3182ce;
        }

        .card { 
            background: #2d3748; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid #4a5568; 
            box-sizing: border-box;
        }
        
        h1 { color: #63b3ed; text-align: center; margin-bottom: 5px; font-size: 2rem; }
        .subtitle { text-align: center; color: #a0aec0; margin-bottom: 30px; font-size: 0.95rem; }
        
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e0; }
        input { width: 100%; padding: 12px; margin-bottom: 1.2rem; border-radius: 6px; border: 1px solid #4a5568; background: #1a202c; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: #4299e1; outline: none; }
        
        /* Primarno dugme za Login */
        .btn-login { width: 100%; padding: 14px; background-color: #4299e1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-bottom: 15px; transition: background 0.2s; }
        .btn-login:hover { background-color: #3182ce; }
        
        /* Sekcija za dodatna dugmad (Demo i Registracija) u jednom redu */
        .action-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .btn-secondary { flex: 1; padding: 12px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; text-align: center; text-decoration: none; transition: background 0.2s; }
        
        .btn-demo { background-color: #48bb78; }
        .btn-demo:hover { background-color: #38a169; }
        
        .btn-register { background-color: #718096; }
        .btn-register:hover { background-color: #4a5568; }
        
        button:disabled { background-color: #4a5568; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- Biranje jezika -->
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('de')">DE</button>
    </div>

    <div class="card">
        <h1>NH AI-Automation</h1>
        <p class="subtitle" id="lbl-subtitle">AI Automation and Voice Assistants Control Panel</p>

        <!-- FORMALNA LOGIN SEKCIJA -->
        <div id="login-section">
            <label id="lbl-username-tag">Username / User ID:</label>
            <input type="text" id="companyId" placeholder="Enter your User ID">
            
            <label id="lbl-password-tag">Password:</label>
            <input type="password" id="password" placeholder="Enter your password">
            
            <!-- Glavno dugme za Login -->
            <button id="loginBtn" class="btn-login" onclick="handleLogin()">Login</button>
            
            <!-- Grupa dugmadi za Demo i Registraciju jedno pored drugog -->
            <div class="action-group">
                <button id="demoBtn" class="btn-secondary btn-demo" onclick="window.location.href='izvjestaj.html'">Try Demo</button>
                <button id="registerBtn" class="btn-secondary btn-register" onclick="handleRegisterClick()">Register</button>
            </div>
        </div>
    </div>

    <script>
        // Tvoj ispravni URL Google Apps Script skripte za bazu podataka
        const scriptURL = "https://script.google.com/macros/s/AKfycbweiMSOZNQI8UFdwTaB8Lf93WHAO5Ev7co_t-PmFkQ8chU9ngtuJxx-2KO-q_G65xQO/exec";

        // Prevodi za dvojezičnu strukturu
        const translations = {
            en: {
                subtitle: "AI Automation and Voice Assistants Control Panel",
                usernameTag: "Username / User ID:",
                passwordTag: "Password:",
                usernamePlaceholder: "Enter your User ID",
                passwordPlaceholder: "Enter your password",
                loginBtn: "Login",
                demoBtn: "Try Demo",
                registerBtn: "Register",
                checking: "Checking..."
            },
            de: {
                subtitle: "KI-Automatisierung und Sprachassistenten-Kontrollzentrum",
                usernameTag: "Benutzername / Benutzer-ID:",
                passwordTag: "Passwort:",
                usernamePlaceholder: "Geben Sie Ihre Benutzer-ID ein",
                passwordPlaceholder: "Geben Sie Ihr Passwort ein",
                loginBtn: "Einloggen",
                demoBtn: "Demo testen",
                registerBtn: "Registrieren",
                checking: "Überprüfung..."
            }
        };

        // Funkcija za dinamičku promjenu jezika bez osvježavanja stranice
        function setLanguage(lang) {
            document.getElementById('lbl-subtitle').innerText = translations[lang].subtitle;
            document.getElementById('lbl-username-tag').innerText = translations[lang].usernameTag;
            document.getElementById('lbl-password-tag').innerText = translations[lang].passwordTag;
            document.getElementById('companyId').placeholder = translations[lang].usernamePlaceholder;
            document.getElementById('password').placeholder = translations[lang].passwordPlaceholder;
            document.getElementById('loginBtn').innerText = translations[lang].loginBtn;
            document.getElementById('demoBtn').innerText = translations[lang].demoBtn;
            document.getElementById('registerBtn').innerText = translations[lang].registerBtn;

            // Aktiviraj stil na izabranom dugmetu
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(lang === 'en') buttons[0].classList.add('active');
            else buttons[1].classList.add('active');
        }

        // Postavi engleski kao početni jezik pri učitavanju portala
        window.onload = function() {
            setLanguage('en');
        };

        // Logika za prijavu i komunikaciju sa Google Sheet bazom podataka
        async function handleLogin() {
            const uneseniId = document.getElementById('companyId').value.trim();
            const unesenaSifra = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const currentLang = document.querySelector('.lang-btn.active').innerText.toLowerCase();

            if (!uneseniId || !unesenaSifra) {
                alert(currentLang === 'en' ? "Please enter both User ID and Password." : "Bitte geben Sie sowohl die Benutzer-ID als auch das Passwort ein.");
                return;
            }

            btn.disabled = true;
            btn.innerText = translations[currentLang].checking;

            try {
                // Sprječavanje keširanja dodavanjem vremenskog pečata (?t=...)
                const response = await fetch(scriptURL + "?t=" + new Date().getTime());
                const rezultat = await response.json();

                if (rezultat.error) {
                    alert("Database Error: " + rezultat.error);
                    resetBtn(btn);
                    return;
                }

                const korisnici = Array.isArray(rezultat) ? rezultat : [];
                const korisnik = korisnici.find(k => (k.user_id || "").toString().trim() === uneseniId);

                if (!korisnik) {
                    alert(currentLang === 'en' ? "User ID does not exist!" : "Benutzer-ID existiert nicht!");
                    resetBtn(btn);
                    return;
                }

                if ((korisnik.password || "").toString().trim() !== unesenaSifra) {
                    alert(currentLang === 'en' ? "Incorrect password!" : "Falsches Passwort!");
                    resetBtn(btn);
                    return;
                }

                const status = (korisnik.status || "").toString().toLowerCase().trim();
                if (status !== "aktivan" && status !== "active") {
                    alert(currentLang === 'en' ? "Account is not active." : "Konto ist nicht aktiv.");
                    resetBtn(btn);
                    return;
                }

                // Ako je sve u redu, šalji korisnika na izvještaj
                window.location.href = "izvjestaj.html"; 

            } catch (error) {
                console.error(error);
                alert(currentLang === 'en' ? "Connection error to the database." : "Verbindungsfehler zur Datenbank.");
                resetBtn(btn);
            }
        }

        function resetBtn(btn) {
            btn.disabled = false;
            const currentLang = document.querySelector('.lang-btn.active').innerText.toLowerCase();
            btn.innerText = translations[currentLang].loginBtn;
        }

        // Funkcija za klik na dugme Registracija
        function handleRegisterClick() {
            const currentLang = document.querySelector('.lang-btn.active').innerText.toLowerCase();
            if (currentLang === 'en') {
                alert("Registration is managed via the Administrator Panel. Please contact support.");
            } else {
                alert("Die Registrierung wird über das Administrator-Panel verwaltet. Bitte wenden Sie sich an den Support.");
            }
        }
    </script>
</body>
</html>
