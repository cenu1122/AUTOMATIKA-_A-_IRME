<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NH AI-Automation | Login & Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a202c; color: #e2e8f0; }
        .card { background: #2d3748; padding: 2rem; border-radius: 12px; border: 1px solid #4a5568; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4">

    <div class="card w-full max-w-md">
        <h1 class="text-blue-400 text-2xl font-bold text-center mb-6">NH AI-Automation</h1>
        
        <div id="register-section">
            <h2 class="text-white text-lg mb-4 border-b border-gray-600 pb-2">Register New Client</h2>
            <input type="text" id="reg-firma" placeholder="Company Name (ID)" class="w-full p-2 mb-2 bg-black rounded border border-gray-600">
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-2 mb-2 bg-black rounded border border-gray-600">
            <input type="text" id="reg-adresa" placeholder="Address" class="w-full p-2 mb-2 bg-black rounded border border-gray-600">
            <input type="text" id="reg-telefon" placeholder="Phone Number" class="w-full p-2 mb-4 bg-black rounded border border-gray-600">
            <button onclick="handleRegister()" class="w-full bg-green-600 p-3 rounded font-bold hover:bg-green-700">SUBMIT REGISTRATION</button>
            <p onclick="showLogin()" class="text-blue-400 text-sm mt-4 cursor-pointer text-center underline">Back to Login</p>
        </div>
    </div>

    <script>
        // === CONFIG ===
        const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
        const SUPABASE_KEY = "VAŠ_ANON_KLJUČ"; // OVDJE STAVITE VAŠ KLJUČ

        async function handleRegister() {
            const firma = document.getElementById('reg-firma').value;
            const email = document.getElementById('reg-email').value;
            const adresa = document.getElementById('reg-adresa').value;
            const telefon = document.getElementById('reg-telefon').value;

            if(!firma || !email) { alert("Please fill in Company Name and Email"); return; }

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Prefer": "return=representation"
                    },
                    body: JSON.stringify({
                        FIRMA: firma,
                        EMAIL: email,
                        ADRESA: adresa,
                        TELLEFON: telefon,
                        STATUS: "NEW"
                    })
                });

                if(res.ok) {
                    alert("Registration successful! You can now login.");
                    location.reload();
                } else {
                    alert("Error saving to database.");
                }
            } catch(e) {
                alert("Database connection error: " + e.message);
            }
        }
    </script>
</body>
</html>
