<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | AutoVox Portal</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #6b7280;
            --bg: #f9fafb;
        }

        body {
            margin: 0; font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg); display: flex; flex-direction: column;
            height: 100vh; color: #1f2937;
        }

        .warning-banner {
            background: #fffbeb; color: #92400e; padding: 12px;
            text-align: center; font-size: 0.9rem; border-bottom: 1px solid #fef3c7;
        }

        .container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 30px;
        }

        h2 { font-size: 2.5rem; margin: 0; }

        .button-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        .btn {
            text-decoration: none; padding: 14px 28px; border-radius: 12px;
            font-weight: 600; transition: transform 0.2s, box-shadow 0.2s;
            border: none; cursor: pointer; color: white;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        .btn-login { background: var(--primary); }
        .btn-register { background: var(--secondary); }
        .btn-demo { background: var(--accent); }

        .language-selector {
            position: absolute; top: 80px; right: 30px;
            padding: 8px; border-radius: 8px; border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="warning-banner" id="warning-text">NOTICE: The site is under construction.</div>

    <select class="language-selector" id="lang-switch" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="bs">Bosanski</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
    </select>

    <div class="container">
        <h2 id="welcome-title">Welcome</h2>
        <div class="button-group">
            <a href="LOGIN.html" class="btn btn-login" id="btn-login">Login</a>
            <a href="izvjestajhj.html" class="btn btn-demo" id="btn-demo">Try Demo</a>
            <a href="REGISTER.html" class="btn btn-register" id="btn-register">Register</a>
        </div>
    </div>

    <script>
        const translations = {
            en: { warning: "NOTICE: Site under reconstruction.", welcome: "Welcome", login: "Login", register: "Register", demo: "Try Demo" },
            bs: { warning: "OBAVJEŠTENJE: Stranica u rekonstrukciji.", welcome: "Dobrodošli", login: "Prijava", register: "Registracija", demo: "Probaj Demo" },
            de: { warning: "HINWEIS: Seite im Umbau.", welcome: "Willkommen", login: "Anmelden", register: "Registrieren", demo: "Demo testen" },
            fr: { warning: "AVIS: Site en reconstruction.", welcome: "Bienvenue", login: "Connexion", register: "S'inscrire", demo: "Essayer" }
        };

        function changeLanguage() {
            const lang = document.getElementById('lang-switch').value;
            document.getElementById('warning-text').innerText = translations[lang].warning;
            document.getElementById('welcome-title').innerText = translations[lang].welcome;
            document.getElementById('btn-login').innerText = translations[lang].login;
            document.getElementById('btn-register').innerText = translations[lang].register;
            document.getElementById('btn-demo').innerText = translations[lang].demo;
            document.documentElement.lang = lang;
        }

        window.onload = changeLanguage;
    </script>
</body>
</html>
