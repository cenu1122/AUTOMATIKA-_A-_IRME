<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NH AI-Automation | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="login-section" class="card bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-xl font-bold mb-6 text-center">Register New Client</h2>
        
        <label class="block text-slate-300 text-sm mb-1">Company Name:</label>
        <input type="text" id="reg-firma" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white focus:border-blue-500 outline-none" placeholder="Enter Company Name">
        
        <label class="block text-slate-300 text-sm mb-1">Email:</label>
        <input type="email" id="reg-email" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white focus:border-blue-500 outline-none" placeholder="Enter Email">
        
        <label class="block text-slate-300 text-sm mb-1">Address:</label>
        <input type="text" id="reg-adresa" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white focus:border-blue-500 outline-none" placeholder="Enter Address">
        
        <label class="block text-slate-300 text-sm mb-1">Phone:</label>
        <input type="text" id="reg-telefon" class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white focus:border-blue-500 outline-none" placeholder="Enter Phone">
        
        <button id="registerBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold p-3 rounded transition" onclick="handleRegister()">
            Register Now
        </button>
        
        <button class="w-full mt-3 text-slate-400 hover:text-white text-sm underline" onclick="window.location.reload()">Back to Login</button>
    </div>

 <script>
const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

async function handleRegister() {

    const btn = document.getElementById('registerBtn');

    btn.innerText = "Registering...";
    btn.disabled = true;

    const firma = document.getElementById('reg-firma').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const adresa = document.getElementById('reg-adresa').value.trim();
    const telefon = document.getElementById('reg-telefon').value.trim();

    if (!firma || !email || !adresa || !telefon) {
        alert("Popunite sva polja!");
        btn.innerText = "Register Now";
        btn.disabled = false;
        return;
    }

    try {

        const payload = {
            FIRMA: firma,
            EMAIL: email,
            ADRESA: adresa,
            TELLEFON: telefon,
            STATUS: "NEW"
        };

        console.log("=== PODACI ZA SLANJE ===");
        console.log(payload);

        const response = await fetch(
            `${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Prefer": "return=representation"
                },
                body: JSON.stringify(payload)
            }
        );

        const responseText = await response.text();

        console.log("=== HTTP STATUS ===");
        console.log(response.status);

        console.log("=== SUPABASE RESPONSE ===");
        console.log(responseText);

        if (!response.ok) {

            let errorObj;

            try {
                errorObj = JSON.parse(responseText);
            } catch {
                errorObj = {
                    message: responseText
                };
            }

            console.error("=== SUPABASE ERROR ===");
            console.error(errorObj);

            alert(
                "REGISTRACIJA NIJE USPJELA\n\n" +
                "HTTP STATUS: " + response.status + "\n\n" +
                "CODE: " + (errorObj.code || "N/A") + "\n\n" +
                "MESSAGE: " + (errorObj.message || "N/A") + "\n\n" +
                "DETAILS: " + (errorObj.details || "N/A") + "\n\n" +
                "HINT: " + (errorObj.hint || "N/A")
            );

            return;
        }

        console.log("=== USPJEŠNO REGISTROVANO ===");
        console.log(responseText);

        alert("Uspješno registrovano!");

        window.location.reload();

    } catch (e) {

        console.error("=== JAVASCRIPT GREŠKA ===");
        console.error(e);

        alert(
            "GREŠKA PRI POVEZIVANJU\n\n" +
            e.message
        );

    } finally {

        btn.innerText = "Register Now";
        btn.disabled = false;

    }
}
</script>

      </body>

</html>
