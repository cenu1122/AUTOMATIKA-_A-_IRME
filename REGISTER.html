<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI-Automation | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-xl border border-slate-700 shadow-2xl w-full max-w-sm">
        <h2 class="text-white text-2xl font-bold mb-6 text-center">Register New Client</h2>

        <label class="block text-slate-300 text-sm mb-1">Company Name:</label>
        <input type="text" id="reg-firma" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white outline-none" placeholder="Enter Company Name">

        <label class="block text-slate-300 text-sm mb-1">Email:</label>
        <input type="email" id="reg-email" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white outline-none" placeholder="Enter Email">

        <label class="block text-slate-300 text-sm mb-1">Password:</label>
        <input type="password" id="reg-sifra" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white outline-none" placeholder="Enter Password">

        <label class="block text-slate-300 text-sm mb-1">Address:</label>
        <input type="text" id="reg-adresa" class="w-full p-2 mb-3 bg-slate-900 border border-slate-600 rounded text-white outline-none" placeholder="Enter Address">

        <label class="block text-slate-300 text-sm mb-1">Phone:</label>
        <input type="text" id="reg-telefon" class="w-full p-2 mb-6 bg-slate-900 border border-slate-600 rounded text-white outline-none" placeholder="Enter Phone">

        <button id="registerBtn" onclick="handleRegister()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold p-3 rounded transition">
            Register Now
        </button>
    </div>

<script>
const SUPABASE_URL = "https://mpgbpgmsorunfbdskbwn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

async function handleRegister() {
    const btn = document.getElementById("registerBtn");
    btn.innerText = "Registering...";
    btn.disabled = true;

    const firma = document.getElementById("reg-firma").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const sifra = document.getElementById("reg-sifra").value.trim();
    const adresa = document.getElementById("reg-adresa").value.trim();
    const telefon = document.getElementById("reg-telefon").value.trim();

console.log({
    firma,
    email,
    sifra,
    adresa,
    telefon
});
   if (!firma || !email || !sifra || !adresa || !telefon) {
        alert("Popunite sva polja!");
        btn.innerText = "Register Now";
        btn.disabled = false;
        return;
    }

    try {
        const payload = {
            FIRMA: firma,
            EMAIL: email,
            PASSWWOTF: sifra, // Ime kolone u bazi
            ADRESA: adresa,
            TELLEFON: telefon,
            STATUS: "NEW"
        };

        const response = await fetch(`${SUPABASE_URL}/rest/v1/AUTOVOXA_KLIJENTI`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Prefer": "return=representation"
            },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            const err = await response.text();
            throw new Error(err);
        }

        alert("Uspješno registrovano!");
        window.location.reload();
    } catch (e) {
        alert("GREŠKA: " + e.message);
    } finally {
        btn.innerText = "Register Now";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
