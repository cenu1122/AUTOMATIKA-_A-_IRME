<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Generator Ponuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-emerald-500 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer focus:border-emerald-500">
                    <option value="izvjestaj.html">📋 Pregled Izvještaja</option>
                    <option value="ugovori.html">🤖 AI Generator Ugovora</option>
                    <option value="cv-generator.html">📄 AI CV / Biografija Generator</option>
                    <option value="email-generator.html">✉️ AI Email / Pismo Generator</option>
                    <option value="ponuda-generator.html" selected>📊 AI Generator Ponuda / Predračuna</option>
                    <option value="zapisnik-generator.html">📝 AI Zapisnik sa Sastanka</option>
                </select>

                <button onclick="pokreniAlarm()" class="bg-red-600 hover:bg-red-700 text-white font-black py-2.5 px-4 rounded-xl text-xs uppercase italic transition shadow-lg shadow-red-600/20">
                    🚨 Hitan Alarm
                </button>

                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2.5 px-3 rounded-xl text-xs uppercase transition">
                    Odjava
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-emerald-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-emerald-500 font-black text-xl uppercase italic mb-4">📊 NH AI — Generator Poslovnih Ponuda i Predračuna</h2>
            <form id="ponuda-forma" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Za koga je ponuda i šta je predmet posla?</label>
                    <input type="text" id="ponuda-naslov" required placeholder="npr. Ponuda za d.o.o. Automatika - Izrada i montiranje elektro ormara" 
                           class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-emerald-500 outline-none transition text-white">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Unesi specifikaciju (Materijal, rad, cijene, garancija):</label>
                    <textarea id="ponuda-detalji" rows="4" required placeholder="Samo nabacaj: PLC kontroler 400 KM, senzori 150 KM, ruke programiranja i ugradnje 500 KM. Garancija 2 godine, rok isporuke 7 dana..." 
                              class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-emerald-500 outline-none transition text-white"></textarea>
                </div>
                <button type="submit" id="btn-slanje" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-emerald-600/20">
                    📊 GENERIŠI ZVANIČNU PONUDU
                </button>
            </form>
        </div>

        <hr class="border-zinc-800 mb-12">

        <h1 class="text-emerald-500 font-black text-3xl italic mb-8 uppercase tracking-tighter">VAŠE KREIRANE PONUDE</h1>
        <div id="sve-ponude" class="space-y-6">
            <p class="text-zinc-500 animate-pulse uppercase text-xs text-center">Učitavam ponude...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        document.getElementById('ponuda-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const naslov = document.getElementById('ponuda-naslov').value;
            const detalji = document.getElementById('ponuda-detalji').value;

            btn.innerText = "AI KREIRA PONUDU...";
            btn.disabled = true;

            const noviRed = {
                "Datum": new Date().toLocaleString('hr-BA'),
                "Korisnik ID": firmaId, 
                "Tekst izvještaja": "AI_PONUDA: " + naslov,
                "AI Analiza": "U izradi... [Specifikacija: " + detalji + "]"
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [noviRed] })
                });

                if(res.ok) {
                    alert("Zahtjev poslan! AI upravo pretvara sirove cijene u profesionalnu ponudu spremnu za klijenta.");
                    document.getElementById('ponuda-forma').reset();
                    await ucitajPonude(); 
                }
            } catch (err) {
                alert("Greška: " + err.message);
            } finally {
                btn.innerText = "📊 GENERIŠI ZVANIČNU PONUDU";
                btn.disabled = false;
            }
        });

        async function ucitajPonude() {
            const kontejner = document.getElementById('sve-ponude');
            try {
                const odgovor = await fetch(API_URL + '?t=' + Date.now());
                const podaci = await odgovor.json();
                const listaPodataka = Array.isArray(podaci) ? podaci : [];

                const ponude = listaPodataka.filter(red => red["Korisnik ID"] === firmaId && red["Tekst izvještaja"].startsWith("AI_PONUDA:"));
                const poredani = [...ponude].reverse();
                
                kontejner.innerHTML = '';
                
                if(poredani.length === 0) {
                    kontejner.innerHTML = "<p class='text-zinc-600 text-center uppercase text-xs'>Nema kreiranih poslovnih ponuda.</p>";
                    return;
                }

                poredani.forEach((red, index) => {
                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl hover:border-emerald-600/30 transition duration-500";
                    
                    const cistiNaslov = red["Tekst izvještaja"].replace("AI_PONUDA: ", "");
                    const tekstPonude = (red["AI Analiza"] || "Nema teksta").replace(/`/g, '\\`').replace(/"/g, '&quot;');

                    kartica.innerHTML = `
                        <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                            <span class="text-emerald-500 font-black text-[10px] uppercase italic">PONUDA #${poredani.length - index}</span>
                            <span class="text-zinc-600 font-mono text-[10px]">${red["Datum"] || 'Bez datuma'}</span>
                        </div>
                        <h3 class="text-white font-black uppercase italic text-xl mb-3">${cistiNaslov}</h3>
                        <div class="bg-black/60 p-4 rounded-xl border border-zinc-800/50 mb-4">
                            <p class="text-zinc-400 text-sm font-mono whitespace-pre-line">${red["AI Analiza"] || 'AI računa i piše ponudu...'}</p>
                        </div>
                        <button onclick="printajPonudu('${cistiNaslov}', \`${tekstPonude}\`)" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-2 px-4 rounded-xl text-xs uppercase transition w-full sm:w-auto">
                            🖨️ Isprintaj ponudu / PDF
                        </button>
                    `;
                    kontejner.appendChild(kartica);
                });
            } catch (err) {
                kontejner.innerHTML = `<p class="text-red-600 font-bold text-center">GREŠKA: ${err.message}</p>`;
            }
        }

        function printajPonudu(naslov, tekst) {
            const printProzor = window.open('', '_blank');
            printProzor.document.write(`
                <html>
                <head>
                    <title>Ponuda - ${naslov}</title>
                    <style>
                        body { font-family: 'Arial', sans-serif; padding: 50px; color: #000; line-height: 1.6; }
                        .no-print { background: #10b981; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 30px; }
                        @media print { .no-print { display: none; } }
                        .sadrzaj { text-align: justify; font-size: 14px; white-space: pre-line; }
                        h2 { color: #10b981; border-b: 2px solid #ccc; padding-bottom: 10px; text-transform: uppercase; }
                    </style>
                </head>
                <body>
                    <button class="no-print" onclick="window.print()">🖨️ Odštampaj Ponudu / Spasi kao PDF</button>
                    <h2>POSLOVNA PONUDA: ${naslov}</h2>
                    <div class="sadrzaj">${tekst}</div>
                </body>
                </html>
            `);
            printProzor.document.close();
        }

        function pokreniAlarm() { alert("🚨 ALARM AKTIVIRAN za firmu: " + firmaId); }
        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }

        ucitajPonude();
        setInterval(ucitajPonude, 20000);
    </script>
</body>
</html>
