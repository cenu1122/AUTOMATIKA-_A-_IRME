<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Professional Fakture</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div id="glavni-kontejner" class="max-w-4xl mx-auto">
        <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
            <h2 class="text-emerald-500 font-black text-xl mb-4">💰 Smart AI Generator</h2>
            <textarea id="ai-prompt-tekst" rows="6" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm" placeholder="Npr. 10 kg eksera po 5 KM, 2 kubika daske po 600 KM..."></textarea>
            <button onclick="generisiFakturu()" id="dugme-generisi" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-black uppercase italic transition">
                ✨ GENERIŠI FAKTURU
            </button>
        </div>
    </div>

    <div id="faktura-prikaz" class="hidden bg-white text-black p-12 mx-auto max-w-4xl rounded-xl my-6 shadow-2xl">
        <div id="faktura-sadrzaj-render"></div>
        <div class="mt-8 flex gap-4">
            <button onclick="window.print()" class="bg-blue-600 text-white py-2 px-6 rounded-lg font-bold">🖨️ Print / PDF</button>
            <button onclick="zatvoriPrikaz()" class="bg-zinc-600 text-white py-2 px-6 rounded-lg font-bold">⬅️ Nazad</button>
        </div>
    </div>

    <script>
        async function generisiFakturu() {
            // 1. Prvo uzmi vrijednost iz inputa
            const promptKorisnika = document.getElementById("ai-prompt-tekst").value.trim();
            
            // 2. Onda kreiraj puni prompt
            const puniPrompt = "Napravi kompletnu profesionalnu fakturu sa zaglavljem, tabelom i obračunom PDV-a. " + promptKorisnika;
            
            const dugme = document.getElementById("dugme-generisi");
            const URL_FUNKCIJE = "https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent";

            if (!promptKorisnika) { alert("Unesite podatke!"); return; }
            
            dugme.innerText = "⏳ KREIRAM...";
            dugme.disabled = true;

            try {
                const response = await fetch(URL_FUNKCIJE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        userText: `ZADATAK: Generiši ISKLJUČIVO HTML fakturu.
                        CSS PRAVILA:
                        1. Tabela mora imati width: 100%.
                        2. Kolone 'Cijena' i 'Ukupno' moraju imati 'text-align: right' (poravnanje udesno).
                        3. Zadnji redovi (Ukupno, PDV, Za uplatu) moraju biti poravnati udesno.
                        4. Ne piši uvodni tekst, samo HTML.
                        Unos: ${puniPrompt}` // Ovdje sada koristimo ispravan promjenljivu
                    })
                });

                const data = await response.json();
                const odgovor = data.tekst || data.content || "Greška.";
                document.getElementById("faktura-sadrzaj-render").innerHTML = odgovor;
                
                document.getElementById("faktura-prikaz").classList.remove("hidden");
                document.getElementById("glavni-kontejner").classList.add("hidden");
            } catch (error) {
                alert("Greška: " + error.message);
            } finally {
                dugme.innerText = "✨ GENERIŠI FAKTURU";
                dugme.disabled = false;
            }
        }

        function zatvoriPrikaz() {
            document.getElementById("faktura-prikaz").classList.add("hidden");
            document.getElementById("glavni-kontejner").classList.remove("hidden");
        }
    </script>
</body>
</html>
