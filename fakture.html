<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Faktura Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #faktura-sadrzaj-render table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        #faktura-sadrzaj-render th {
            background-color: #f3f4f6;
            border: 1px solid black;
            padding: 10px;
        }

        #faktura-sadrzaj-render td {
            border: 1px solid black;
            padding: 10px;
        }

        .text-right {
            text-align: right;
        }

        /* OVAJ DIO SAKRIVA DUGMAD NA PAPIRU/PDF-u */
        @media print {
            body {
                background: white;
            }

            #input-dio,
            .akcija-dugmad,
            #kontrolna-traka {
                display: none !important;
            }

            #faktura-prikaz {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
                padding: 0;
            }
        }
    </style>
</head>

<body class="bg-zinc-100 p-6">

    <div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">

        <h1 class="text-3xl font-bold mb-4">
            AI Generator Faktura
        </h1>

        <p class="mb-4 text-gray-600">
            Upiši ili izdiktiraj šta si utrošio.
        </p>

        <textarea id="ai-prompt-tekst" rows="6" class="w-full border border-gray-300 p-4 rounded-xl" placeholder="Primjer:
10m kabla po 2KM,
3 utičnice po 5KM,
1 osigurač po 15KM"></textarea>

        <button id="mikrofon-dugme" onclick="pokreniMikrofon()" class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold akcija-dugmad">
            🎤 DIKTIRAJ U MIKROFON
        </button>

        <button onclick="generisiFakturu()" id="dugme-generisi" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-lg akcija-dugmad">
            KREIRAJ FAKTURU
        </button>

    </div>

    <div id="kontrolna-traka" class="hidden max-w-4xl mx-auto mb-4 flex justify-between items-center bg-blue-50 p-4 rounded-xl border border-blue-200 shadow-md">
        <span class="text-blue-800 font-semibold">✨ Faktura je uspješno generisana!</span>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-md transition-all">
            🖨️ PRINTAJ / SPASI U PDF
        </button>
    </div>

    <div id="faktura-prikaz" class="hidden max-w-4xl mx-auto bg-white p-12 shadow-2xl rounded-2xl">

        <div class="flex justify-between border-b-2 border-black pb-6 mb-6">
            <div>
                <h2 class="text-3xl font-bold">
                    MOJA FIRMA D.O.O.
                </h2>
                <p>Ulica bb</p>
                <p>71000 Sarajevo</p>
                <p>ID: 420000000000</p>
            </div>

            <div class="text-right">
                <h3 class="text-2xl font-bold uppercase">
                    Faktura
                </h3>
                <p id="datum-fakture"></p>
            </div>
        </div>

        <div id="faktura-sadrzaj-render"></div>

    </div>

    <script>
        // DATUM
        const danas = new Date();
        document.getElementById("datum-fakture").innerText =
            "Datum: " + danas.toLocaleDateString("bs-BA");

        // =========================
        // MIKROFON LOGIKA
        // =========================
        function pokreniMikrofon() {
            const SpeechRecognition =
                window.SpeechRecognition ||
                window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert("Browser ne podržava mikrofon!");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = "hr-HR";
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.start();

            const mikrofonDugme = document.getElementById("mikrofon-dugme");
            mikrofonDugme.innerText = "🎤 SLUŠAM...";
            mikrofonDugme.classList.remove("bg-red-600");
            mikrofonDugme.classList.add("bg-yellow-500");

            recognition.onresult = function(event) {
                const tekst = event.results[0][0].transcript;
                const textarea = document.getElementById("ai-prompt-tekst");
                textarea.value += "\n" + tekst;
            };

            recognition.onend = function() {
                mikrofonDugme.innerText = "🎤 DIKTIRAJ U MIKROFON";
                mikrofonDugme.classList.remove("bg-yellow-500");
                mikrofonDugme.classList.add("bg-red-600");
            };

            recognition.onerror = function(event) {
                console.error(event);
                alert("Greška mikrofona!");
            };
        }

        // =========================
        // GENERISANJE FAKTURE
        // =========================
        async function generisiFakturu() {
            const tekst = document.getElementById("ai-prompt-tekst").value;
            const dugme = document.getElementById("dugme-generisi");

            if (!tekst.trim()) {
                alert("Unesi podatke!");
                return;
            }

            dugme.disabled = true;
            dugme.innerText = "Generišem...";

            try {
                const response = await fetch(
                    "https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent", 
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            userText: `
Generiši HTML tabelu sa stavkama.

Na samom vrhu tabele (ili unutar naslovnog reda) jasno napiši unikatni "Broj fakture" u formatu (Broj/Godina).

Kolone:
- R.br
- Opis
- Kol
- Cijena
- Ukupno

Uključi i redove za Subtotal, PDV (17%) i UKUPNO na dnu tabele.
NE dodavati nikakav tekst prije ili poslije tabele.
Samo HTML tabela.

Podaci:
${tekst}
`
                        })
                    }
                );

                if (!response.ok) {
                    throw new Error("Greška servera");
                }

                const data = await response.json();

                const kontejner = document.getElementById("faktura-sadrzaj-render");

                // UBACI TABELU OD AI-JA
                kontejner.innerHTML =
                    data.tekst ||
                    data.content ||
                    data.response ||
                    "<p>Greška pri generisanju.</p>";

                // SAKRIJ UNOS POLJA
                document.getElementById("input-dio").classList.add("hidden");
                
                // PRIKAŽI KONTROLNU TRAKU SA PRINT DUGMETOM I FAKTURU
                document.getElementById("kontrolna-traka").classList.remove("hidden");
                document.getElementById("faktura-prikaz").classList.remove("hidden");

            } catch (error) {
                console.error(error);
                alert("Greška pri kreiranju fakture!");
            } finally {
                dugme.disabled = false;
                dugme.innerText = "KREIRAJ FAKTURU";
            }
        }
    </script>

</body>

</html>
