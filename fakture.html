<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Profesionalna Faktura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Stil za štampu */
        @media print { .no-print { display: none; } }
        /* Tabela stil */
        .faktura-tabela { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .faktura-tabela th { background: #333; color: white; padding: 10px; text-align: left; }
        .faktura-tabela td { border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body class="bg-gray-100 p-10">

    <div id="input-dio" class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md mb-8 no-print">
        <h2 class="text-xl font-bold mb-4">Unos podataka</h2>
        <textarea id="unos" class="w-full border p-2 h-32" placeholder="Npr: Logo dizajn, 1, 150..."></textarea>
        <button onclick="generisi()" class="bg-black text-white px-6 py-2 mt-4">KREIRAJ FAKTURU</button>
    </div>

    <div id="faktura-prikaz" class="hidden max-w-4xl mx-auto bg-white p-10 shadow-xl border border-gray-300">
        <div class="bg-gray-900 text-white p-6 -mx-10 -mt-10 mb-8">
            <h1 class="text-4xl font-bold">INVOICE</h1>
            <p>AI Generator Faktura - GEMINI POMOC</p>
            <div class="text-right -mt-16">
                <p class="font-bold">VAŠA TVRTKA: MOJA FIRMA D.O.O.</p>
                <p>Ulica bb, 71000 Sarajevo</p>
                <p>ID: 420000000000</p>
            </div>
        </div>

        <div class="grid grid-cols-2 mb-10">
            <div>
                <p><strong>Broj fakture:</strong> 001/2026</p>
                <p><strong>Datum:</strong> 22.05.2026</p>
            </div>
            <div class="text-right">
                <p><strong>KUPAC:</strong> [Ime Kupca]</p>
            </div>
        </div>

        <div id="faktura-sadrzaj-render"></div>

        <div class="mt-10 flex justify-end">
            <div class="w-64">
                <div class="flex justify-between border-b py-1"><span>Subtotal:</span> <span id="sub-total">0.00 KM</span></div>
                <div class="flex justify-between border-b py-1"><span>PDV (17%):</span> <span id="pdv-total">0.00 KM</span></div>
                <div class="flex justify-between font-bold py-1"><span>UKUPNO:</span> <span id="uk-total">0.00 KM</span></div>
            </div>
        </div>
    </div>

    <script>
        async function generisi() {
            const tekst = document.getElementById('unos').value;
            // AI sada samo generiše HTML redove tabele
            const response = await fetch("https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    userText: `Vrati samo <tr> elemente za tabelu (Rbr, Opis, Kol, Cijena, Ukupno) na osnovu: ${tekst}` 
                })
            });
            const data = await response.json();
            document.getElementById('faktura-sadrzaj-render').innerHTML = 
                `<table class="faktura-tabela"><tr><th>Rbr.</th><th>Opis</th><th>Kol.</th><th>Cijena</th><th>Iznos</th></tr>${data.tekst || data.content}</table>`;
            
            document.getElementById('input-dio').classList.add('hidden');
            document.getElementById('faktura-prikaz').classList.remove('hidden');
        }
    </script>
</body>
</html>
