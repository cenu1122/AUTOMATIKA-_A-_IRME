<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Faktura Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        #faktura-sadrzaj-render table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        #faktura-sadrzaj-render th {
            background-color: #f3f4f6;
            border: 1px solid black;
            padding: 10px;
        }

        #faktura-sadrzaj-render td {
            border: 1px solid black;
            padding: 10px;
        }

        .text-right {
            text-align: right;
        }

        @media print {
            body {
                background: white;
            }

            #input-dio,
            #print-dugme {
                display: none;
            }

            #faktura-prikaz {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
            }
        }
    </style>
</head>

<body class="bg-zinc-100 p-6">

    <!-- INPUT DIO -->
    <div id="input-dio"
        class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">

        <h1 class="text-3xl font-bold mb-4">
            AI Generator Faktura
        </h1>

        <p class="mb-4 text-gray-600">
            Unesi tekstualni opis računa.
        </p>

        <textarea id="ai-prompt-tekst"
            rows="6"
            class="w-full border border-gray-300 p-4 rounded-xl"
            placeholder="Primjer:
10m kabla po 2KM,
3 utičnice po 5KM,
1 osigurač po 15KM"></textarea>

        <button onclick="generisiFakturu()"
            id="dugme-generisi"
            class="mt-5 w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-lg">

            KREIRAJ FAKTURU

        </button>

    </div>

    <!-- FAKTURA -->
    <div id="faktura-prikaz"
        class="hidden max-w-4xl mx-auto bg-white p-12 shadow-2xl mt-8 rounded-2xl">

        <!-- HEADER -->
        <div class="flex justify-between border-b-2 border-black pb-6 mb-6">

            <div>

                <h2 class="text-3xl font-bold">
                    MOJA FIRMA D.O.O.
                </h2>

                <p>Ulica bb</p>
                <p>71000 Sarajevo</p>
                <p>ID: 420000000000</p>

            </div>

            <div class="text-right">

                <h3 class="text-2xl font-bold uppercase">
                    Faktura
                </h3>

                <p id="datum-fakture"></p>

            </div>

        </div>

        <!-- SADRŽAJ -->
        <div id="faktura-sadrzaj-render"></div>

        <!-- PRINT -->
        <button id="print-dugme"
            onclick="window.print()"
            class="mt-8 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold">

            PRINTAJ FAKTURU

        </button>

    </div>

    <script>

        // POSTAVI DATUM
        const danas = new Date();

        document.getElementById("datum-fakture").innerText =
            "Datum: " + danas.toLocaleDateString("bs-BA");

        async function generisiFakturu() {

            const tekst = document.getElementById("ai-prompt-tekst").value;

            const dugme = document.getElementById("dugme-generisi");

            // VALIDACIJA
            if (!tekst.trim()) {

                alert("Unesi podatke za fakturu!");

                return;
            }

            dugme.disabled = true;

            dugme.innerText = "Generišem fakturu...";

            try {

                const response = await fetch(
                    "https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            userText: `
ZADATAK:

Generiši ISKLJUČIVO VALIDAN HTML.

NE piši ništa osim HTML-a.

Napraviti tabelu sa sljedećim kolonama:

- R.br
- Opis
- Kol
- Cijena
- Ukupno

Tabela mora imati border 1px solid black.

Na kraju dodati:

- Ukupno bez PDV
- PDV 17%
- UKUPNO ZA UPLATU

Sav HTML mora biti profesionalno formatiran.

Korisnički unos:
${tekst}
`

                        })

                    }
                );

                // PROVJERA
                if (!response.ok) {
                    throw new Error("Greška servera");
                }

                const data = await response.json();

                console.log(data);

                // UBACI HTML
                document.getElementById(
                    "faktura-sadrzaj-render"
                ).innerHTML =
                    data.tekst ||
                    data.content ||
                    data.response ||
                    "<p>Greška pri generisanju fakture.</p>";

                // PRIKAŽI FAKTURU
                document.getElementById("input-dio")
                    .classList.add("hidden");

                document.getElementById("faktura-prikaz")
                    .classList.remove("hidden");

            } catch (error) {

                console.error(error);

                alert("Došlo je do greške!");

            } finally {

                dugme.disabled = false;

                dugme.innerText = "KREIRAJ FAKTURU";
            }

        }

    </script>

</body>

</html>
