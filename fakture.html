<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Profesionalni Faktura Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* OVO OSIGURAVA DA TABELA UVIJEK IZGLEDA KAO DOKUMENT */
        #faktura-sadrzaj-render table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        #faktura-sadrzaj-render th { background: #f3f4f6; border: 1px solid #000; padding: 10px; }
        #faktura-sadrzaj-render td { border: 1px solid #000; padding: 10px; }
        .text-right { text-align: right; }
    </style>
</head>
<body class="bg-zinc-100 p-6">

    <div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Unos podataka za fakturu</h1>
        <textarea id="ai-prompt-tekst" rows="5" class="w-full border p-4 rounded-lg" placeholder="Npr: 10m kabla po 2KM, 1 utičnica po 5KM..."></textarea>
        <button onclick="generisiFakturu()" id="dugme-generisi" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-lg font-bold">KREIRAJ FAKTURU</button>
    </div>

    <div id="faktura-prikaz" class="hidden max-w-3xl mx-auto bg-white p-12 shadow-2xl mt-8">
        <div class="flex justify-between border-b-2 border-black pb-6 mb-6">
            <div>
                <h2 class="text-3xl font-bold">MOJA FIRMA D.O.O.</h2>
                <p>Ulica bb, 71000 Sarajevo</p>
                <p>ID: 420000000000</p>
            </div>
            <div class="text-right">
                <h3 class="text-xl font-bold uppercase">Faktura</h3>
                <p>Datum: 22.05.2026.</p>
            </div>
        </div>

        <div id="faktura-sadrzaj-render"></div>
    </div>

    <script>
        async function generisiFakturu() {
            const tekst = document.getElementById("ai-prompt-tekst").value;
            const dugme = document.getElementById("dugme-generisi");
            
            dugme.innerText = "Računam...";
            
            try {
                const response = await fetch("https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        userText: `Napravi samo HTML tabelu (bez zaglavlja i bez teksta okolo). 
                        Kolone: R.br, Opis, Kol, Cijena, Ukupno. 
                        Na kraju dodaj redove za: Ukupno, PDV 17%, Za uplatu.
                        Podaci: ${tekst}` 
                    })
                });

                const data = await response.json();
                document.getElementById("faktura-sadrzaj-render").innerHTML = data.tekst || data.content;
                document.getElementById("input-dio").classList.add("hidden");
                document.getElementById("faktura-prikaz").classList.remove("hidden");
            } catch(e) { alert("Greška!"); }
        }
    </script>
</body>
</html>
