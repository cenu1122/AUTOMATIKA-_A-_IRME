<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - AI Generator Faktura</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div id="glavni-kontejner" class="max-w-4xl mx-auto">
        <nav class="flex gap-6 mb-6 border-b border-zinc-800 pb-4">
            <a href="ugovori.html" class="text-zinc-500 hover:text-blue-500 transition">📄 Ugovori</a>
            <a href="fakture.html" class="text-blue-500 font-bold border-b-2 border-blue-500">💰 Fakture</a>
        </nav>

        <div class="bg-zinc-900 border border-emerald-600/30 p-6 rounded-2xl shadow-2xl">
            <h2 class="text-emerald-500 font-black text-xl uppercase italic mb-2">💰 Smart AI Generator Faktura</h2>
            <p class="text-zinc-400 text-xs mb-6">Unesite podatke o poslu, klijentu i iznosu. AI će napraviti profesionalnu fakturu.</p>
            
            <div class="space-y-4">
                <textarea id="ai-prompt-tekst" rows="6" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white text-sm focus:border-emerald-500 outline-none" placeholder="ZADATAK: Generiši fakturu za: Firma ABC Sistemi, iznos 2500 KM, usluga: Montaža ormara i PLC programiranje..."></textarea>
                <button onclick="generisiFakturu()" id="dugme-generisi" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-xl uppercase italic transition shadow-lg shadow-emerald-900/20">
                    ✨ GENERIŠI FAKTURU
                </button>
            </div>
        </div>
    </div>

    <div id="faktura-prikaz" class="hidden bg-white text-black p-12 mx-auto max-w-4xl rounded-xl my-6 shadow-2xl">
        <div id="faktura-sadrzaj-render"></div>
        
        <div class="mt-8 flex gap-4">
            <button onclick="window.print()" class="bg-blue-600 text-white py-2 px-6 rounded-lg font-bold hover:bg-blue-700">🖨️ Print / PDF</button>
            <button onclick="zatvoriPrikaz()" class="bg-zinc-600 text-white py-2 px-6 rounded-lg font-bold hover:bg-zinc-700">⬅️ Nazad</button>
        </div>
    </div>

  <script>
    async function generisiFakturu() {
        const promptKorisnika = document.getElementById("ai-prompt-tekst").value.trim();
        const dugme = document.getElementById("dugme-generisi");
        // Provjeri da li je ovo ispravan URL tvoje Supabase funkcije
        const URL_FUNKCIJE = "https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent";

        if (!promptKorisnika) { alert("Unesite podatke za fakturu!"); return; }
        
        dugme.innerText = "⏳ KREIRAM FAKTURU...";
        dugme.disabled = true;

        try {
            const response = await fetch(URL_FUNKCIJE, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    userText: `ZADATAK: Generiši profesionalnu fakturu kao HTML tabelu. 
                    NE TRAŽI dodatne podatke. Ako nešto fali, izmisli.
                    Formatiraj kao čist <table>.
                    Unos korisnika: ${promptKorisnika}` 
                })
            });

            const data = await response.json();
            // Prikaz rezultata
            const container = document.getElementById("faktura-sadrzaj-render");
            container.innerHTML = data.tekst || "Greška: AI nije vratio odgovor.";
            
            document.getElementById("faktura-prikaz").classList.remove("hidden");
            document.getElementById("glavni-kontejner").classList.add("hidden");
        } catch (error) {
            alert("Greška: " + error.message);
        } finally {
            dugme.innerText = "✨ GENERIŠI FAKTURU";
            dugme.disabled = false;
        }
    }
</script>
</body>
</html>
