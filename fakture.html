<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Invoice Generator</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#f4f4f5;
}

/* A4 */
#faktura-prikaz{
    width:210mm;
    min-height:297mm;
    margin:30px auto;
    background:#fff;
    padding:50px;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
    font-family:Arial;
    color:#111;
}

/* HEADER */
#prikaz-naziva-firme{
    font-size:28px;
    font-weight:800;
    text-transform:uppercase;
    margin-bottom:10px;
}

.invoice-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:40px;
    font-size:14px;
    color:#555;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    text-align:left;
    border-bottom:2px solid #000;
    padding:10px;
    font-size:12px;
    text-transform:uppercase;
}

td{
    padding:12px 10px;
    border-bottom:1px solid #eee;
}

/* TOTALS */
.totals{
    margin-top:40px;
    float:right;
    width:300px;
    border-top:2px solid #000;
    padding-top:10px;
}

.totals p{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
}

.totals .total{
    font-size:18px;
    font-weight:bold;
}
</style>

</head>

<body>

<!-- INPUT -->
<div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">

    <h1 class="text-2xl font-bold mb-4">AI Invoice Generator</h1>

    <input id="naziv-firme" class="w-full border p-3 rounded mb-3" placeholder="Company name">

    <textarea id="ai-prompt-tekst" rows="6"
    class="w-full border p-3 rounded"
    placeholder="10 kg nails at 2.5, 3 m wood at 50..."></textarea>

    <button id="dugme-generisi"
        class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
        CREATE INVOICE
    </button>
</div>

<!-- INVOICE -->
<div id="faktura-prikaz" class="hidden">

    <h2 id="prikaz-naziva-firme"></h2>

    <div class="invoice-header">
        <div>
            <strong>Invoice</strong><br>
            Date: <span id="date"></span>
        </div>
        <div>
            AI Invoice Generator
        </div>
    </div>

    <div id="faktura-sadrzaj-render"></div>

    <div class="totals">
        <p><span>Subtotal</span> <span id="subtotal-polje">0.00 €</span></p>
        <p><span>VAT (17%)</span> <span id="vat-polje">0.00 €</span></p>
        <p class="total"><span>Total</span> <span id="ukupno-polje">0.00 €</span></p>
    </div>

</div>

<script>

const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

/* DATE */
window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("date").innerText =
        new Date().toLocaleDateString();
});

/* CLICK */
document.getElementById("dugme-generisi")
.addEventListener("click", generisiFakturu);

async function generisiFakturu() {

    const naziv = document.getElementById("naziv-firme").value;
    const tekst = document.getElementById("ai-prompt-tekst").value;
    const dugme = document.getElementById("dugme-generisi");

    if (!naziv || !tekst) {
        alert("Fill all fields!");
        return;
    }

    dugme.innerText = "Generišem...";
    dugme.disabled = true;

    try {
        const response = await fetch(
        "https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/FAKTURE",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${ANON_KEY}`
            },
            body: JSON.stringify({
                userText: `Firma: ${naziv}. Generate invoice table for: ${tekst}. Columns: No, Description, Qty, Price, Amount.`
            })
        });

        const data = await response.json();
        const html = data.tekst || data.response || data.odgovor;

        document.getElementById("input-dio").classList.add("hidden");
        document.getElementById("faktura-prikaz").classList.remove("hidden");

        document.getElementById("prikaz-naziva-firme").innerText = naziv;
        document.getElementById("faktura-sadrzaj-render").innerHTML = html;

        setTimeout(izracunajTotale, 500);

    } catch (err) {
        alert("Error: " + err.message);
        console.error(err);
    } finally {
        dugme.innerText = "CREATE INVOICE";
        dugme.disabled = false;
    }
}

/* TOTALS */
function izracunajTotale() {

    let rows = document.querySelectorAll("#faktura-sadrzaj-render tbody tr");
    let subtotal = 0;

    rows.forEach(row => {
        let cells = row.querySelectorAll("td");

        if (cells.length >= 5) {
            subtotal += parseFloat(
                cells[4].innerText.replace(",", ".")
            ) || 0;
        }
    });

    let vat = subtotal * 0.17;
    let total = subtotal + vat;

    document.getElementById("subtotal-polje").innerText = subtotal.toFixed(2) + " €";
    document.getElementById("vat-polje").innerText = vat.toFixed(2) + " €";
    document.getElementById("ukupno-polje").innerText = total.toFixed(2) + " €";
}

</script>

</body>
</html>
