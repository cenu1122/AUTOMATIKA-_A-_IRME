<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Faktura Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .faktura-tabela { width: 100%; border-collapse: collapse; margin-top: 25px; }
        .faktura-tabela th { background-color: #1f2937; color: white; border: 1px solid #374151; padding: 12px 10px; text-align: left; font-weight: bold; }
        .faktura-tabela td { border: 1px solid #d1d5db; padding: 12px 10px; color: #111827; }
        .faktura-tabela tr:nth-child(even) { background-color: #f9fafb; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        @media print {
            body { background: white; padding: 0; }
            #input-dio, .akcija-dugmad, #kontrolna-traka { display: none !important; }
            #faktura-prikaz { box-shadow: none; margin: 0; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body class="bg-zinc-100 p-6">
    <div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold mb-4">AI Generator Faktura</h1>
        <p class="mb-4 text-gray-600">Upiši ili izdiktiraj šta si utrošio.</p>
        <textarea id="ai-prompt-tekst" rows="6" class="w-full border border-gray-300 p-4 rounded-xl" placeholder="Primjer: 10 kg eksera po 2.50 KM, 2 m3 daske po 450 KM..."></textarea>
        <button id="mikrofon-dugme" onclick="pokreniMikrofon()" class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold akcija-dugmad">
            🎤 DIKTIRAJ U MIKROFON
        </button>
        <button onclick="generisiFakturu()" id="dugme-generisi" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-lg akcija-dugmad">
            KREIRAJ FAKTURU
        </button>
    </div>

    <div id="kontrolna-traka" class="hidden max-w-4xl mx-auto mb-4 flex justify-between items-center bg-blue-50 p-4 rounded-xl border border-blue-200 shadow-md">
        <span class="text-blue-800 font-semibold">✨ Faktura je uspješno generisana!</span>
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-md transition-all">
            🖨️ PRINTAJ / SPASI U PDF
        </button>
    </div>

    <div id="faktura-prikaz" class="hidden max-w-4xl mx-auto bg-white p-12 shadow-2xl rounded-2xl">
        <div class="flex justify-between border-b-2 border-black pb-6 mb-6">
            <div>
                <h2 class="text-3xl font-bold">MOJA FIRMA D.O.O.</h2>
                <p>Ulica bb, 71000 Sarajevo</p>
                <p>ID: 420000000000</p>
            </div>
            <div class="text-right">
                <h3 class="text-2xl font-bold uppercase mb-1" id="broj-fakture-polje">Faktura br. --/2026</h3>
                <p id="datum-fakture" class="text-gray-700 font-medium"></p>
            </div>
        </div>
        <div id="faktura-sadrzaj-render"></div>
    </div>

    <script>
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";
        
        const danas = new Date();
        document.getElementById("datum-fakture").innerText = "Datum: " + danas.toLocaleDateString("bs-BA");
        const slucajanBroj = String(Math.floor(Math.random() * 100) + 1).padStart(3, '0');
        document.getElementById("broj-fakture-polje").innerText = `Broj fakture: ${slucajanBroj}/2026`;

        function pokreniMikrofon() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Browser ne podržava mikrofon!"); return; }
            const recognition = new SpeechRecognition();
            recognition.lang = "hr-HR";
            recognition.start();
            recognition.onresult = (e) => { document.getElementById("ai-prompt-tekst").value += "\n" + e.results[0][0].transcript; };
        }

        function ocistiBroj(v) { return parseFloat(v.toString().replace(/[^0-9.,]/g, '').replace(',', '.')) || 0; }

        async function generisiFakturu() {
            const tekst = document.getElementById("ai-prompt-tekst").value;
            const dugme = document.getElementById("dugme-generisi");
            if (!tekst.trim()) { alert("Unesi podatke!"); return; }
            dugme.disabled = true;
            dugme.innerText = "Generišem...";

            try {
                const response = await fetch("https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/FAKTURE", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
                    body: JSON.stringify({ userText: `Generiši HTML tabelu (thead, tbody) za: ${tekst}. Kolone: Rbr, Opis, Kol., Cijena, Iznos. Samo HTML kod, nista drugo.` })
                });
                const data = await response.json();
                document.getElementById("faktura-sadrzaj-render").innerHTML = data.tekst;
                document.getElementById("input-dio").classList.add("hidden");
                document.getElementById("kontrolna-traka").classList.remove("hidden");
                document.getElementById("faktura-prikaz").classList.remove("hidden");
            } catch (err) { alert("Greška: " + err.message); } finally { dugme.disabled = false; dugme.innerText = "KREIRAJ FAKTURU"; }
        }
    </script>
</body>
</html>
