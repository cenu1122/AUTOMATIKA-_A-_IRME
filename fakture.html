<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Invoice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #faktura-prikaz { width: 210mm; min-height: 297mm; margin: auto; background: white; padding: 20px; border: 1px solid #ccc; }
        #faktura-sadrzaj-render table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        #faktura-sadrzaj-render th { background: #e5e5e5; padding: 10px; border: 1px solid #ccc; text-align: left; }
        #faktura-sadrzaj-render td { padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-zinc-100 p-6">

    <div id="info-firma" class="fixed top-4 left-4 bg-white p-4 rounded-xl shadow-md border border-zinc-200 z-50">
        <div id="prikaz-info" class="text-blue-600 font-bold">Učitavanje...</div>
    </div>

    <div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl mt-16">
        <input type="text" id="naziv-firme" class="w-full border p-4 rounded-xl mb-4" placeholder="Upiši naziv firme...">
        <textarea id="ai-prompt-tekst" rows="6" class="w-full border p-4 rounded-xl" placeholder="Upiši stavke fakture..."></textarea>
        <button id="dugme-generisi" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold">CREATE INVOICE</button>
    </div>

    <div id="faktura-prikaz" class="hidden max-w-4xl mx-auto bg-white shadow-xl mt-6">
        <h2 id="prikaz-naziva-firme" class="text-3xl font-bold mb-4 border-b pb-4"></h2>
        <div id="faktura-sadrzaj-render"></div>
    </div>

    <script>
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

        // 1. Inicijalizacija pri učitavanju
        window.addEventListener('DOMContentLoaded', () => {
            const naziv = localStorage.getItem('nazivFirme') || "Unknown Company";
            const id = localStorage.getItem('prijavljenaFirma') || "Nema ID";
            
            document.getElementById("naziv-firme").value = naziv;
            document.getElementById("prikaz-info").innerText = `${naziv} (${id})`;

            // 2. Event Listener ovdje sigurno radi jer je HTML učitan
            document.getElementById("dugme-generisi").addEventListener("click", async () => {
                const nazivFirme = document.getElementById("naziv-firme").value;
                const tekst = document.getElementById("ai-prompt-tekst").value;
                const dugme = document.getElementById("dugme-generisi");
                
                if (!tekst.trim()) { alert("Upiši stavke!"); return; }
                
                dugme.disabled = true;
                dugme.innerText = "Generišem...";

                try {
                    const response = await fetch("https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/FAKTURE", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
                        body: JSON.stringify({ userText: `Firma: ${nazivFirme}. Generiši tabelu za: ${tekst}.` })
                    });

                    const data = await response.json();
                    
                    document.getElementById("prikaz-naziva-firme").innerText = nazivFirme;
                    document.getElementById("faktura-sadrzaj-render").innerHTML = data.tekst || "Greška pri kreiranju tabele.";
                    
                    document.getElementById("input-dio").classList.add("hidden");
                    document.getElementById("faktura-prikaz").classList.remove("hidden");
                } catch (err) {
                    alert("Greška: " + err.message);
                } finally {
                    dugme.disabled = false;
                    dugme.innerText = "CREATE INVOICE";
                }
            });
        });
    </script>
</body>
</html>
