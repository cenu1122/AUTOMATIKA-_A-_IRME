<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Invoice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; }
    #faktura-prikaz{
    width:210mm;
    min-height:297mm;
    margin:auto;
    background:white;
}
#faktura-sadrzaj-render table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

#faktura-sadrzaj-render th{
    background:#e5e5e5;
    color:#000;
    padding:10px;
    border:1px solid #cfcfcf;
    font-size:13px;
}

#faktura-sadrzaj-render td{
    padding:10px;
    border:1px solid #dcdcdc;
    font-size:13px;
}
    </style>
</head>
<body class="bg-zinc-100 p-6">
    <div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold mb-4">AI Invoice Generator</h1>
        <textarea id="ai-prompt-tekst" rows="6" class="w-full border border-gray-300 p-4 rounded-xl" placeholder="Enter items (e.g., 10 kg nails at 2.50, 2 m3 wood at 450)..."></textarea>
        <button id="mikrofon-dugme" onclick="pokreniMikrofon()" class="mt-4 w-full bg-red-600 text-white py-3 rounded-xl font-bold akcija-dugmad">🎤 VOICE INPUT</button>
        <button onclick="generisiFakturu()" id="dugme-generisi" class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg akcija-dugmad">CREATE INVOICE</button>
    </div>

    <div id="kontrolna-traka" class="hidden max-w-4xl mx-auto mb-4 flex justify-between items-center bg-blue-50 p-4 rounded-xl border border-blue-200">
        <span class="text-blue-800 font-semibold">✨ Invoice generated!</span>
        <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">PRINT / PDF</button>
    </div>

       <div id="faktura-prikaz" class="hidden max-w-4xl mx-auto bg-white shadow-xl">

    <!-- Header -->
    <div class="bg-gray-700 text-white flex justify-between items-center px-8 py-6">
        <h1 class="text-5xl font-light tracking-wide">
            INVOICE
        </h1>

        <div class="text-right text-sm">
            <div class="font-bold text-lg">MY COMPANY D.O.O.</div>
            <div>Ulica bb</div>
            <div>71000 Sarajevo</div>
            <div>Bosnia & Herzegovina</div>
            <div>info@firma.com</div>
        </div>
    </div>

    <!-- Invoice info -->
    <div class="px-8 py-8 flex justify-between">

        <div>
            <p class="font-bold mb-2">Client</p>
            <p>Client Company Name</p>
            <p>Client Address</p>
            <p>City</p>
            <p>Country</p>
        </div>

        <div class="text-right">
            <p><strong id="broj-fakture-polje"></strong></p>
            <p id="datum-fakture"></p>
            <p>Due Date: 15 days</p>
        </div>

    </div>

    <!-- Table -->
    <div class="px-8">
        <div id="faktura-sadrzaj-render"></div>
    </div>

    <!-- Totals -->
    <div class="px-8 py-8 flex justify-end">

        <table class="w-72 text-sm">
            <tr>
                <td class="py-1">Subtotal</td>
                <td class="text-right py-1" id="subtotal-polje">
                    0.00 €
                </td>
            </tr>

            <tr>
                <td class="py-1">Tax</td>
                <td class="text-right py-1">
                    0%
                </td>
            </tr>

            <tr class="border-t">
                <td class="font-bold py-2">
                    Total
                </td>

                <td class="font-bold text-right py-2" id="ukupno-polje">
                    0.00 €
                </td>
            </tr>
        </table>
        
</div>
    <script>
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";
        
        const slucajanBroj = String(Math.floor(Math.random() * 100) + 1).padStart(3, '0');
        const danas = new Date();
        document.getElementById("datum-fakture").innerText =
    danas.toLocaleDateString("en-GB");

document.getElementById("broj-fakture-polje").innerText =
    `Invoice #${slucajanBroj}/2026`;

        function pokreniMikrofon() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = "hr-HR";
            recognition.start();
            recognition.onresult = (e) => { document.getElementById("ai-prompt-tekst").value += "\n" + e.results[0][0].transcript; };
        }

        async function generisiFakturu() {
            const tekst = document.getElementById("ai-prompt-tekst").value;
            const dugme = document.getElementById("dugme-generisi");
            if (!tekst.trim()) { alert("Enter data!"); return; }
            dugme.disabled = true;
            dugme.innerText = "Generating...";

            try {
                const response = await fetch("https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/FAKTURE", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
                    body: JSON.stringify({ userText: `Generate an HTML table (thead, tbody) for: ${tekst}. Columns: No., Description, Qty, Price, Amount. Use English language. Only return HTML code.` })
                });
                const data = await response.json();
                document.getElementById("faktura-sadrzaj-render").innerHTML = data.tekst;
                document.getElementById("input-dio").classList.add("hidden");
                document.getElementById("kontrolna-traka").classList.remove("hidden");
                document.getElementById("faktura-prikaz").classList.remove("hidden");
            } catch (err) { alert("Error: " + err.message); } finally { dugme.disabled = false; dugme.innerText = "CREATE INVOICE"; }
        }
        </div>
</div>
    </script>
</body>
</html>
