<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Invoice Generator</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
    /* A4 papir - bijela pozadina, sjenka */
    #faktura-prikaz { 
        width: 210mm; 
        min-height: 297mm; 
        margin: 40px auto; 
        background: white; 
        padding: 60px; 
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        font-family: 'Helvetica', 'Arial', sans-serif;
        color: #333;
    }

    /* Zaglavlje fakture */
    #prikaz-naziva-firme {
        font-size: 3rem;
        font-weight: bold;
        color: #000;
        margin-bottom: 40px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    /* Tabela - "Clean" stil */
    #faktura-sadrzaj-render table { 
        width: 100%; 
        border-collapse: collapse; 
        margin: 40px 0; 
    }
    
    #faktura-sadrzaj-render th { 
        border-bottom: 2px solid #000;
        padding: 15px 10px; 
        text-align: left;
        font-size: 0.9rem;
        text-transform: uppercase;
    }
    
    #faktura-sadrzaj-render td { 
        padding: 15px 10px; 
        border-bottom: 1px solid #eee; 
        font-size: 1rem;
    }

    /* Totali - klasičan prikaz desno */
    .mt-6.text-right {
        margin-top: 50px;
        font-size: 1.1rem;
        line-height: 2;
        border-top: 2px solid #000;
        display: inline-block;
        float: right;
        min-width: 250px;
    }
</style>

</head>

<body class="bg-zinc-100 p-6">

<div id="input-dio" class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">

    <h1 class="text-2xl font-bold mb-4">AI Invoice Generator</h1>

    <!-- firma iz localStorage -->
    <input id="naziv-firme" class="w-full border p-3 rounded mb-3" placeholder="Company name">

    <textarea id="ai-prompt-tekst" rows="6"
    class="w-full border p-3 rounded"
    placeholder="10 kg nails at 2.5, 3 m wood at 50..."></textarea>

    <button id="dugme-generisi"
        class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
        CREATE INVOICE
    </button>
</div>

<div id="faktura-prikaz" class="hidden">

    <h2 id="prikaz-naziva-firme" class="text-3xl font-bold mb-4"></h2>

    <div id="faktura-sadrzaj-render"></div>

    <div class="mt-6 text-right">
        <p>Subtotal: <span id="subtotal-polje">0.00 €</span></p>
        <p>VAT (17%): <span id="vat-polje">0.00 €</span></p>
        <p class="font-bold text-xl">
            Total: <span id="ukupno-polje">0.00 €</span>
        </p>
    </div>

</div>

<script>

const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2JwZ21zb3J1bmZiZHNrYnduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMTM0ODIsImV4cCI6MjA5Mzc4OTQ4Mn0.Wh5yo6Z2kx9QaERzTeBuRModEXw3BJYjTzhBjTq6ncs";

/* =========================
   1. LOAD FIRMA IZ HEADERA
========================= */
window.addEventListener("DOMContentLoaded", () => {

    const firma =
        localStorage.getItem("nazivFirme") ||
        localStorage.getItem("prijavljenaFirma") ||
        "Unknown Company";

    document.getElementById("naziv-firme").value = firma;
    document.getElementById("prikaz-naziva-firme").innerText = firma;
});

/* =========================
   2. BUTTON CLICK
========================= */
document.getElementById("dugme-generisi")
.addEventListener("click", generisiFakturu);

async function generisiFakturu() {
    const naziv = document.getElementById("naziv-firme").value;
    const tekst = document.getElementById("ai-prompt-tekst").value;
    const dugme = document.getElementById("dugme-generisi");

    if (!naziv || !tekst) {
        alert("Fill all fields!");
        return;
    }

    dugme.innerText = "Generišem...";
    dugme.disabled = true;

    try {
        const response = await fetch("https://mpgbpgmsorunfbdskbwn.supabase.co/functions/v1/FAKTURE", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${ANON_KEY}`
            },
            body: JSON.stringify({ 
                userText: `Firma: ${naziv}. Generate invoice table for: ${tekst}. Columns: No, Description, Qty, Price, Amount.` 
            })
        });

        if (!response.ok) {
            throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();
        const html = data.tekst || data.response || data.odgovor;

        if (!html) throw new Error("AI nije vratio tabelu.");

        document.getElementById("prikaz-naziva-firme").innerText = naziv;
        document.getElementById("faktura-sadrzaj-render").innerHTML = html;

        document.getElementById("input-dio").classList.add("hidden");
        document.getElementById("faktura-prikaz").classList.remove("hidden");

        setTimeout(izracunajTotale, 500); // Malo duži timeout da se tabela stigne renderovati
    } catch (err) {
        alert("Greška: " + err.message);
        console.error(err);
    } finally {
        dugme.innerText = "CREATE INVOICE";
        dugme.disabled = false;
    }
}
/* =========================
   3. CALCULATIONS
========================= */
function izracunajTotale() {

    let rows = document.querySelectorAll("#faktura-sadrzaj-render tbody tr");

    let subtotal = 0;

    rows.forEach(row => {

        let cells = row.querySelectorAll("td");

        if (cells.length >= 5) {
            let iznos = parseFloat(
                cells[4].innerText.replace(",", ".")
            ) || 0;

            subtotal += iznos;
        }
    });

    let vat = subtotal * 0.17;
    let total = subtotal + vat;

    document.getElementById("subtotal-polje").innerText =
        subtotal.toFixed(2) + " €";

    document.getElementById("vat-polje").innerText =
        vat.toFixed(2) + " €";

    document.getElementById("ukupno-polje").innerText =
        total.toFixed(2) + " €";
}

</script>

</body>
</html>
