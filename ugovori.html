<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Pravi AI Generator Ugovora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div id="glavni-kontejner" class="max-w-4xl mx-auto">
        <div class="bg-zinc-900 border border-blue-600/30 p-6 rounded-2xl shadow-2xl">
            <h2 class="text-blue-500 font-black text-xl uppercase italic mb-2">🤖 Smart AI Generator Ugovora</h2>
            <div class="space-y-4">
                <textarea id="ai-prompt-tekst" rows="6" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white text-sm" placeholder="ZADATAK: Generiši ugovor o djelu između..."></textarea>
                <button onclick="generisiUgovor()" id="dugme-generisi" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl uppercase italic">
                    ✨ GENERIŠI UGOVOR
                </button>
            </div>
        </div>
    </div>

    <div id="ugovor-prikaz" class="hidden bg-white text-black p-12 mx-auto max-w-4xl rounded-xl my-6">
        <div id="ugovor-sadrzaj-render" class="whitespace-pre-wrap text-justify text-sm leading-relaxed"></div>
        <button onclick="zatvoriUgovor()" class="mt-8 bg-zinc-600 text-white py-2 px-4 rounded-lg">⬅️ Nazad u generator</button>
    </div>

    <script>
        async function generisiUgovor() {
            const promptKorisnika = document.getElementById("ai-prompt-tekst").value.trim();
            const dugme = document.getElementById("dugme-generisi");
            const URL_FUNKCIJE = "https://lvvidixbdtdjfwxxxqzr.supabase.co/functions/v1/ai-asistent";

            if (!promptKorisnika) { alert("Unesite tekst!"); return; }
            
            dugme.innerText = "⏳ PIŠEM UGOVOR...";
            dugme.disabled = true;

            try {
                const response = await fetch(URL_FUNKCIJE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userText: promptKorisnika })
                });

                const data = await response.json();
                const odgovor = data.tekst || "Greška: Nema odgovora.";

                // PRIKAZ LOGIKE:
                const container = document.getElementById("ugovor-sadrzaj-render");
                
                if (odgovor.includes("FALI:")) {
                    container.innerHTML = `<div class="bg-red-100 p-6 rounded-lg text-red-900 border border-red-300">
                        <h3 class="font-bold text-lg mb-2">⚠️ Nedostaju podaci:</h3>
                        <pre class="font-sans whitespace-pre-wrap">${odgovor}</pre>
                    </div>`;
                } else {
                    container.innerText = odgovor;
                }

                document.getElementById("glavni-kontejner").classList.add("hidden");
                document.getElementById("ugovor-prikaz").classList.remove("hidden");
                document.body.classList.replace("bg-black", "bg-zinc-100");

            } catch (error) {
                alert("Greška pri povezivanju: " + error.message);
            } finally {
                dugme.innerText = "✨ GENERIŠI UGOVOR";
                dugme.disabled = false;
            }
        }

        function zatvoriUgovor() {
            document.getElementById("ugovor-prikaz").classList.add("hidden");
            document.getElementById("glavni-kontejner").classList.remove("hidden");
            document.body.classList.replace("bg-zinc-100", "bg-black");
        }
    </script>
</body>
</html>
