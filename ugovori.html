<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Generator Ugovora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div id="glavni-kontejner" class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer">
                    <option value="ugovori.html" selected>🤖 AI Generator Ugovora</option>
                    <option value="izvjestaj.html">📋 Pregled Izvještaja</option>
                </select>
                <button onclick="odjaviSe()" class="bg-zinc-800 text-zinc-400 font-bold py-2.5 px-4 rounded-xl text-xs uppercase hover:text-white transition">Odjavi se</button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-blue-600/30 p-6 rounded-2xl shadow-2xl">
            <h2 class="text-blue-500 font-black text-xl uppercase italic mb-2">🤖 Smart AI Generator Ugovora</h2>
            <p class="text-zinc-400 text-xs mb-6">Izaberite željeni primjer iz padajuće liste. Sistem će automatski povući sve podatke u puni pravni šablon.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Izaberi tip i primjer ugovora:</label>
                    <select id="izbor-primjera-ugovora" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-blue-500 outline-none text-white text-sm font-bold cursor-pointer">
                        <option value="ugovor-o-djelu">Ugovor o djelu (Između Bosna Niless i Halilović - Automatizacija)</option>
                        <option value="poslovno-tehnicka">Ugovor o poslovno-tehničkoj saradnji (NH AI-Automation & Klijent)</option>
                        <option value="nda-povjerljivost">Ugovor o povjerljivosti podataka / NDA (Zaštita koda i baza)</option>
                        <option value="odrzavanje-softvera">Ugovor o tehničkom održavanju i monitoringu AI aplikacija</option>
                    </select>
                </div>

                <button onclick="pokreniGenerisanjeUgovora()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 tracking-wide shadow-lg shadow-blue-600/20">
                    📄 GENERIŠI I PRIKAŽI UGOVOR
                </button>
            </div>
        </div>
    </div>

    <div id="ugovor-prikaz" class="hidden bg-white text-black p-12 font-serif mx-auto max-w-4xl shadow-2xl rounded-xl my-6">
        <div class="no-print mb-8 flex gap-3">
            <button onclick="window.print()" class="bg-blue-600 text-white font-bold py-2.5 px-5 rounded-lg font-sans text-sm hover:bg-blue-700 transition">🖨️ Isprintaj / Spasi kao PDF</button>
            <button onclick="zatvoriUgovor()" class="bg-zinc-600 text-white font-bold py-2.5 px-5 rounded-lg font-sans text-sm hover:bg-zinc-700 transition">⬅️ Nazad u generator</button>
        </div>
        
        <style>
            @media print { .no-print { display: none !important; } body { background: white; color: black; padding: 0; } }
        </style>

        <div id="ugovor-sadrzaj-render"></div>
    </div>

    <script>
        // Povlačenje firme iz prijave
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Klijent d.o.o.";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        function pokreniGenerisanjeUgovora() {
            // Čitanje vrijednosti iz padajuće liste (ćelije)
            const izabraniTip = document.getElementById("izbor-primjera-ugovora").value;
            const danasnjiDatum = new Date().toLocaleDateString('hr-BA');
            let konacniTekst = "";

            if(izabraniTip === "ugovor-o-djelu") {
                konacniTekst = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O DJELU</h1>
                        <p class="mt-1 text-sm">Zaključen u Sarajevu, dana <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>UGOVORNE STRANE:</strong><br>
                        1. <strong>Bosna Niless d.o.o.</strong>, koga zastupa direktor (u daljem tekstu: <strong>Naručilac</strong>) i<br>
                        2. <strong>Halilović Emir</strong>, nastanjen u Sarajevu (u daljem tekstu: <strong>Izvršilac</strong>).</p>
                        
                        <p><strong>Član 1. (Predmet ugovora)</strong><br>
                        Naručilac angažuje Izvršioca da obavi specifične poslove modernizacije i automatizacije. Izvršilac se obavezuje da će za potrebe Naručioca samostalno i profesionalno izvršiti sledeći posao: <em>Izrada i montaža elektro-upravljačkih ormara, programiranje PLC kontrolera, te integracija pametnih senzora na reduktorima i pogonskim jedinicama unutar proizvodnog pogona.</em></p>
                        
                        <p><strong>Član 2. (Rokovi i predaja rada)</strong><br>
                        Izvršilac je dužan započeti s radom odmah po potpisivanju ovog ugovora. Krajnji rok za završetak svih radova, testiranje sistema u realnim uslovima i predaju gotovog djela Naručiocu iznosi 30 kalendarskih dana od dana zaključivanja ugovora.</p>
                        
                        <p><strong>Član 3. (Cijena i način plaćanja)</strong><br>
                        Za kompletno i kvalitetno izvršenje posla iz Člana 1., Naručilac se obavezuje da će Izvršiocu isplatiti fiksnu neto naknadu u iznosu od <strong>2.500,00 KM</strong> (slovima: dvijehiljade petsto konvertibilnih maraka). Isplata će se izvršiti preko žiro-računa Izvršioca u roku od 7 dana nakon potpisivanja zapisnika o primopredaji.</p>
                        
                        <p><strong>Član 4. (Tajnost podataka)</strong><br>
                        Izvršilac se obavezuje da će sve poslovne i tehničke podatke do kojih dođe tokom realizacije ovog posla čuvati kao strogu poslovnu tajnu.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">Bosna Niless d.o.o.<br>(Naručilac)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">Halilović Emir<br>(Izvršilac)</div>
                        </div>
                    </div>`;
            } 
            else if(izabraniTip === "poslovno-tehnicka") {
                konacniTekst = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O POSLOVNO-TEHNIČKOJ SARADNJI</h1>
                        <p class="mt-1 text-sm">Zaključen dana <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>UGOVORNE STRANE:</strong><br>
                        1. <strong>NH AI-Automation</strong>, kao lider u razvoju pametnih poslovnih rješenja (u daljem tekstu: <strong>Izvršilac</strong>) i<br>
                        2. <strong>${firmaId}</strong>, kao korisnik naprednih sistema (u daljem tekstu: <strong>Naručilac</strong>).</p>
                        
                        <p><strong>Član 1. (Predmet saradnje)</strong><br>
                        Predmet ovog ugovora je dugoročna poslovno-tehnička saradnja u oblasti implementacije vještačke inteligencije (AI), razvoja prilagođenih veb aplikacija, te integracije CRM i ERP softverskih rješenja za optimizaciju poslovanja Naručioca.</p>
                        
                        <p><strong>Član 2. (Tehnički nivo usluge - SLA)</strong><br>
                        Izvršilac se obavezuje da će obezbijediti stabilnost deployovanih cloud rješenja na platformama Supabase i Netlify, sa garantovanim stepenom dostupnosti sistema od 99.9% na mjesečnom nivou.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">NH AI-Automation<br>(Izvršilac)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${firmaId}<br>(Naručilac)</div>
                        </div>
                    </div>`;
            }
            else if(izabraniTip === "nda-povjerljivost") {
                konacniTekst = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O POVJERLJIVOSTI PODATAKA (NDA)</h1>
                        <p class="mt-1 text-sm">Zaključen u Sarajevu, dana <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>UGOVORNE STRANE:</strong> NH AI-Automation i klijent <strong>${firmaId}</strong> (u daljem tekstu: Ugovorne strane).</p>
                        
                        <p><strong>Član 1. (Definicija povjerljivih informacija)</strong><br>
                        Povjerljivim informacijama smatraju se svi podaci vezani za izvorni kod (source code), strukturu baza podataka, API ključeve, poslovne logove, kao i lične podatke klijenata i zaposlenih do kojih strane dođu tokom saradnje.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">NH AI-Automation<br>(Predavalac)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${firmaId}<br>(Primalac)</div>
                        </div>
                    </div>`;
            }
            else if(izabraniTip === "odrzavanje-softvera") {
                konacniTekst = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O TEHNIČKOM ODRŽAVANJU AI SISTEMA</h1>
                        <p class="mt-1 text-sm">Zaključen dana <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>KORISNIK USLUGE:</strong> <strong>${firmaId}</strong><br>
                        <strong>PRUŽALAC USLUGE:</strong> <strong>NH AI-Automation</strong></p>
                        
                        <p><strong>Član 1. (Predmet održavanja)</strong><br>
                        Predmet ovog ugovora je redovno tehničko održavanje, monitoring i ažuriranje glasovnih AI asistenata, automatizovanih obrazaca izvještavanja, te redovna optimizacija baza podataka.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">NH AI-Automation<br>(Pružalac)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${firmaId}<br>(Korisnik)</div>
                        </div>
                    </div>`;
            }

            // Upisivanje teksta i prebacivanje na bijeli ekran za print
            document.getElementById("ugovor-sadrzaj-render").innerHTML = konacniTekst;
            document.getElementById("glavni-kontejner").classList.add("hidden");
            document.getElementById("ugovor-prikaz").classList.remove("hidden");
            document.body.classList.replace("bg-black", "bg-zinc-100");
        }

        function zatvoriUgovor() {
            document.getElementById("ugovor-prikaz").classList.add("hidden");
            document.getElementById("glavni-kontejner").classList.remove("hidden");
            document.body.classList.replace("bg-zinc-100", "bg-black");
        }

        function odjaviSe() {
            localStorage.removeItem("prijavljenaFirma");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
