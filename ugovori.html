<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - Fleksibilni Generator Ugovora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div id="glavni-kontejner" class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-blue-400 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer">
                    <option value="ugovori.html" selected>🤖 AI Generator Ugovora</option>
                    <option value="izvjestaj.html">📋 Pregled Izvještaja</option>
                </select>
                <button onclick="odjaviSe()" class="bg-zinc-800 text-zinc-400 font-bold py-2.5 px-4 rounded-xl text-xs uppercase hover:text-white">Odjavi se</button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-blue-600/30 p-6 rounded-2xl shadow-2xl">
            <h2 class="text-blue-500 font-black text-xl uppercase italic mb-2">🤖 Fleksibilni Smart Generator Ugovora</h2>
            <p class="text-zinc-400 text-xs mb-6">Izaberite vrstu ugovora, a zatim sami unesite učesnike i specifične detalje posla.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">1. Izaberi vrstu ugovora (Šablon):</label>
                    <select id="tip-ugovora" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-blue-500 outline-none text-white text-sm font-bold cursor-pointer">
                        <option value="ugovor-o-djelu">Ugovor o djelu</option>
                        <option value="poslovno-tehnicka">Ugovor o poslovno-tehničkoj saradnji</option>
                        <option value="nda-povjerljivost">Ugovor o povjerljivosti podataka (NDA)</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">2. Naručilac / Prva ugovorna strana:</label>
                        <input id="unos-narucilac" type="text" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white text-sm focus:border-blue-500 outline-none" placeholder="npr. Bosna Niless d.o.o.">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">3. Izvršilac / Druga ugovorna strana:</label>
                        <input id="unos-izvrsilac" type="text" class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white text-sm focus:border-blue-500 outline-none" placeholder="npr. Halilović Emir">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">4. Detalji (Opis posla, cijena, rokovi, lokacija sklapanja):</label>
                    <textarea id="unos-detalji" rows="5" class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-blue-500 outline-none text-white text-sm" placeholder="Upiši detalje o čemu se pravi ugovor, npr: Izrada elektro-upravljačkih ormara i PLC programiranje. Cijena je 2500 KM, a rok 30 dana. Sklapa se u Sarajevu."></textarea>
                </div>

                <button onclick="generisiFleksibilniUgovor()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 tracking-wide shadow-lg shadow-blue-600/20">
                    📄 GENERIŠI I PRIKAŽI UGOVOR
                </button>
            </div>
        </div>
    </div>

    <div id="ugovor-prikaz" class="hidden bg-white text-black p-12 font-serif mx-auto max-w-4xl shadow-2xl rounded-xl my-6">
        <div class="no-print mb-8 flex gap-3">
            <button onclick="window.print()" class="bg-blue-600 text-white font-bold py-2.5 px-5 rounded-lg font-sans text-sm hover:bg-blue-700 transition">🖨️ Isprintaj / Spasi kao PDF</button>
            <button onclick="zatvoriUgovor()" class="bg-zinc-600 text-white font-bold py-2.5 px-5 rounded-lg font-sans text-sm hover:bg-zinc-700 transition">⬅️ Nazad u izmjene</button>
        </div>
        
        <style>
            @media print { .no-print { display: none !important; } body { background: white; color: black; padding: 0; } }
        </style>

        <div id="ugovor-sadrzaj-render"></div>
    </div>

    <script>
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Klijent d.o.o.";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        function generisiFleksibilniUgovor() {
            // Kupljenje unesenih (promjenjivih) podataka iz ćelija
            const tipUgovora = document.getElementById("tip-ugovora").value;
            const narucilac = document.getElementById("unos-narucilac").value || "Naručilac (Nije unesen)";
            const izvrsilac = document.getElementById("unos-izvrsilac").value || "Izvršilac (Nije unesen)";
            const detalji = document.getElementById("unos-detalji").value || "Ugovorne strane će detalje definisati naknadno.";
            const danasnjiDatum = new Date().toLocaleDateString('hr-BA');
            
            let tekstUgovora = "";

            if(tipUgovora === "ugovor-o-djelu") {
                tekstUgovora = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O DJELU</h1>
                        <p class="mt-1 text-sm">Zaključen na dan <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>UGOVORNE STRANE:</strong><br>
                        1. <strong>${narucilac}</strong> (u daljem tekstu: <strong>Naručilac</strong>) s jedne strane, i<br>
                        2. <strong>${izvrsilac}</strong> (u daljem tekstu: <strong>Izvršilac</strong>) s druge strane.</p>
                        
                        <p><strong>Član 1. (Predmet ugovora)</strong><br>
                        Naručilac angažuje Izvršioca, a Izvršilac se obavezuje da će za potrebe Naručioca samostalno, kvalitetno i stručno obaviti poslove prema specifikaciji:<br>
                        <span class="block bg-gray-50 border border-zinc-200 p-3 rounded italic mt-2">${detalji}</span></p>
                        
                        <p><strong>Član 2. (Rokovi izvršenja)</strong><br>
                        Izvršilac je dužan započeti s radom odmah po potpisivanju ovog ugovora, a sve preuzete obaveze iz Člana 1. izvršiti u dogovorenom roku i predati djelo na tehnički pregled Naručiocu.</p>
                        
                        <p><strong>Član 3. (Finansijska naknada i isplata)</strong><br>
                        Naručilac se obavezuje da će Izvršiocu za uspješno obavljeni rad isplatiti ugovorenu naknadu definisanu u specifikaciji. Isplata će se izvršiti nakon završetka posla i potvrde o ispravnosti od strane Naručioca.</p>
                        
                        <p><strong>Član 4. (Tajnost i privatnost)</strong><br>
                        Ugovorne strane se obavezuju da će sve tehničke, softverske ili poslovne informacije do kojih dođu tokom rada čuvati kao poslovnu tajnu.</p>
                        
                        <p><strong>Član 5. (Završne odredbe)</strong><br>
                        Ugovor stupa na snagu danom potpisivanja. Sačinjen je u 2 (dva) istovjetna primjerka, od kojih svaka ugovorna strana zadržava po jedan.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${narucilac}<br>(Naručilac)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${izvrsilac}<br>(Izvršilac)</div>
                        </div>
                    </div>`;
            } 
            else if(tipUgovora === "poslovno-tehnicka") {
                tekstUgovora = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O POSLOVNO-TEHNIČKOJ SARADNJI</h1>
                        <p class="mt-1 text-sm">Zaključen na dan <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>UGOVORNE STRANE:</strong><br>
                        1. <strong>${narucilac}</strong> (u daljem tekstu: <strong>Partner 1</strong>) i<br>
                        2. <strong>${izvrsilac}</strong> (u daljem tekstu: <strong>Partner 2</strong>).</p>
                        
                        <p><strong>Član 1. (Predmet saradnje)</strong><br>
                        Predmet ovog ugovora je dugoročna poslovno-tehnička saradnja u cilju unaprjeđenja poslovanja, razvoja novih projekata i tehničke integracije sistema, a u skladu sa sljedećim pojedinostima:<br>
                        <span class="block bg-gray-50 border border-zinc-200 p-3 rounded italic mt-2">${detalji}</span></p>
                        
                        <p><strong>Član 2. (Prava i obaveze)</strong><br>
                        Ugovorne strane će zajednički djelovati na tržištu, obezbjeđivati tehničku podršku jedna drugoj i dijeliti resurse potrebne za nesmetan rad deployovanih servisa.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${narucilac}<br>(Partner 1)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${izvrsilac}<br>(Partner 2)</div>
                        </div>
                    </div>`;
            }
            else if(tipUgovora === "nda-povjerljivost") {
                tekstUgovora = `
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-wide">UGOVOR O POVJERLJIVOSTI PODATAKA (NDA)</h1>
                        <p class="mt-1 text-sm">Zaključen na dan <strong>${danasnjiDatum}</strong>. godine.</p>
                    </div>
                    <div class="text-justify space-y-5 text-sm leading-relaxed">
                        <p><strong>UGOVORNE STRANE:</strong><br>
                        1. <strong>${narucilac}</strong> (kao vlasnik podataka) i<br>
                        2. <strong>${izvrsilac}</strong> (kao primalac podataka).</p>
                        
                        <p><strong>Član 1. (Predmet i svrha zaštite)</strong><br>
                        Ovaj ugovor se zaključuje u svrhu zaštite svih povjerljivih informacija, izvornog koda, API ključeva i baza podataka koji se razmjenjuju u sklopu projekta:<br>
                        <span class="block bg-gray-50 border border-zinc-200 p-3 rounded italic mt-2">${detalji}</span></p>
                        
                        <p><strong>Član 2. (Obaveza čuvanja tajne)</strong><br>
                        Primalac podataka se obavezuje da primljene informacije neće prenositi trećim licima bez pismenog odobrenja vlasnika podataka.</p>
                        
                        <div class="pt-20 flex justify-between">
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${narucilac}<br>(Vlasnik podataka)</div>
                            <div class="w-56 border-t border-black text-center pt-2 text-xs font-bold">${izvrsilac}<br>(Primalac podataka)</div>
                        </div>
                    </div>`;
            }

            // Prikaz gotovog ugovora na bijeloj pozadini
            document.getElementById("ugovor-sadrzaj-render").innerHTML = tekstUgovora;
            document.getElementById("glavni-kontejner").classList.add("hidden");
            document.getElementById("ugovor-prikaz").classList.remove("hidden");
            document.body.classList.replace("bg-black", "bg-zinc-100");
        }

        function zatvoriUgovor() {
            document.getElementById("ugovor-prikaz").classList.add("hidden");
            document.getElementById("glavni-kontejner").classList.remove("hidden");
            document.body.classList.replace("bg-zinc-100", "bg-black");
        }

        function odjaviSe() {
            localStorage.removeItem("prijavljenaFirma");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
