<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NH AI - CV Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 font-sans">

    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-zinc-950 border border-zinc-800 p-4 rounded-2xl mb-6 gap-4">
            <div class="text-center md:text-left">
                <span class="text-[10px] uppercase text-zinc-500 font-bold block">Prijavljeni klijent:</span>
                <h2 id="firma-naziv-prikaz" class="text-purple-500 font-black text-xl uppercase italic">Učitavanje...</h2>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-center">
                <select onchange="location = this.value;" class="bg-zinc-900 border border-zinc-800 text-white text-xs font-bold p-2.5 rounded-xl outline-none cursor-pointer focus:border-purple-500">
                    <option value="izvjestaj.html">📋 Pregled Izvještaja</option>
                    <option value="ugovori.html">🤖 AI Generator Ugovora</option>
                    <option value="cv-generator.html" selected>📄 AI CV / Biografija Generator</option>
                    <option value="email-generator.html">✉️ AI Email / Pismo Generator</option>
                </select>

                <button onclick="pokreniAlarm()" class="bg-red-600 hover:bg-red-700 text-white font-black py-2.5 px-4 rounded-xl text-xs uppercase italic transition shadow-lg shadow-red-600/20">
                    🚨 Hitan Alarm
                </button>

                <button onclick="odjaviSe()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-400 font-bold py-2.5 px-3 rounded-xl text-xs uppercase transition">
                    Odjava
                </button>
            </div>
        </div>

        <div class="bg-zinc-900 border border-purple-600/30 p-6 rounded-2xl mb-12 shadow-2xl">
            <h2 class="text-purple-500 font-black text-xl uppercase italic mb-4">📄 NH AI — Profesionalni CV Generator</h2>
            <form id="cv-forma" class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Ime, Prezime i Zanimanje:</label>
                    <input type="text" id="ime-zanimanje" required placeholder="npr. Marko Marković - Elektrotehničar automatike" 
                           class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-purple-500 outline-none transition text-white">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-zinc-500 font-bold mb-1">Radno iskustvo, vještine i obrazovanje (Sirove informacije):</label>
                    <textarea id="iskustvo" rows="5" required placeholder="Samo nabacaj: 5 godina rada u servisu, poznavanje PLC-ova, završio srednju tehničku, vozačka B kategorije..." 
                              class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-purple-500 outline-none transition text-white"></textarea>
                </div>
                <button type="submit" id="btn-slanje" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-xl uppercase italic transition duration-300 shadow-lg shadow-purple-600/20">
                    ⚡ GENERIŠI STRUKTURIRANI CV
                </button>
            </form>
        </div>

        <hr class="border-zinc-800 mb-12">

        <h1 class="text-purple-500 font-black text-3xl italic mb-8 uppercase tracking-tighter">VAŠE KREIRANE BIOGRAFIJE</h1>
        <div id="svi-cv" class="space-y-6">
            <p class="text-zinc-500 animate-pulse uppercase text-xs text-center">Učitavam biografije...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/rjhvmuxlef6zk';
        const firmaId = localStorage.getItem("prijavljenaFirma") || "Nepoznata Firma";
        document.getElementById("firma-naziv-prikaz").innerText = firmaId;

        document.getElementById('cv-forma').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-slanje');
            const naslov = document.getElementById('ime-zanimanje').value;
            const detalji = document.getElementById('iskustvo').value;

            btn.innerText = "AI KREIRA CV...";
            btn.disabled = true;

            const noviRed = {
                "Datum": new Date().toLocaleString('hr-BA'),
                "Korisnik ID": firmaId, 
                "Tekst izvještaja": "AI_CV: " + naslov,
                "AI Analiza": "U izradi... [Podaci: " + detalji + "]"
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [noviRed] })
                });

                if(res.ok) {
                    alert("Zahtjev poslan! AI upravo pretvara tvoje podatke u evropski CV format. Osvježi za par sekundi.");
                    document.getElementById('cv-forma').reset();
                    await ucitajCV(); 
                }
            } catch (err) {
                alert("Greška: " + err.message);
            } finally {
                btn.innerText = "⚡ GENERIŠI STRUKTURIRANI CV";
                btn.disabled = false;
            }
        });

        async function ucitajCV() {
            const kontejner = document.getElementById('svi-cv');
            try {
                const odgovor = await fetch(API_URL + '?t=' + Date.now());
                const podaci = await odgovor.json();
                const listaPodataka = Array.isArray(podaci) ? podaci : [];

                const cvLista = listaPodataka.filter(red => red["Korisnik ID"] === firmaId && red["Tekst izvještaja"].startsWith("AI_CV:"));
                const poredani = [...cvLista].reverse();
                
                kontejner.innerHTML = '';
                
                if(poredani.length === 0) {
                    kontejner.innerHTML = "<p class='text-zinc-600 text-center uppercase text-xs'>Nema kreiranih biografija.</p>";
                    return;
                }

                poredani.forEach((red, index) => {
                    const kartica = document.createElement('div');
                    kartica.className = "bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl hover:border-purple-600/30 transition duration-500";
                    
                    const cistiNaslov = red["Tekst izvještaja"].replace("AI_CV: ", "");
                    const tekstCV = (red["AI Analiza"] || "Nema teksta").replace(/`/g, '\\`').replace(/"/g, '&quot;');

                    kartica.innerHTML = `
                        <div class="flex justify-between items-center mb-4 border-b border-zinc-800 pb-2">
                            <span class="text-purple-500 font-black text-[10px] uppercase italic">CV DOKUMENT #${poredani.length - index}</span>
                            <span class="text-zinc-600 font-mono text-[10px]">${red["Datum"] || 'Bez datuma'}</span>
                        </div>
                        <h3 class="text-white font-black uppercase italic text-xl mb-3">${cistiNaslov}</h3>
                        <div class="bg-black/60 p-4 rounded-xl border border-zinc-800/50 mb-4">
                            <p class="text-zinc-400 text-sm font-mono whitespace-pre-line">${red["AI Analiza"] || 'AI piše biografiju...'}</p>
                        </div>
                        <button onclick="printajCV('${cistiNaslov}', \`${tekstCV}\`)" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-2 px-4 rounded-xl text-xs uppercase transition w-full sm:w-auto">
                            🖨️ Isprintaj CV / Sačuvaj PDF
                        </button>
                    `;
                    kontejner.appendChild(kartica);
                });
            } catch (err) {
                kontejner.innerHTML = `<p class="text-red-600 font-bold text-center">GREŠKA: ${err.message}</p>`;
            }
        }

        // PRINTANJE BEZ CRNE POZADINE (ZA ŠTAMPANJE NA PAPIR)
        function printajCV(naslov, tekst) {
            const printProzor = window.open('', '_blank');
            printProzor.document.write(`
                <html>
                <head>
                    <title>CV - ${naslov}</title>
                    <style>
                        body { font-family: 'Arial', sans-serif; padding: 40px; color: #000; line-height: 1.5; }
                        .no-print { background: #805ad5; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 30px; }
                        @media print { .no-print { display: none; } }
                        .sadrzaj { text-align: left; font-size: 14px; white-space: pre-line; }
                    </style>
                </head>
                <body>
                    <button class="no-print" onclick="window.print()">🖨️ Isprintaj / Spasi PDF</button>
                    <h1 style="border-b: 2px solid #805ad5; padding-bottom:10px;">CURRICULUM VITAE</h1>
                    <div class="sadrzaj">${tekst}</div>
                </body>
                </html>
            `);
            printProzor.document.close();
        }

        function pokreniAlarm() { alert("🚨 ALARM AKTIVIRAN za firmu: " + firmaId); }
        function odjaviSe() { localStorage.removeItem("prijavljenaFirma"); window.location.href = "index.html"; }

        ucitajCV();
        setInterval(ucitajCV, 20000);
    </script>
</body>
</html>
